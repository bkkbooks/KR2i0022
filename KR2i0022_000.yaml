body:
  text: 朝鮮史略載記𩔖附録提要臣等謹案朝鮮史略十二卷一名東國史略不著撰人名氏乃明時朝鮮人所紀其國治亂興廢之事始於檀君終於高麗恭讓王王瑶自新羅朴氏以前稍略而高麗王建以後則皆編年紀載事蹟頗具其稱李成桂李芳逺為太祖太宗乃其臣子之詞又間附史臣論斷及厯年圖等書葢鄭麟趾高麗史仿紀傳之體而此則仿編年之體者故其國中兩行之錢曽讀書敏求記以其於王氏遺臣鄭夢周等欲害李成桂事不沒其實稱為良史今觀其序事詳略雖不能盡合體要而裒輯遺聞頗為賅具讀列史外國傳者亦可以資參考焉乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1e4384027fef383fe7d27944cf72655c78d42a5622c10089019230479b0e8fdc
