body:
  text: 朝鮮史略卷十高麗紀忠肅王諱燾字宣孝忠宣王第二子母蒙古女伊遜展元年元延祐元年上王自記其德十餘條密下式目都監令上箋陳賀史臣曰忠宣以聰明強記之資用之于不善處身接物無一可稱乃欲求譽于上國自記其德密令臣下上箋陳賀其所記之德不知何德也靈殿之營先揚父惡謂之德可乎轉輸燕京財殫力痡謂之德可乎以謂孝則失父子之親以為仁則殺無罪之子常在元朝不親國政則無克勤之德也重營一宫私占食邑則無克儉之德也飯佛點燈萬僧之會糜費巨萬謂無一日之遊絲毫之費可乎元命上王留京師上王構萬卷堂于燕邸召李齊賢於府中迎致文儒閻復姚燧趙孟俯虞集等與之從遊以考究書史自娛時有鮮卑僧以帝師帕克斯巴製蒙古字有功請天下立祠比孔子王曰孔子百王之師祀以德不以功製字之功何可比哉聞者韙之元朝科舉久廢王以姚燧之言白帝許之及李孟為相行之王嘗問齊賢曰近來我國學者皆從釋子學章句何耶對曰庚癸之亂文士逃竄窮山蛻冠帶而蒙伽梨以終餘年其文治稍復學者無所於學有志之士皆從此輩學從釋氏學其源始此遣權漢功如元賀始行科舉二年改東堂為應舉試三年上王奏請傳瀋王元嘗封王為瀋王位于世子皓自稱太尉王帝授皓開府儀同三司瀋王令尚梁王女潘氏弒其夫上王赦之潘尚書永源之女其夫李楫為黃州牧使潘氏與衛引金南俊通遂弒之四年王微行幸妓萬年歡家王畋于西海道僉議政丞閔漬撰進本朝編年綱目上起國初下訖高宗書凡四十二漬稍有文藻而心術不正不知性理之學其論昭穆至以朱子之議為非設九齋朔試時監試廢已久始以朔試代之五年王及公主宴於延慶宫還途記姚安道所賦唐玄宗打毬圖詩吟詠者久之詩曰金殿千門白晝開三郎沈醉打毬回九齡已老韓休死明日應無諫疏來罷州郡事審官事審官之設本為宗主人民甄别流品均平賦役表正風俗而廣占公田多匿民户擅作威福有害于鄉無補于國乃罷之民甚悅未幾權豪復自為之害甚于前置辨違都監大索豪勢所占田民還其主中外大悅獨豪勢患之訴上王罷之後王復置之以安震權適之後始登制科自檢閲擢拜藝文應教六年上王請於帝降御香南遊江浙至寶陀山而還時權漢功李齊賢等從行命記所歷山川勝景為行録一卷以文成公珦從祀文廟七年上王知時事將變欲避患時仁宗皇帝崩復請帝降香江南行至金山寺在潤州帝遣使急召令騎士擁逼以北侍從臣僚恐王不免皆奔竄或有仰藥者上王還大都帝托以學佛經為名祝髮流於吐蕃朴仁幹等十八人從巴延托果斯本國人也自宫為閹入元事仁宗皇帝藩邸佞險多不法上王深疾之白太后以所奪土田臧獲悉還其主又以無禮杖之故仁宗崩後太后無權讒訴不已禍幾不測賴丞相拜珠營救得免至吐蕃李齊賢等獻書中書省請還帝命量移未幾帝見弒晉王即位召還改朔試為舉子試復置政房八年元英宗至治元年下權漢功蔡洪哲等于巡軍獄籍其家杖流逺島漢功自厠竇逃還見捕李瑱齊賢父出餞漢功曰天地雖廣大一身藏處難瑱曰厠竇好漢功大慙漢功等扈從上王在元招權納賂親戚故舊濫授朱紫王頗懷不平及上王被流王命吳潛金千寶等鞫之自西幸以後宦官左右謀改上王之政放逐舊臣無虛日倉庫俱竭全英甫僧山枳及無佛奴等附伯顔秃古思蜂起煽亂王被詔入元內豎大護軍朴仁平以姦巧得幸潛結曺頔頔養子宦者楊安吉時在帝側用事其妹適人已久安吉黜其夫以嫁仁平至是仁平先至瀋王所與頔安吉相為唇齒遂背王反以國家隂事訴瀋王誘引清臣潛與之比趙璉趙延壽金元祥等隂附之時人目仁平人貓寓巴延托果斯家帝聽瀋王皓譖收印章史臣許應麟曰忠宣王嫉惡如讐而閹人巴延托果斯以其姦險見惡誣譖於英宗皇帝竄王吐蕃在忠肅義不共戴天也其入朝也既不能白于天子正其吠主之罪乃反寓其家至以其族免𨽻為良獨何心哉鷹揚軍上護軍元沖甲卒沖甲為人短小精悍眼有電光臨難忘身後以擊走哈坦賜功臣號蔡河中洪哲子偕元使來詐傳帝以瀋王皓為國王又謂辨違都監官曰從汝惡王命奪我父田民斷與人耶史臣曰河中謀立瀋王為日已久今矯帝命稱皓為王以惑羣心尋復如元凡所以陷王者無所不至而至稱其王為惡王是不可出諸臣子之口矣九年密直副使裴廷芝卒廷芝嘗從印侯討哈坦于燕岐流矢貫輔車裹瘡復戰俘馘甚衆以功拜中郎將忠宣王設典農司有備倉以廷芝幹其事以非罪在縲絏其子天慶請以身代不聽遂父子俱竄及還閉門謝病日以琴棋自娛口不言利僉議贊成事趙璉卒時王在元璉權攝省事元使絡繹率使氣逞暴璉善辭以對怒輒解及卒國人皆泣然二于瀋王臣節不完權漢功蔡洪哲李光逢等怨王之杖流乃邀驪興君閔漬等欲請立瀋王會百官上書中書省執義尹宣佐曰臣而訴君狗彘不為唾之而去贊成事閔宗儒亦以為非彥陽君金倫不署名臺諫史翰皆不署名議郎趙湜賫書呈中書省及翰院並不受史臣曰漢功小人得罪于王因王蹉跌謀欲陷王于不測之地首唱邪謀天人之所共憤者也是故今日會議而天大雨雹明日會議而天又震雷雨雹天之震怒于上者可知矣及書之上也中書翰林皆不受其不為天下公論所容者亦可知矣漢功之罪於是而通乎天地矣十年上王自吐蕃還大都李齊賢崔誠之上書丞相拜珠量移圖沙瑪之地又御史大夫特克實弒英宗皇帝皇叔晉王即帝位召還都元議立行省于本國尋罷之初吳潛栁清臣謀立瀋王皓會英宗崩泰定帝登極清臣等未遂其謀上書請立行省罷國號比內地時元前通事舍人王觀及本國人崔誠之李齊賢等交相上書都堂議遂寢十一年元泰定帝元年元敕王還國復賜印章曹頔蔡河中等又令留元無賴子弟二千餘人連名呈省訴王不已僉議贊成事致仕閔宗儒卒宗儒天資莊重風度秀朗明識典故優于吏幹不妄交遊篤于宗族未嘗干謁退公便杜門謝客晚年喜絲竹廣植花木以聲妓自娛十二年化平府使李晟卒晟弱冠登第窮討墳典若將終身年五十九拜左思補棄官歸田上王在燕邸聞其名拜內書舍人纍遷至成均祭酒所至學者如雲又謂之五經笥崔有淹還自元時朝廷欲立省我國革世祿奴婢之法有淹詣中書省力言請因舊制從之及還國人舉手加額泣曰存我三韓者崔侍中也時有淹年八十六王及公主至自元上王薨于元王煦等奉梓宫還百官玄冠素服郊迎延興君朴全之卒少以衣冠子弟入元與中原名士商確古今如指諸掌忠宣世子時以全之為傅性慈厚仁愛通經史究術數瀋王之黨誣王罪上書都堂也逼以署名全之曰狗奴敢汚我耶遂遣其子瑗聞于王所及王復位拜瑗代言起全之視事以老固辭乃授僉議政丞致仕蠻人王三錫見寵于王賣官鬻獄其妹夫張世奪人馬憲府捕繫治之三錫以杖擊持平金開物擅釋世以李齊賢為政堂文學十四年僉議中贊金怡卒諡匡定怡春陽縣人初名之琔改廷美忠宣賜今名嘗調長興府哈坦入冦國家禁民出耕怡以為耕種有時况天兵制此小冦猶几上肉何至邉郡不從賊果到燕岐而滅府獨大熟逺近賴之又忠烈在元欲廢忠宣立瑞興侯琠二王之臣角立怡密取忠宣受封詔册潛帶腰間以他紙納忠宣匣中居數日果為姦人所竊羣小計垂成怡乃出所佩册命驗之事遂寢王欲請元禪位于瀋王密以表授代言韓宗愈趣令印之宗愈不從固諫不得命乃退托以墜馬與李兆年謀諸宰相執政斥之事竟不行十五年栁清臣吳潛等詣中書省誣訴王盲聾瘖啞帝遣平章政事瑪魯來問王對辨如常禮容嚴肅言詞有序瑪魯乃曰向者之訴誣也前到淹留使臣並督令還歸即去王饋金銀綾羅苧布皆不受胡僧指空設戒於延福亭士女奔走以聽雞林司録李光順亦受無生戒令州民祭城隍不得用肉禁甚嚴州人一日盡殺其豚定銀瓶價資膳司言銀瓶之價日賤自今上品瓶折賨布十匹貼瓶折布八九匹違者科罪從之十六年盜發馬韓祖虎康王陵時賊捕繫典法司未幾逸政丞鄭方吉欲劾法官贊成事林仲沇沮之方吉曰固知發塜人多金仲沇大慙栁清臣死于元清臣與吳潛從王如元背王附瀋王誣訴王盲聾喑啞及王即位二人懼罪留燕九年而死清臣本高伊部曲人時有貓部曲人仕朝國亡之讖俗稱貓曰高伊行黑册政事元使完者族黨在本國王欲官之命高用賢等掌銓注用賢等因此多自擅除及批下用事者塗抹竄定朱與墨至不可辨故時人謂之黑册十七年元至順元年元䇿世子禎為國王遣七十堅使臣名來取國王印使王忠惠尚關西王焦八女是為德寧公主置知印房王委幾務於嬖臣裴佺朱柱日與內豎為角力戲起居注李湛曰君舉不可不慎左右書之王曰書者誰耶湛曰史臣之職也王曰書我過失者書生也王本不好儒由是益惡之光陽君崔誠之卒誠之從忠宣在元定內亂立武宗常在左右多所贊襄又精于數學得授時厯法傳于東方及皓黨疏列國家事將訴中書省厲聲却之不署名檢校政丞金台鉉卒諡文正台鉉性亷正言動循禮晝不卧暑不袒事母孝睦親姻無妄交事三朝進退以義裁決精敏通究歷代典故少時受業先進門先進奇愛之屢引入內饗之其家有女新寡稍解詩一日忽投詩窗隙而挑之自此不往始令舉子誦律詩四韻一百首通小學五聲字韻乃許赴試忠惠王諱禎肅王長子母明德太后洪氏元年元至順二年太寧府院君崔有淹卒有淹平章滋之子性恬退不求名譽故久從仕宦十年不遷時論惜之忠烈聞其名久及即位除監察雜端自是歷仕四朝為國元老諡忠憲忠肅王後元年元至順三年上王復位二年元順帝元統元年李榖應舉于元中制科第二甲授翰林國史院檢閲官四年元罷求童女時本國典儀府令李殷在元言于御史臺代作疏請罷帝納之六年元順帝至元三年贊成事元忠卒忠性端慤雖不學善處事王之見留于元侍從大臣皆携二忠獨終始一節元敕本國人不得藏軍器除官員存留馬匹外盡行拘刷百官皆不視事征東省據世祖不改土風之詔奏于帝帝從之七年有黃守者世居平壤父母年俱七十餘有弟妹五人同㸑而食具甘旨先奉父母日三退而共食二十餘年子孫服習無小怠贊成薑融親訪其第具狀以聞八年王薨遺命前王襲位史臣曰自烈宣肅惠世歷四代父子相夷至與之訟于天子之庭貽笑天下後世孝為百行之先而政事之本也本既失焉他無足觀者前王私置寶興庫前王淫其舅洪戎繼室黃氏又蒸庶母壽妃權氏及慶華公主若聞人妻妾有姿色則無問親戚貴賤或至其第淫之曹頔反舉兵圍王宫兵敗伏誅頔與洪彬等聲言逐去前王羣小而隂為瀋王地取國印置于永安宫乃曰我為政丞見淫無道若不聞于朝廷罪在我身舉兵圍前王宫射王中臂未幾頔為前王先鋒所敗頔被誅于是下其黨巡軍獄治之金倫獨曰此輩詿誤于頔指嗾何足責哉遂弛刑諸囚感悅首惡無隱忠惠王後元年元至元六年順天君蔡洪哲卒為人精巧于文章技藝皆盡其能尤好釋教嘗棄官間居十四年以浮屠禪旨琴書劑和為日用忠宣王素知其名召用之遂至為相性貪婪喜營私多取民田以致巨富於第北構旃檀園食禪僧又施藥人多賴之又于第南作中和堂邀國老八人為耆英會作紫霞洞新曲今樂府有譜元執前王囚于刑部使五府雜問之五府中書樞密御史翰林宗正曹頔之黨多利口金倫折以片言辭語簡直五府官改容目之時丞相巴延蓄宿憾故使王與頔黨辨李兆年慷慨發憤謂李齊賢曰吾欲面訴丞相前其意可回然列戟守門莫呌其閽幸其出田城南吾當上書道左碎首馬蹄之下死明吾君吾子其把筆書吾書夜起沐浴雞鳴將行巴延適敗未果然聞者悚然托克托奏帝釋王復位王還國以兆年為正堂文學元封本國女奇氏為第二皇后后幸州人總郎子敖之女生皇太子阿裕爾實哩達喇軾轍輪轅皆后兄檢校成均大司成崔瀣卒瀣致逺之後平生不治家人生業自號拙翁為文章不資師友超然自得務合于古人至論同異雖老師宿儒必詰而折之性亢少許可人不茍合於俗排斥異端喜説人善惡故輒舉輒斥卒無子家甚貧朋友致賻乃克葬二年元至正元年王聞權漢功二室康氏有姿色納之宫中護軍朴伊拉齊承命取康氏時先姦之事覺王怒皆撲殺之以李凌幹為政丞星山君李兆年見王步行彈雀於松岡指斥切諫且諫林信之事商人林信以賣砂器為業王納其女有寵封為翁主時稱砂器翁主信恃勢毆奇輪王以信為是兆年亦諫之王盛怒不納兆年歸第嘆曰王年方強而肆於欲吾既老矣而又無助不去必及于禍且數諫而不納責有所歸非臣之所以愛主也不如去之遂還鄉不出終身兆年京山府吏長庚子短小精悍力學能文少懷志節堅確敢言以嚴見憚每入見王聞履聲曰兆年來矣屏左右整容以俟所歷多聲績及退居鄉里不交人間事諡文烈成均祭酒禹倬卒倬丹山人倬登科調寧海司録毁八鈴祠郡有妖神人名八鈴民惑靈怪奉祀甚瀆碎其神而沈于海淫祠遂絶後退老于福州之禮安縣忠肅王嘉其忠義再召不起倬通經史尤深于易學卜筮無不中程初來東方無能知者倬乃閉門月餘參究乃解教授生徒義理之學始行矣卒年八十一四年罷習射場屬東西大悲院時僧翯仙勸王創院城外聚城病人救藥贍衣食王問翯仙長生訣對曰人有定分無過限之理但不可為惡以促之初徵職稅六品以上布百五十匹七品以下百匹散職十五匹聞令下或挈家登山或乘舟而遁民甚怨之時慶尚道有一散員同正貧甚盡賣家産不充其額其女斷髮貿布以納父及女縊死初嬖人寧夫金承命往江陵道索人參參貴不多得懼罪擅徵職稅還説王曰見有職退居鄉里病民頗衆故為徵其職稅藏諸州郡以待上命非獨江陵五道皆然王納之代言閔渙勸之於是分遣徵之東界存撫使崔昌義力言其弊罷之未幾復之評理致仕尹宣佐卒宣佐生而頴異七歲能屬文未嘗戲謔歌舞慎交遊重然諾間居嘗若對賔唯以經史自娛元遣納珠多爾濟等詐索鞍橇且頒赦詔高龍普勸王出迎王率百官郊迎聽詔征東省乃住等蹴王縛之使者皆拔劒執侍從羣小百官皆走匿金永煦等中槊亦有被殺者辛裔伏兵禦外以助之乃住等即掖王載一馬馳去王悶甚索酒有一嫗獻之王至肅州索衾于州守安鈞鈞不獻訴于多爾濟多爾濟曰汝王怕寒索衾汝不與於人臣之義何乃以鐵尺擊之垂死史臣元松夀曰王雖凶虐乃其主也龍普小人既不足論辛裔儒者何至此耶彥陽君金倫家居聞王被執乃以陳乞朝廷之意言蔡河中會議宰相國老于旻天寺醴泉君權漢功曰今王無道天子誅之何得而救之乎諸相皆以為不可救倫厲聲曰臣之於君子之於父當盡其恩義耳其父被罪為其子者忍不救乎今之呈省雖不蒙俞然救其主而得罪吾未聞也金永暾亦曰君辱臣死宜矣一座皆然之遂決上書令金海君李齊賢草其書後宰相等會百官國老于旻天寺欲署名國老多不至事竟未就元以檻車流王于揭陽縣無一人從行揭陽在南方距燕京二萬餘里五年王未至配所薨于嶽陽縣或云遇鴆或云食橘而殂初宫中及道路歌曰阿也麻古之那從今去幾時來至是人解之曰嶽陽亡故之難今日去何時還王性豪俠好騎射王在元太保巴延稱之曰潑皮潑皮者豪俠之稱喜營財利荒淫無度羣小得志忠直見斥一有直言輒見誅戮內則見責于父上則得罪于天子雖有李兆年之切諫韓宗愈之忠直亦不能容卒至於禍史臣曰烈宣肅惠相繼尚主憑仗甥舅之親在元日多在國日少自置東省政教號令皆出于元羣不逞之徒因緣盤結往復猜譖子訴其父臣訴其君子立則父廢父立則子廢圖新君者吠舊主背本國者喜生事無復有君臣父子之分夷考其行忠烈忠肅之驕溢荒怠莫能相尚忠宣忠惠之淫縱穢褻瀆亂天常吐蕃之流揭陽之竄皆自取也尚誰咎哉元子昕在元年甫八嵗天性聰慧帝命襲位王下教國內臣僚一革弊政以韓宗愈為左政丞李齊賢判三司使金倫朴忠佐贊成事忠佐性溫厚儉約雖為卿相居室衣服如布衣時好讀易老而不輟王欲觀杜詩韓宗愈曰抽黃對白無補於政托以無竟不進史臣曰宗愈歷事四朝當烈宣肅惠多事之時事不辭難精忠大節有大過人者今輔幼主亦得大臣體其賢矣哉罷內乘鷹坊其所𨽻土田奴婢各還本處置書筵官分為四番更日侍讀直提學李仁復貌嚴辭氣簡重每進講王謂左右曰吾見李公不覺竦然安震言於王曰臣等備員兩府不可竟日侍講宜擇端士以備顧問春秋修撰元松夀藝文檢閲許湜其人也判三司李齊賢又言之王從之改定科舉法初場試六經義四書疑中場古賦終場䇿問僉議參理羅益禧卒益禧性耿介慕節義恥與人爭其母分財别遺臧獲辭曰以一男居五女間烏忍茍得其贏以纍鳴鳩之仁母義而許之忠宣好立新法多所封駁以錦城君間居每念生民休戚人材用捨負手蹙鼻獨行園庭若有隱憂至是復入政府未幾卒諡良節罷政房歸之典理軍簿京畿祿科田為權貴所奪者悉還其主忠穆王諱昕忠惠長子母德寧公主元年元順帝至正五年復置政房左司議評理鄭誧卒于元誧好學善屬文忠惠朝為左司議多所封駁執政惡之出守蔚州雖在謫中吟嘯自若慨然有遊宦上國之志遂如元謁丞相將薦之天子會病卒瀋王皓卒王煦罷煦罷政房復科田故為貪姦所惡而罷時人觖望二年王以閔漬所撰編年綱目多闕漏乃命李齊賢安軸李榖安震李仁復等更撰進三年置整治都監以王煦金永旽及安軸金光轍為判事以治豪勢奇皇后族親奇三萬奇柱等倚勢肆虐恣行並下獄杖之三萬死于獄其妻訴于元元遣使下整治官白文寶田祿生等十餘人于獄杖之參理安子由攝事太廟憫牛之死不殺牲監察司請免其官王不聽史臣金仲鏘曰梁武惑浮屠果報之説以麵代犧牲卒致臺城之餓今子由奉君命祭太室擅不血薦其罪當誅王乃以姑息之仁不聽憲司之請其享年不永宜矣彥陽府院君金倫卒諡貞烈倫嘗為辨正都監官發姦摘伏如神鎮合浦卒乘精鍊號令嚴明喜觀書多諳典故人有問者響應無疑興寧君安軸卒諡文貞軸力學工文時忠肅王被留于元四年軸謂同志曰主憂臣辱主辱臣死乃上書訟王無他軸處心公正持家勤儉嘗曰吾平生無可稱四為士師凡民之屈抑為奴者必理而良之四年王薨時辛裔田淑蒙等相繼用事代言鄭四度依阿進用久在政房中外輻湊時人目裔曰辛王貝母后盛年居中康允中裴佺出入得幸秉政權作威福王煦金永旽奉帝命欲整理舊弊卒為允忠輩所陷忠定王諱㫝忠惠王庶子母禧妃尹氏元年元至正九年元命忠惠王子㫝入朝仍令嗣王位王命鐵城君李君賅即學嵓斷聽國務政丞王煦還自元道卒忠宣愛煦如子及竄于吐蕃煦欲以身代及薨每月朔望祭陵下至沒身剛正莊重平生不妄語稍讀書通大義再為相以興利除害為心及卒驛吏望柩號泣迎入祭之如父母諡正獻流前密直金敬直于島貶前密直李承老為宣州勾當前代言尹澤為光陽監務初忠肅在燕邸澤上謁一見器重因有托孤之語意在江陵大君祺後忠肅寢疾復以燕邸所語語澤故澤於祺素歸心遂與承老以民望歸于祺乃獻書中書省言本國兄弟叔侄相繼之故幼君不堪保釐之狀王恨之及嗣位有是命敬直亦嘗毁王故及咸陽府院君朴忠佐卒忠佐性溫厚儉約雖為卿相居室衣服如布衣時讀易老而不輟罷整治都監權漢功死漢陽府院君韓宗愈致仕時權幸用事宗愈退居其鄉非有事未嘗至京師二年倭冦固城巨濟等處合洽萬户崔禪等擊却之倭冦始此此後年年冦竊不絶二年贊成事李榖卒諡文孝榖寒山吏早喪父事母孝性端嚴剛直與中朝文士交遊所造者深為文章典雅高古初命文武兩選各分于吏兵曹三司使金光載白王罷政房復舊制元以江陵大君祺為王祺忠惠王母弟時在元遣使封倉庫收國璽以歸前王遜于江華一年遇鴆薨王初遜時唯韓修等二人從行供膳不充往來又絶憂愁號泣及訃至都人莫不流涕王狂悖嘗與近侍相戲謔或有近女色而行者便生妬心雖宰相至見撞擊往往以鐵椎擊人幾死史臣曰史書遇鴆而不言鴆者之名既書前王遜于江華繼書遇鴆而薨比事以觀恭愍不得辭篡弒之罪矣德興君塔斯特穆爾奔于元德興乃忠宣元子嘗為僧者也王命李齊賢攝政丞權斷征東省事措置得宜人賴以安王及公主至自元即位公主乃衛王女即魯國公主祝忠惠王孽子釋器髮置萬德寺朝鮮史略卷十
