body:
  text: 朝鮮史畧卷十二髙麗紀恭讓王神宗七代孫初封定昌府院君我太祖與沈徳符鄭夢周定䇿立之在位四年元年大明洪武二十二年慶尚道元帥朴葳以兵船一百艘擊對馬島燒倭船三百艘廬舎殆盡元帥金宗衍崔七夕朴子安繼至搜被虜民百餘以還昌賜葳衣服鞍馬銀錠奨諭之禮儀司請每月用六衙日朝參諫官呉思忠等劾李崇仁流京山府權近上書論救亦被流牛峯徙寧海府李穡亦不自安乞觧職歸長湍别業尹紹宗嫉崇仁才髙又憾穡譽崇仁而不譽已䜛毁多方放昌于江華立宗室定昌府院君瑶為王初崔瑩甥金佇潛徃黄驪謁禑禑授一劒使遺所善郭忠輔圖復位忠輔陽諾奔告我太祖太祖囚佇廵軍鞫之辭連邉安烈李琳禹𤣥寶禹仁烈王安徳禹洪壽於是遷禑于江陵廢為庶人太祖與沈徳符等議奉瑶立之李穡自長湍詣闕賀王召入内下床而待乃曰平生閒逰不意今日得此也願卿輔之誅辛禑辛昌臺諫交章司宰輔令尹㑹宗亦上疏請罪故也禑妻崔氏大哭曰妾之至此吾父之過也不食十餘日晝夜哭泣得粒輙精舂供奠時人憐之二年郎舎尹紹宗李詹上疏以邉安烈欲迎立辛禑流漢陽立積慶園置祠官祀四代禮官奏漢光武繼漢舊統别立四親廟於洛陽祀南頓君以上至舂陵節侯宋英宗以仁宗從兄濮王之子入繼大統司馬光議為人後者為之子宜尊以髙官大爵稱皇伯而不名程子曰為人後者謂其所後者為父母謂其所生者為伯叔父母然所生之義至大不可盡絶於私恩今當依漢宋故事西原君以下四代尊以髙官大爵立園置祠官别子奉祀而子孫襲爵在禮當然王従之始置經筵官前此只稱書筵至是始改而於世于稱書筵鄭夢周進言曰儒者之道皆日用平常之事飲食男女人所同也至理存焉堯舜之道亦不外此佛氏之教則不然辭親戚絶男女獨坐巖穴草衣木食觀空寂滅為宗豈是平常之道時王欲迎僧粲英為師故夢周語及此以我太祖領八道軍馬置軍營分番更宿廪以軍資時有强盗刼人於城門外大司憲成石璘左常侍尹紹宗援引呉元濟遣人殺武元衡之事以為刼盗之發實由邉安烈輩上疏請罪遣金伯興就貶所誅之王御經筵謂侍講官曰予年齒已暮雖讀聖經恐無益也朴宜中引師曠秉燭之喻反復陳勸王嘉納晉平公謂師曠曰吾年七十七欲學恐年老矣對曰何不秉燭乎公以為戲已怒之對曰盲者安敢戲君少而學之如初出之陽壮而好學如日中之光老而好學如秉燭之明孰與昧行公然之置宫城宿衛府始立提調提舉王欲罷偽朝添設職鄭道𫝊請依宋大丹館福源宫提舉提調之置别置宫城宿衛而秩髙者授提調秩卑者授提舉則政得其宜體統嚴矣王従之臺諫上疏請治李穡曹敏脩議立辛昌又欲迎還辛禑之罪王遣人鞫穡于長湍穡曰回軍議立之際敏脩問宗親與子昌孰當時敏脩以主将領兵且與昌之外祖李琳聨族同心穡不敢違以禑立已久當立子昌為對無首勸擅立之語去年朝京師禮部尚書李原明曰汝家逐父立子天下安有是理王與崔瑩皆被拘囚是何義耶予曰崔瑩教王謀犯遼陽将軍曹敏脩與李太祖舊諱以為不可到義州不敢發瑩數促之不獲已回兵繫瑩於獄於是王怒欲害諸将故太后廢王置于江華去開京二十餘里舊都勝地怡養情性無如此地且宰相侍衛儀仗器物朝夕膳奉皆如平日何放之有及還謂李侍中曰原明之言耳可得聞口不可道驪興地逺迎置近地可免放君之名如何但此語而已固無迎立之議穡嘗與人曰晉元帝入繼大統致堂胡氏論曰元帝姓牛而冒續晉宗東晉君臣何以安之而不革也必以胡羯交侵江左㣲弱若不憑依舊業安能係屬人心舎而創初難易絶矣此亦乘勢就事不得已而為之者也今穡於立辛氏不敢有異議者亦此意也王欲迎僧粲英為師臺諫伏閣力爭不果金星貫月王謂鄭道𫝊曰将有何災道𫝊曰咎在上國不關我朝時議非之王昉趙胖等還自京師啓曰禮部召臣等曰爾國人有坡平君尹彞尹彞有麟從弟嘗為僧犯贓亡入上國改名彞中郎将李初者來訴于帝言髙麗李侍中立其姻親瑶為王謀動兵馬将犯上國宰相李穡等以為不可即将李穡等十人殺害十人穡及曹敏脩李琳邉安烈權仲和張夏李崇仁權近李種學李貴生将禹𤣥等九人逺流九人𤣥寶及禹仁烈鄭地金宗衍尹有麟洪仁桂陳乙瑞慶補李仁其在貶宰相潛遣我來告天子仍請親王動兵來討乃出彞初所記穡等姓名示之於是臺諫請鞫彞初之黨遂下𤣥寶等于廵軍有麟仁桂死獄中逮繫穡等于清州獄穡及琳仁烈仁敏地崇仁種學貴生時評理尹虎同觀察使栁玽方鞫穡等于清州忽雷雨大作前川暴漲毁城南直衝北門城中水深丈餘漂没官舎民居殆盡獄官蒼黄攀樹木以免事聞遣判書趙温放諸囚安置臺諫復論執不已鄭夢周因邀崇之慶請王大霈鴻恩王命宥穡等任使居住後鄭道𫝊還自京師帝言朕既不信彞初之誣已斷罪流溧水縣汝國復何憂疑禮成江水赤沸三日王有憂色牢元弼曰安知其不為祥也人譏其諂焚公私田籍于市街火數日不滅遷都漢陽判書安瑗力言術士之妄乞還都王従之三年省五軍為三軍都總制府以我太祖為都總制使鄭道𫝊為右軍總制使王欲御經筵宦者金師幸止之曰日月多矣一月不講無害於政王従之置各道牧府儒學教授官中郎将房士良上時務十一事一曰崇儉素二曰貴賤服飾有等三曰婚姻家勿用綾錦褥衾四曰税行商以抑末五曰禁鍮銅器専用瓷木六曰禁麄布行用錢楮為貨七曰西北萬户千户用兩府六曹臺諫之薦八曰禁潛賣牛馬於他境九曰罷其人之役十曰都城外凡墳塚所在禁樵採十一曰徃時勲烈之臣枉被刑戮如金得培安祐李芳實朴尚忠等追加褒贈王深納拜士良刑曹正郎帝遣宦者韓龍黄秃蠻來求馬一萬匹宦者二百人定喪服制一依大明服制唯外祖父母妻父母服與親伯叔同無後人以三嵗前遺棄兒冒姓附籍者即同已子其同宗之子以親近繼後者許行其職唯軍官只許行百日喪三年内不許娶婦及宴飲前典醫副正金琠前户曹判書鄭士倜俱上書請重營佛寺加給田丁以興釋教於是成均生員朴礎等上疏極斥佛法以詆崇奉之非且論金琠佞佛媚王之罪請轘諸都市以示萬世王大怒礎等将上疏生員徐復禮不署名博士金貂等鳴鼓而黜之司藝栁伯淳止礎等不得言於知申事成石容曰礎等疏請勿納礎等議将不受業大司成金子粹等惡其無禮且怒貂等不告擅黜生徒囚貂等家奴召復禮還入學及子粹赴衙貂等不庭迎子粹上箋辭不允下貂等于廵軍将欲殺之而不得罪名左代言李詹啓曰我朝自太祖以來崇信佛法今貂斥之是破毁先王成典以此罪之不患無辭王然之兵曹左郎鄭擢上疏論救得免只笞四十鄭道𫝊上書都堂請誅李穡禹𤣥寶臺諫亦交章請治穡𤣥寳種學等罪乃流穡于咸昌𤣥寳于鐵原種學于逺地時司藝栁伯淳與順寧君𣆀相語曰今儒者鄭道𫝊謀弄國柄儻有毅宗朝廷之亂吾等恐陷其禍臺諫刑曹聞之執伯淳等訊之流于外三道水軍都體察使王康請開蓴堤渠以通􅒩運調發楊廣道下夫浚之不克都評議使司上書以為銀銅本非國産錢闕之貨卒難復行宜令有司參酌古今倣會子寳鈔之法置髙麗通行楮貨印造流布與五綜布相兼行以資國用事竟不行省憲刑曹上疏曰道𫝊濫居功臣之列内懐姦惡外施忠直染汚國政請加其罪王放歸其鄉奉化縣省憲刑曹論列立子昌迎辛禑及宗衍先是西京千户尹龜澤來告我太祖曰金宗衍趙裕等與沈徳符等十二人謀作亂欲害侍中於是獄大起絞裕捕宗衍斬之流餘人于外彞初益富之黨以聞王召鄭夢周等議夢周曰敏脩昌之近親欲立昌者敏脩之志當是之時穡雖欲立宗室敏脩之志其可奪乎則穡之罪應末減矣王然之命籍敏脩安烈家李乙珍按律斷罪池湧竒朴可興仍舊付處禹仁烈王安徳朴葳外方従便餘皆京外従便夢周啓王著令曰今後復有論劾者以誣告論判開城府事鄭地卒諡景烈地少有大志姿魁偉性寛厚為将好讀書通大義凡出入常以書籍自隨彞初之獄逮繫清州不服言必誓天辭㫖慷慨竟以水災免退居光川至是被召未赴而卒召還李穡李崇仁四年憲府劾栁曼殊不侍母奉養奪諸弟田民請治其罪不聴再論之只削上䕶軍職世子奭還自京師太祖迎于黄州遂畋于海州墜馬病篤王連遣中使問候獨鄭夢周聞之有喜色諫官金震陽李擴李來來存吾子李敢權𢎞等上疏曰道𫝊起身賤地竊位堂司欲掩賤根謀去本主織成萋斐之罪連坐衆多之人初禹𤣥寶族人金戩嘗為僧私其奴樹伊妻生一女宻加愛䕶以嫁士人禹延生女適鄭云敬生道𫝊三卿相間偶起嫌讐與道𫝊同心賣弄權勢誘脅諸人誾在等為扇亂之羽翼紹宗璞等為造言之喉舌唱和而起廣張罪網施刑於不可刑之人求罪於本無罪之地衆心危懼咸怨咨嗟請令有司收浚等職牒功劵而明正其刑亦於道𫝊貶所置典刑以令後疏留中不下於是震陽等伏閣更請王召鄭夢周等議乃流浚誾紹宗在于逺地震陽等使人執道𫝊于奉化囚浦州即今真寶縣憲府又論呉思忠罪與紹宗同請并流之鄭夢周忌我太祖威徳日盛中外歸心知道𫝊浚誾等有推戴之心欲乘墜馬病篤圖之令臺諫劾道𫝊浚誾及素所歸心者五六人将殺之以及太祖太宗與李濟等議於麾下士乃謀去夢周卞仲良太祖兄元桂壻也洩謀於夢周夢周詣太祖邸欲觀變及還太宗遣英珪等要於路擊殺之籍其家夢周迎日縣人為人豪邁絶倫有忠孝節少好學不倦精研性理之學有所得謀説發越超出人意大為我太祖所器重屢加薦引同升為相時國家多故機務浩繁夢周處大事决大疑不動聲色而左酬右答咸適其當多所張設時謂王佐之才時俗不行三年喪夢周獨廬墓三年始令士庶倣朱子家禮立家廟奉先祀又内建五部李堂外設鄉校以具學術如立義倉設水站皆其畫也所著詩文豪放峻潔流震陽李擴李來李敢權𢎞鄭熈金畆徐甄李作李申于逺地放穡于韓州今韓山穡貫鄉也王使謂穡曰兩江之外惟卿所適穡憮然曰臣顧無田宅果安歸乎遂貶矜州尋徙驪興穡天資明敏博覽羣書為詩文操紙立就畧無疑滯勉進後學以興起斯文為已任學者皆仰慕掌文翰數十年屢見稱中國平生無疾遽色不露圭角不治生産雖至屢空不以為意與鄭夢周同心終始不變臣節又廢崇仁趙瑚種學種善二人皆穡子震陽擴為庶人崇仁天資英鋭文辭典雅穡每嘆賞曰此子文章求之中國不多得也帝每覽所撰表曰表辭誠切中原士大夫觀其著述莫不嘆服司憲府又上疏論贊趙浚忠功極陳夢周之罪請流餘黨偰長壽李茂李彬金履安魯生崔關金贍于逺地後臺諫又極論震陽罪杖流逺方尋卒震陽慶州人清直慷慨常居草屋號草屋子沈徳符裴克亷等請罷諸道觀察使復按亷使罷節制使經歴都事復掌務録事且罷新定監務諸驛丞儒學教授官資贍諸貨庫人物推刷都監東西遞運所水站及户口成籍牛馬烙印州郡鄉社里長等法又令各司凡受禀事皆令直報都堂勿𨽻六曹召還趙浚鄭道𫝊南誾都評議使司執宗親南平君和等六人及禹𤣥寶五父子安翊金南得崔乙義王承貴都興安瑗栁廷顯許應朴興澤安俊申元弼崔咸流于逺地使經歴張志和啓王曰𤣥寶等屢干罪犯更欲謀亂禍機甚廹未及啓聞已将分配于外以趙浚為京畿左右道節制使南誾為慶尚道節制使各道皆如之使掌其道戎馬且以浚判三司事鄭道𫝊為奉化郡忠義君趙胖知宻直司事我恭靖王為三司右使南誾同知宻直司事權仲和商議贊成事尹虎成石璘為贊成事李仁敏判開城府事慶儀鄭熈啓為門下評理金士衡為三司左使尹師徳判宻直事金用超金乙貴李薿金祵並為宻直副使李行為藝文館提學王召我太宗及司藝趙庸曰予将與李侍中同盟卿聴侍中言草盟書來豈無故事庸言列國同盟則古有之矣君與臣盟則無經籍可據王曰第草之庸言於我太祖退草以進王遜于原州尋移扞城郡降封恭讓君後三年甲戌薨于三陟府追封恭讓王髙麗亡厯數歸于真主壬申年即位右髙麗太祖以後梁末帝貞明四年戊寅即位都松岳郡至恭讓王四年壬申大明太祖髙皇帝洪武二十五年而亡合三十二王共四百七十五年朝鮮史畧卷十二
