body:
  text: 朝鮮史略卷五髙麗紀太祖神聖王十九年後晉髙祖天福元年甄萱請討賊子神劍王與萱親率三軍趨天安進次一善神劍率文武官僚出降得逆臣能奐數罪誅之以神劍為人所脅且歸命乞罪特原之萱憂悶發疽死於黃山佛舍王入後百濟都城流良劍龍劍於真州尋殺之授萱壻朴英規爵佐丞英規嘗與其妻議請降兼慰萱王自制政誡及誡百僚書頒中外以勵臣子節義二十年西天竺僧來王備兩街威儀法駕迎之始行後晉年號耽羅國太子末老來朝賜星主王子爵二十二年佐丞龔直卒直燕山昧谷人有勇略新羅末為本邑將軍見時方亂投後百濟甄萱以其二子直逹金舒及一女為質直知萱無道必亡就與其子直逹諭以歸附髙麗之意直逹喜而勉之直遂與其子英舒來朝王拜大相萱怒收直逹及弟妹烙斷股筋直逹死及百濟滅金舒得還至是直卒諡奉義二十三年初定役分田自朝臣至軍士勿論官階視人性行善惡功勞大小給之有差改諸州郡號以慶州為大都督府大匡庾黔弼卒黔弼平州人以將略仕太祖凡出征受命即行不宿於家嘗被讒流鵠島後上書召還運州之役甄萱詐要和親黔弼獨以為不可不戰乃以徑騎數千突擊之熊津以北望風自降又為征南將軍遇神劍於槎灘百濟軍不戰自潰及卒諡忠節二十四年契丹遣使來歸槖駝五十匹王以契丹嘗與渤海連和一朝殄滅此為無道之國流其使於海島繫槖馳萬夫橋下皆餓死史臣曰契丹之失信於渤海何與於我而為渤海報復自是邉釁日深貽謀之失可勝歎哉二十六年王製訓要十條以訓後嗣史臣曰麗祖始一三韓創業垂統宜往求古先哲王貽謀燕翼之道埀憲萬世可也今作訓要其條凡十而一則曰奉佛二則曰創寺丁寧反復乎燃燈八關山水地理之説從諫逺讒輕徭薄賦警戒無虞故居其末欲以此而訓後世其可乎王薨壽六十七葬顯陵太子即位遺命喪葬悉從儉約以神惠王后栁氏祔葬史臣曰太祖御下以寬待人以誠甄萱父子相夷則伐而取之金傅君臣來附則禮以待之契丹侵滅與國則絶之渤海失地無歸則撫之屢幸西京以為根本之地親巡北郡以鎮獷悍之俗草創更始雖未遑於禮樂其規模逺略深仁厚澤固已培養五百年之國脈矣惠宗義恭王諱武字承乾母吳氏元年後晉出帝開運元年平章事崔彥撝卒彥撝新羅人自少能文十八入唐登第四十二還國拜瑞書院學士新羅歸附太祖命為太子師委以文翰之任諡文英其子光胤以賔貢進士入晉遊學流星犯紫微大匡王規謀立廣州院君太祖納規女生院君將行大逆崔知夢奏將有變宜移御王潛徙重光殿得免亦不罪規史臣曰太祖不知規之匪人付托孤之任惠宗拱手謹避不加之罪何也君弱臣強之端已兆於此若康兆資謙仲夫義方之徒接迹於世而忠獻一家四世専擅仁俊林衍日新相繼跋扈由其不能謹之於始也王以長公主妻弟昭公主從母姓稱皇甫氏史臣曰娶妻不娶同姓禮也况至親乎二年王薨於重光殿弟堯即位誅逆臣王規及其黨三百餘人王器度恢𢎞從征百濟有功然自經王規之亂多所疑忌喜怒無常內外嗟怨定宗文明王諱堯字義天太祖第二子母神明王后劉氏元年開運三年王奉佛舍利步至開國寺安焉二年始置光軍司初崔彥撝之子光胤以賔貢入晉為契丹所虜以才見用知契丹將侵我為書報之故選軍三十萬號光軍始行後漢年號四年大臣王式亷卒式亷太祖從弟也以勤恪久鎮西京定王規之亂及卒諡威靜王薨弟昭受禪立王信圗讖將移都西京大營宫室怨讟胥興光宗大成王諱昭字日華元年後周太祖廣順元年大風拔木王問禳災之術司天奏曰莫如修德自是常讀貞觀政要史臣曰光宗之治止於光宗而已者豈不由於法唐宗不法帝王而然歟二年始行後周年號命翰林學士雙冀冀周人隨册命使薛文遇而來病留上表請為僚屬遂擢用其父哲聞冀有寵亦來知貢舉試以詩賦頌及時務䇿自此文風乃興然冀倡以浮華之文貽弊後世命有司按檢奴婢推辨是非奴多背主陵上十一年宋太祖建隆元年定百官公服元尹以上紫衫中壇卿以上丹衫都卿以上緋衫小主簿以上緑衫評農書史權信譖大相俊𢎞佐丞王同等貶之自是奴訴其主子讒父母囹圄常溢别置假獄人人畏懼莫敢偶語十四年宋乾德元年始行宋年號內議令徐弼卒弼利川人性通敏始以吏事進王嘗賜金酒器弼不受曰服用明等衰奢儉關理亂臣用金器君將何用時王禮重投化唐人擇臣僚第宅與之弼奏曰臣居第稍寬願獻焉王問其故對曰今投化唐人擇屋而處世臣故家反多失所臣愚誠為子孫計及臣之存請取之庶無後悔王感悟不復奪臣僚第宅又內廄馬死王欲罪主者弼引孔子不問馬之説以爭主者得免其謇諤類此諡貞敏二十六年王薨王聰明聽斷始可與有為而猜愎日深邪佞得志誅夷骨肉屠害將相衆心離解斫喪邦本雖有文雅之美不足稱也太子即位還流竄減租調毁假獄焚讒書中外大悅景宗獻和王諱胄字長民元年宋太平興國元年禁擅殺復讐先朝被讒人子孫復讐擅殺故禁之始定職散官各品田柴科客星犯帝座內議令崔知夢奏願戒宿衛王承等謀逆伏誅六年王稱疾留內禪於堂弟開寧君治薨於正寢王初鑒前王之失焚讒書雪寃獄遽厭萬幾沉溺聲色昵近小人疏逺君子政教衰替成宗文懿王諱治字溫古太祖孫元年太平興國七年改官號內議省為內史門下廣評省為御事都省令京官五品以上各上封事論時政得失上柱國崔承老上書論列祖宗行事之美惡以及時君治政之得失皆指斥無隱承老蓋見王可與有為故進此書未幾拜門下侍郎平章事二年春正月王祈榖於圜丘祈榖籍田始此始置十二牧始定三省六曹七寺始臨軒覆試進士新定五服給假式斬衰齊衰三年給百日齊衰期年給三十日大功九月給二十日小功五月給十五日緦麻三月給七日六年內史令崔知夢卒知夢幼名聰進性清儉慈和聰敏博涉經史尤精於天文卜筮太祖聞其名召使占夢得吉兆曰必統御三韓太祖喜改名知夢及即位入侍禁中惠宗授司天職定宗賴先機奏變誅王規嘗從光宗幸寺被酒失禮貶隈傑縣令景宗召還授內議令王即位加左執政守內史令年八十二卒諡敏休置十二牧經學醫學博士各一員宋遣禮部侍郎吕端來册王爵始定五廟守侍中崔承老卒承老慶州人性聰敏好學善屬文年十二太祖召見使讀論語嘉之自是委以文柄盡忠纍代拜侍中封清河侯年六十三卒諡文貞置修書院於西京令諸生抄書史籍藏之始立社稷教略曰社土地之主也地廣不可盡敬故封土為社以報功也稷五榖之長也榖多不可遍祭故立稷神以祭之自聖祖至纍朝未置夏松之祀尚虧周栗之禋其令羣工擇地置壇流郁於泗水縣郁太祖第八子蒸景宗妃皇甫氏王知之乃流於外妃生一子而卒初妃夢登鵠嶺旋流溢國中盡成銀海卜之曰生子則王有一國至是夢果驗其子即詢也是為顯宗十二年置常平倉於兩京及十二牧契丹遣蕭遜寧侵西鄙攻蓬山郡至安戎鎮王幸西京次安北府不得進中軍使內史侍郎徐熙請行奉國書如丹營遜寧欲令拜於庭熙據禮往復不屈乃升堂行禮東西對坐遜寧語熙曰汝國興新羅地髙句麗之地我所有也而汝侵蝕之又與我連壤而越海事宋是以來討熙曰我國即髙句麗之舊也故號髙麗若論地界上國之東京皆在我境何得謂之侵蝕乎鴨緑江內外亦我境內今女真盜據其間朝聘之不通女真之故也辭氣慷慨遜寧知不可強遂具以聞丹帝許和敕罷兵史臣曰方遜寧之入冦也大振聲勢恐喝脅降羣臣獻議或乞降或割地徐熙獨力陳不可欲與一戰即冦凖親征之䇿也即使契丹抗禮不屈強敵懾服終講和親其奉使得體又豈下於富弼乎始行契丹年號始置鴨緑渡勾當以李承乾為使尋遣河拱辰代之定十道曰中原道曰關內道曰河南道曰江南道曰嶺南道曰嶺東道曰山南道曰海陽道曰朔方道曰浿西道平章事崔亮卒亮慶州人性寬厚能屬文王在潛邸引為師友及即位纍遷至內史侍郎諡匡彬十六年王疾大漸召姪開寧君誦傳位平章事王瀜請赦王曰死生在天何至釋有罪枉求延命乎遂薨誦即位王天資嚴正器宇寬洪立宗社崇節義求賢恤民以移風易俗為務政治有可觀者然以光宗之子𢎞德院君之妻為妃其失大矣穆宗宣讓王諱誦字孝伸景宗長子母皇甫氏元年宋咸平元年太保內史令徐熙卒熙弼之子十八擢科甲成宗幸西京欲微行永平寺熙上疏諫乃止又從成宗於海州王幸熙幕欲入熙曰臣之幕非君所臨也命進酒曰臣之酒不敢獻也癸巳之役至丹營抗禮不屈鄭又玄以越職論時政忤旨當誅熙曰古者諫無官越職何罪又玄論事甚合時病成宗感悟擢又玄御史熙年五十七卒諡彰威六年千秋太后皇甫氏與外族金致陽通生一子謀為王後忌大良君詢逼令為僧出居三角山神穴寺中詢出家初寓崇教寺有僧夢見大星隕庭變為龍俄變為人即詢也七年門下侍郎韓彥恭卒彥恭嘗從王幸平州日暮寒甚王駐輦道傍酣飲不行彥恭進曰臣等醉飽奈軍士何王促駕入行宫其遇事直言多類此諡曰貞信九年六月震天成殿鴟吻又彗星見十年有山湧于耽羅海中十二年王不豫恐有內變召給事中蔡忠順密語曰太祖之孫唯大良君在卿與崔沆素懷忠義宜盡心匡扶使社稷不屬異姓忠順出語沆沆亦以為然忠順入內遂草王與大良君書授皇甫俞義迎詢于神穴寺王仍徴西北面巡檢使康兆入衛大良君詢即位康兆廢王為讓國公初被黜人魏從政崔昌等欲構難謁兆於洞州龍泉驛紿之曰王疾篤太后與致陽謀奪社稷恐公握兵不從矯命徴之兆懼還營與季鉉雲等領兵至廢王為讓國公誅致陽父子流其黨及太后親屬於外大良君自神穴寺來即位康兆弒前王于積城太后遜于黃州李齊賢曰齊桓尸薑始皇轘毐何救萬世之恥哉穆宗不戒覆車之轍防間於初子母俱罹其殃社稷幾至於亡惜哉顯宗元文王諱詢字安世安宗郁之子母孝肅王后元年宋祥符三年契丹統和二十八年復燃燈國俗正月望燃燈二夜成宗廢之及八關會契丹主先遣使來問前王之故自將步騎四十萬渡鴨緑江至通州執康兆誅之乘勝長驅攻西京通州之役丹兵破三水寨兆驚起恍惚若見穆宗立於其後叱之曰天伐詎可逃耶兆即脫鍪長跪曰死罪死罪言未訖丹兵已縳兆以去丹主斬之王南幸智蔡文奔還奏西京軍敗狀羣臣議降薑邯贊獨曰今日之事罪在康兆但當避其鋒耳遂勸南行蔡文亦請從王嘉之乃與后妃及蔡忠順等禁軍五十餘人出京城南奔二年契丹主陷京城河拱辰至丹營乞班師主留之丹兵退興化鎮巡檢使楊規邀擊前鋒於艾田斬一千餘級俄而大軍奄至規與龜州别將金叔興力戰矢窮俱陷陳死之鎮使鄭成追丹兵於鴨緑江擊之溺死者甚衆王發自羅州還京都賜智蔡文田贈楊規工部尚書金叔興將軍嵗廩粟母妻并録其子刑部奏趙容謙栁僧虔李載崔楫崔成義林卓於南幸之時驚動行宫請除名支配從之又流康兆之黨卓思政朴升崔昌魏從政康隱於海島契丹主殺河拱辰拱辰被留內圗還國外示忠勤人有知其謀告之丹主鞫之拱辰對以實且曰臣於本國不敢有二心不願生事大朝辭益厲遂見害五年宋祥符七年契丹開泰三年遣內史舍人尹微古如宋請歸附如舊帝詔登州置館以待之上將軍金訓崔質等以奪軍田充祿俸激衆怒率諸衛作亂流中樞院使張延祐日直皇甫俞義王罷御史臺置金吾臺罷三司置都正署令武官常參以上皆兼文官史臣曰人徒知武夫之勦殺文臣自領其職在於毅宗之朝而不知已基禍於顯宗易置官府之時也王偽逰西京誅逆臣金訓崔質及其黨是時武臣用事布列臺閣朝綱紊亂和州防禦使李子琳與日直金猛協䇿諭王以漢髙雲夢之逰遂幸西京宴羣臣於長樂宫乘訓等醉襲殺之史臣曰特出於一時之幸耳非人君奉天討罪誅亂禁暴之義也契丹遣使又索興化通州龍州鐵州郭州龜州等六城前此再遣使索之以徐訥為中丞初憲臺柏樹枯死至是復生復行宋年號髙句麗新羅百濟王陵墓並令所在州縣修治禁樵採過者下馬以薑邯贊為西京留守內史侍郎平章事王手書告身後曰庚戌年中有戰塵干戈深入漢江濱當時不用薑公䇿舉國皆為左袵人蔡忠順為吏部尚書參知政事契丹蕭遜寧率兵來侵薑邯贊薑民瞻等前後戰於興化鎮及龜州大敗之以薑邯贊檢挍太尉門下侍郎天水縣開國男十一年以安西道屯田施納玄化寺三省論駁不從贈崔致逺文昌侯初太祖在潛邸致逺貽書有雞林黃葉鵠嶺青松之句故謂有密贊乃加是命薛聰𢎞儒侯並崇祀先聖廟庭知中樞府事薑民瞻卒民瞻晉州人起自書生射御非其所長然志氣剛果屢著戰功十五年宋仁宗天聖二年契丹大平四年禮部尚書周佇卒佇宋溫州人穆宗朝隨商舶來蔡忠順知其才奏留之遂掌制誥兩朝交聘辭命多出其手門下侍郎平章事崔沆卒沆彥撝之孫性聰悟沉訥寡言善斷清儉持家一介不取於人計月請俸無甔石之儲但酷信浮圗請復八關修皇龍寺塔又捨私第為佛宇諡節義右僕射智蔡文卒史臣曰契丹擁重兵壓境三軍敗衄思政紿道秀而夜遁朴躍挈妻子而南奔李元崔昌金應仁國近之徒亦皆接踵亡匿蔡文自西京奔還與邯贊共贊南幸之計卒能保護三宫旋軫京師不失舊物壯矣哉其臣若背君天必誅之言既足以激一國忠義之氣其動由仁義以收人心之語又足以為扶植綱常之本其他如昌化丹棗之變出萬死之力捍衛艱難斯皆扈從諸臣所不能者二十年千秋太后卒史臣曰穆宗之遇害乘輿之播遷契丹之侵軼皆千秋淫穢不禮之所使也特書于䇿者深著大惡不道之罪也築開京羅城薑邯贊請築之侍中薑邯贊卒邯贊襟州人性清儉不營産業少好學多竒略體貌矮陋衣裳垢敝正色立朝臨大事決大疑屹然為邦家柱石年七十賜几杖辭職歸城南别墅諡仁憲年八十四世傳有使臣夜入始興郡見大星隕於人家遣吏往視之適其家婦生男使臣心異之取歸以養是為邯贊後宋使見之不覺下拜曰文曲星不見久矣今在此二十二年王薨王性聰悟敏於學工詞翰太子欽即位史臣曰顯王以姨母貽孽戎臣搆逆強鄰伺釁京闕俱燼乘輿播遷艱否極矣反正之後和親結好偃武修文薄賦輕徭登崇俊良修政公平內外底寧農桑屢稔可謂中興德宗敬康王諱欽字元良母元成后金氏元年宋明道元年契丹重熙元年以王可道監修國史李端為平章事黃周亮皇甫俞義為參知政事舊制宣麻於家至是集百官宣於乾德殿命平章事栁韶創置北境關防自國內城界鴨緑江入海處東汙朔州等十四城祇和州等三城延袤千餘里以石為城三年宋景祐元年納顯宗女為后以崔沖為刑部尚書王寢疾傳位于弟平壤君亨薨平壤君即位王性剛斷有執居喪能盡子之孝為政不改父之道任用舊臣徐訥王可道崔沖黃周亮朝廷無欺蔽而民安其生李齊賢曰慶陵朝頭陀山人李承休進帝王韻記有曰德何止四年鳳鳥來呈瑞考之實録未見惟俚語相傳言鳳鳥來儀於威鳳門羣烏隨而噪之鳳乃飛去國人憎烏少長持弓彈射德宗一代京城無烏夫鳳羽族之長也為羣烏所逐豈曰鳳哉蓋韻記之無稽耳靖宗容惠王諱亨字申照德宗母弟元年宋景祐二年凡教令稱制至肅宗始稱詔築長城於西北路松嶺東以扼邉寇之衝二年祔德宗於大廟初王問昭穆之制於輔臣徐訥黃周亮等言惠定光戴同班為昭景成為穆穆宗為昭而顯宗為穆則昭二穆二與太祖為五廟今祔德宗數過五廟請遷惠定光三宗藏於太祖廟西壁戴追王之主遷祭於其陵可也劉徴弼言太祖在曾祖行親未盡故惠定光三宗不必遷惟遷戴宗於陵而祔德宗於此室可矣周亮等言前典云親過髙祖則毁其廟由是觀之自禰祖曾髙而上論親盡未盡非以旁親論也惠定光在從祖行不可比於親祖三宗宜遷毁王謂一時而遷四神主意所未安乃從徴弼議三年以劉徴弼黃周亮同平章崔齊顔崔沖參知政事四年門下省乞放東池白鶴山羊等類王從之五年宋寶元二年契丹重熙八年立賤者從母法六年以楊帶春為安北大都護府副使帶春立志峻拔多智略習兵事故崔沖奏若有邉虞非此人無可遣者不宜出外不允判御史臺事李周佐卒周佐東京人登第歷臺省立朝四十餘年倜儻瓌偉時稱得大臣體內史令徐訥卒諡元肅訥熙之子弼之孫三世為宰相初弼祖神逸郊居有鹿奔投神逸拔其箭而豢之夢有人謝曰鹿吾子也賴君不死當令公之子孫世為卿相云十二年王薨弟樂浪君即位有司奉遺命山陵制度悉從儉約文宗仁孝王諱徽字燭幽顯宗子母元惠太后金氏元年宋慶厯七年以崔沖為侍中金令器金元沖為平章事朴有仁李子淵為參知政事三年饗國老庶老及義夫節婦孝子順孫下至鰥寡孤獨廢疾無養者賜物有差八年定田制凡田品不易之地為上一易之地為中再易之地為下其不易山田一結凖平田一結一易田凖二結再易田凖三結十年宋嘉祐元年契丹清寧二年創興王寺於德水縣移其縣於楊川知中樞院事崔惟善諫曰唐太宗不許創立寺觀我太祖訓要亦曰嗣王及公侯臣僚毋得爭修願剎奈何竭民財力以危邦本耶王優答之異日入侍王曰諫諍是忠從好佞惟善對曰創垂猶易守成難又御史盧成且忤旨王怒命解冠幱將縳之惟善諫曰朝官有罪當行有司王怒霽只罷其職分遣撫問使兼侍御史李攸績金若珍崔尚安民甫閔昌壽于十三道按驗諸州郡守令勤慢清濁作長源亭於西江餅嶽南道詵明堂記曰西江邉有君子御馬明堂之地自太祖統一丙申嵗至百二十年就此創構國業延長至是構亭十一年隕石于黃州州人上其石禮司以為自古有之此常事不關災祥王可其奏還其石始行封之法時署科甚濫中書舍人鄭惟産請之二十年契丹改國號曰大遼二十二年守太師中書令崔沖卒諡文憲沖海州大寧郡人丰姿瑰偉性操堅貞少好學善屬文穆宗朝擢甲科第一歷仕四朝資兼文武出入將相年至七旬乞退然軍國大事悉就咨焉自顯宗中興干戈才息未遑文教沖收召先進教誨不倦諸生填溢門巷遂分九齊謂之侍中崔公徒凡應舉者必先𨽻徒中學焉自後舉子亦皆𨽻名九齊籍中謂之文憲公徒又有儒臣立徒者十一沖徒為最盛東方學校之興蓋由沖始時謂海東孔子王出子煦及窺為僧史臣曰文宗號稱賢主而溺於異教使二子出家要福田利益其源一開子孫視為家法祝髮為僧者實繁一時名門大族爭慕效之立嫡立嗣顧為末事其禍權輿於煦窺至沖曦極矣二十六年宋熙寧五年遼咸雍八年校尉臣身謀廢王立王弟平壤君基事覺伏誅二十八年録文昌侯崔致逺五代孫善之為都染署史二十九年遼大康元年門下侍中崔惟善卒諡文和惟善沖之子惟善為中書令弟惟吉攝尚書令父沖年髙尚無恙王賜國老宴惟善惟吉扶以入赴時稱盛事翰林學士金行瓊作詩賀曰尚書令侍中書令乙狀元扶甲狀元三十一年創安興寺以待宋使大府少卿李唐鑑奏中朝使命往來髙巒島亭稍隔水路請於貞海縣地創亭為迎送之所從之東蕃作亂以中書侍郎平章事文正及同知中樞院崔奭等將兵三萬出屯定州大破之三十七年王薨王性聰哲好學善射志略宏逺寬仁容衆上事遼宋下交鄰國民賴以寧時號治平獨其佛宇塔廟之盛為盛德纍太子即位少有疾哀毁疾篤薨於喪次弟國原公運即位李資仁如遼告喪帝詰問二君連逝必有他故資仁對辨切直帝引見慰諭宣宗思孝王諱運字繼天順宗母弟二年宋元豐八年遼大康十一年御宣政殿聽斷死囚停音樂進素膳王妹積慶公主適王弟扶餘侯四年以崔奭守太尉判吏部事監修國史崔思齊參知政事朴寅亮同知中樞院事八年門下侍郎平章事栁洪卒洪武人精於春秋左氏傳及兵家祕訣每國家有虞疑寤寐精思引古決䇿多有中者時議重之九年參知政事崔思諒卒思諒儀表端雅沉靜寡言秉國鈞主文柄名重一時十一年王薨元子昱即位王聰慧恭儉博覽經史然逰幸無度多創寺塔天怒民怨災異興矣朝鮮史略卷五
