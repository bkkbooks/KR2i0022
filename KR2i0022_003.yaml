body:
  text: 朝鮮史略卷三新羅紀文武王諱法敏大宗武烈王長子母文明王后庾信之妹故髙句麗大兄劍牟岑收合殘民迎致前王臧之庶子安勝于漢城為王請附王遣册為髙句麗王後封報德王妻以外妹麗記曰王之庶子又曰外孫册命之辭稱王之正嗣未可諱也倭國更號日本以近日所出為名彗星七出北方唐總管薛仁貴遣僧琳潤致書於王責其異圗王報書歷陳唐時忠勤明其不反唐兵不信進攻平壤我軍大敗大監阿珍含死之王遣級餐原川等上表乞罪置大舒發翰古無是官王以庾信功大特設是官金庾信卒年七十九王震悼贈􅉠甚厚命有司立碑紀功初庾信疾革王親臨存問王泣曰脫有不諱奈人民社稷何對曰今者三韓為一家百姓無二心可謂小康然自古繼體之君鮮克有終甚可懼也願親君子逺小人使朝廷和於上民物安於下則臣死且無憾矣妻金氏大宗王女有子五人次子元述嘗獲罪出亡平壤之戰元述軍敗欲死其僕淡陵止之乃不死庾信以負家訓白王欲斬元述元述慚懼遁於野聞庾信卒求見母母曰爾既不得為子於先君吾焉得為爾母乎遂不見元述嘆曰為淡陵所誤乃至於此遂入太白山後唐兵來攻買蘇州城元述欲雪前恥赴敵力戰有功以不容於父母不仕終其身後庾信妻金氏為尼聖德王封為夫人嵗賜租一千石改用新歷奈麻德福入唐學厯術而還用其法唐削王爵遣劉仁軌來討王納髙句麗叛衆又據百濟故地帝大怒削王爵以王弟仁問為雞林州大都督發兵討之王遣使謝罪獻方物帝赦之復王官爵仁問至中道還入唐阿餐薛秀真獻六陳兵法頒百司及州郡銅印靺鞨冦阿逹城城主素那死之素那白城郡蛇山人其父沈那膂力過人百濟人指為飛將素那雄豪有父風王遣素那于阿逹城俾禦北鄙靺鞨猝入城素那奮刃大呼突擊矢集其身如蝟遂死人有弔者妻哭曰亡人常曰大丈夫固當死於王事今死其志也王聞之流涕王以僧信惠義安為政官大書省又命僧義相創浮石寺於太白山寺在榮州王薨在位二十年統一三韓十一年諡曰文武太子政明立王姿表英特聰明多智略始一三韓克成前志然納髙麗叛衆據百濟故地得罪於唐幾不自保又從西教遺詔燒葬神文王諱政明字日照文武王長子母慈義后立國學髙句麗王臧卒於唐卭州唐以臧為遼東都督朝鮮王遣歸移東都護府於新城以統之臧至遼東謀叛帝召臧還卭州髙氏遂絶王納金歆運女為妃報德王安勝族子大文據金馬渚謀復故國王遣將討平之以其地為金馬郡是戰也奈麻驟福之子弟監逼實將行語其妻曰二兄夫果驟徒既死王事吾何獨畏死茍存及戰獨出奮擊數十人而死又級餐盤屈之子步騎監令胤嘗以名節自許及至椵岑城賊將結陳待之諸將皆引退令胤獨曰臨陳無勇禮經所誡遂赴敵力鬭死史臣曰羅俗以進死為榮退死為辱死于王事者曰貴山曰帚項曰讚德父子曰奚論曰訥催曰東所曰竹竹曰丕寧子父子曰金歆運曰穢破曰狄得曰寶用那曰盤屈曰官昌曰匹夫曰阿珍含曰素那曰金令胤曰逼實曰驟徒曰夫果曰脫起曰仙白曰悉毛此其章章者也百濟之亡只有階伯髙麗之亡無一死節者安能敵新羅哉至於新羅之亡效節不屈者王子一人而已誰曰國家之興喪不係於忠節之有無乎置州郡於百濟舊地賜文武官僚田有差王置燕居引薛聰曰子有異聞為我陳之聰乃設花王薔薇白頭翁之説以諷之其略曰昔花王之始來也有一佳人名曰薔薇朱顔玉齒鮮粧靚服願薦枕於香帷又有一丈夫名曰白頭翁布衣革帶戴白持杖傴僂而來曰不識王有意乎王曰丈夫之言亦有道理而佳人難得如之何丈夫曰凡為君者莫不親近老成而興昵比妖艷而亡然而妖艷易合老成難親是以夏姬亡陳西施滅吳孟軻不遇以終身馮唐郎潛而皓首自古如此吾其奈何王謝曰吾過矣王曰請書之以為誡聰字聰智父元曉為沙門淹該佛書既而反本自號小生居士娶瑶石宫寡夫人生聰聰生而明鋭既長博學能以方言解九經義訓導後生又善屬文沙餐任強首卒強首始以文辭顯用請唐兵平麗濟之時其往復文辭皆出其手文武王以其功特授沙餐及卒其妻乏食欲還鄉里王賜租辭曰夫在之時受國恩多矣今縱未亡豈敢再辱厚賜不受而去王薨在位十一年太子理洪立孝昭王諱理洪神文王子母神穆王后金氏唐嗣聖九年金仁問卒於唐仁問七入唐宿衛凡二十二年王薨在位十年王無嗣立王弟隆基聖德王諱隆基後改諱興光嗣聖十九年王親製百官針示羣臣唐以大祚榮為渤海郡王及卒私諡曰髙王子武藝立渤海本栗末靺鞨祚榮父乞乞仲像保大白山東祚榮嗣驍勇善騎射髙句麗餘燼稍稍歸之乃建國號震國地方千里勝兵數萬頗知書契盡得扶餘沃沮卞韓朝鮮之地至後孫仁秀開大境宇有五京十二府六十二州遂為海東盛國至景哀王時契丹攻滅之以為東丹國其世子及大臣等皆降于髙麗改詳文司為通文博士掌詞命又始造刻漏置刻漏典博士又置典祀典屬禮部太監守忠回自唐上文宣王十哲七十弟子畫像置太學王薨在位三十五年王教百官進言屢遣使如唐輸欵巡問髙年給租賑民諡曰聖德太子承慶立孝成王諱承慶聖德王第二子母照德王后唐開元一十六年唐玄宗遣贊善大夫邢璹弔祭前王初帝謂璹曰新羅號為君子國頗知書記宜演經義使知大國儒教之盛又以國人善碁詔以參軍楊季鷹為副璹到國獻道德經王以伊餐信忠為中侍初王在潛邸嘗與信忠圍碁於柏下謂不相負有如此柏未幾即位録功臣而遺信忠信忠作歌貼柏柏忽枯王怪使審之得歌大驚召賜爵柏乃蘇六年王薨無嗣弟憲英立以遺命燒柩於法流寺散骨東海景德王諱憲英唐天寶二年以伊餐金思仁為上大等思仁以災異屢見上疏極論時政得失旌孝子向德門號其地孝家里向德父母飢病濱死刲髀肉食之又母發癰吮之改新執事省中侍為侍中又置國學諸業博士助教幸太學命博士講尚書遣使朝帝于蜀時玄宗避祿山亂幸蜀使泝江至成都帝親製十韻詩手札賜王置九州分統郡縣前此分十道改郡縣名以沙伐州為尚州歃良州為良州菁州為康州漢山州為漢州首若州為朔州西州為溟州熊川州為熊州完山州為全州武珍州為武州又改官號始置貞察一員紏正百官大雷電震佛寺十六所又震真平王陵大奈麻李純棄官為僧纍徴不至創斷俗寺居之聞王好樂詣宫門極諫王為之停樂引至正室論説數日二十三年王薨王存問鰥寡孤獨賜榖老疾納忠諌定州號太子乾運立惠恭王諱乾運母滿月夫人金氏唐代宗永泰元年兩日並出又三星隕宫庭相擊其光如火遣金岩聘日本岩庾信後裔也性聰敏少入唐宿衛間就師學隂陽家術而還嘗守良康漢三州所至盡心撫字至是聘日本其王欲留之會唐使髙鶴林來相見歡甚以為大國所知遣還金庾信墓前風忽起至始祖陵塵霧暗冥不辨人物若有哭泣悲歎之聲王懼致祭謝過始立五廟味鄒王大宗王文武王并祖稱為五廟一年六祭以味鄒王為金氏始祖大宗王文武王平麗濟有大功德為不遷之主王幼沖嗣位母后臨朝及壯淫于聲色巡逰無度綱紀紊亂災異屢見伊餐志貞因聚衆作亂上大等金良相與伊餐敬信舉兵討志貞王與后妃為亂兵所害良相自立為王宣德王諱良相奈勿王十世孫五年王薨國人立敬信為王元聖王諱敬信奈勿王十二世孫唐德宗貞元二年大舍武鳥獻兵法十五卷花鈴圗二卷始定讀書出身科前次但以射選人至是改之十三年王薨遺命燒柩太子俊雍立昭聖王諱俊雍元聖王孫貞元十五年時有金生者父母微不知世系自幼能書平生不攻他藝好佛隱居不仕年踰八十猶操筆不休𨽻行草皆入神髙麗洪灌入宋以金生行草示翰林楊球李革二人曰天下除右軍焉有妙筆如此哉趙孟俯跋金生昌林寺碑曰字畫深有典刑雖唐人名刻未能逺過之梁悅入唐宿衛德宗幸奉天從難有功帝授贊善大夫及還王擢用為豆肸小守二年王薨太子清明立年十三叔父彥升攝政哀莊王諱清明改重熙貞元十六年以兵部令彥升為上大等創伽倻山海印寺改五廟之制始祖大王髙祖明德王曾祖元聖王皇祖惠忠王皇考昭聖王為五廟别立太宗王文武王為二廟帝遣使册王封太后叔氏為太妃妃奈勿王後孫金胡叔女嫌於同姓以父名為氏十年兵部令彥升弒王自立憲德王諱彥升昭聖王弟唐憲宗元和六年王命順天將軍金雄元率甲兵二萬應帝徴兵助討唐叛臣李師道上大等忠恭坐政事堂注擬請托坌至忠恭莫能舉措感疾而退醫診云病在心須服龍齒湯遂杜門不接賔客侍郎祿真往見曰今公私愛憎不得其正取舍是非亂其心志豈獨害於國事為之者亦病矣若當官清白蒞事恪恭貨賄請托不得行黜涉豫奪必以公則國家和平雖談笑自樂可也又何區區於服餌徒自費日廢事為哉忠恭謝醫朝王曰臣聞祿真之言同於藥石豈止飲龍齒湯而已哉王悅使告太子太子入賀命牛岑太守白永發漢山北諸州郡人一萬築浿江長城三百里熊川州即今公州都督憲昌以父周元不得立宣德無嗣羣臣欲立周元因水漲不及渡乃立敬信周元退居溟州舉兵叛王遣一吉餐張雄等討之憲昌自殺子梵文與髙逹山賊壽神攻北漢山州都督聰明擒誅之十八年王薨太子秀宗立興德王諱秀宗改景徽憲德弟王無嗣以為太子唐文宗太和元年大亷自唐還得茶種來命植智異山以張保臯為清海鎮大使保臯小字弓福入唐為徐州小將後歸國請鎮清海以禦中國冦鈔人王與卒萬人鎮之賜孝子孫順家一區嵗給米五十碩順牟梁人父沒家貧傭作以養母有小兒嘗奪母食掘醉山北郊欲埋兒得石鐘驚怪將兒與鐘還懸而撞之聲聞王宫有是命以金陽為固城郡太守尋拜中原大尹武州都督其祖宗基父貞茹皆為將相十一年王薨無嗣其堂弟均貞及堂弟之子悌隆爭立金陽與均貞子祐徴等奉均貞為王入積板宫以族兵宿衛悌隆黨金明等來圍陽突圍潛出均貞遇害明等立悌隆僖康王諱悌隆元聖王孫唐文宗開成元年三年金明忠恭子弒王自立金陽奉祐徴祐徴懼禍往依張保臯起兵清海鎮討金明張保臯以兵五千授其友鄭年年能行水底五十里不噎與保臯角勇臯差不及俱入唐為小將保臯還國鎮清海年失職飢寒往依保臯往助之陽等晝夜兼行至逹伐丘明遣兵拒之戰大敗奔入月逰宅兵士追斬之諡閔哀立祐徴權近曰金明初輔不正立以為君又從而弒之必討之罪也若祐徴金陽則初能輔正終能討賊不君悌隆况君金明乎能討君父之賊以明臣子之義亦足嘉矣神武王諱祐徴元聖王孫均貞之子開成四年元年王薨太子慶膺立文聖王諱慶膺開成五年三日並出殺清海鎮大使張保臯先是王聞保臯怨王不納女神武王以保臯女配子至是王欲納之羣臣以海島人女不宜納王從之據鎮叛王遣刺客閻長殺之罷鎮徙其人於碧骨郡侍中金陽卒史臣曰新羅人物英雄豪傑莫如金庾信明白正大莫如金陽十八年王薨弟誼靖立憲安王諱誼靖唐宣宗大中十一年四年王薨無嗣壻膺亷立王嘗宴羣臣臨海殿膺亷以王族與宴王欲試其志問曰汝見異人乎曰嘗見三人一勳閥子弟而不先人一家富而被服不侈一勢榮而驕氣不形王遂以長女妻之是為寧花大人景文王諱膺亷僖康王孫唐懿宗咸通三年十四年王薨太子晸立朝鮮史略卷三
