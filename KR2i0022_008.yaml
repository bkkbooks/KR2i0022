body:
  text: 朝鮮史畧卷八髙麗紀康宗元孝王諱祦字大華明宗子母光靖太后金氏元年宋嘉定五年金崇慶元年䝉古太祖七年遣中書舍人李儀如金奉表請命金遣大理卿完顔惟基來冊王金使欲入自儀鳯正門知奏事琴儀往諭曰天子廵狩方岳自古有之若大國枉蹕小國當入自何門耶使答曰天子出入捨中門而何儀曰然則人臣由正門可乎使大服其言乃入自西門平章事任濡卒濡元厚子性恬淡慈和不以勢位驕人歴仕五朝居官勤恪處決明允掌制誥十六年髙文大冊皆出其手四闢文闈所舉皆當時名士若趙冲李奎報金敞俞承旦是已晩年奉佛彌篤二年金宣宗貞祐元年王不豫𫝊位太子太子即位髙宗安孝王諱㬚字大明舊諱又改晊康宗子母元徳太后栁氏元年宋嘉定七年金貞祐二年䝉古太祖九年封崔忠獻妻任氏及王氏皆加宅號任氏本將軍孫洪𦙍妻忠獻殺洪𦙍聞其美私之王氏康宗庶女二年崔忠獻移入别第劍㦸兵衛彌滿數里朝士追隨者甚衆簽書樞宻院事琴儀亦從之史臣曰琴儀一時名儒也前日為雜端立語忠獻馬前失臺臣體今日為樞宻陪忠獻馬後失大臣體甚矣小人之無狀也兵部尚書𤣥徳秀卒徳秀鐵面犀骨有膽畧以意氣自髙言語誇大人或有譏之者嘗調安南政㢘明吏敬畏尤惡淫祀巫覡不得入境時有吏執女巫以告徳秀曰此非女也令審視果男子也前此假巫出入士家潛亂婦女者至是一方服其神明以李奎報為正言知制誥奎報以詩贄忠獻求參職乃拜是官三年宋洪烈卒洪烈以忠獻姻戚恃勢驕横性又滑稽每至諸王第見珍玩必丐奪而後已故聞其至急令收藏珍寳然後見之契丹兵渡鴨緑江侵寧朔定戎之境契丹遺種金山王子金始王子自稱大遼收國王建元天成避金兵席卷而東皆以妻子自随彌滿山野月餘食盡移入雲中道遣上將軍盧元純大將軍金就礪等統三軍禦之至朝陽驛與戰郎將丁純祐突入敵陣斬持纛者丹兵奔潰追斬八十餘級并獲楊水尺一人楊水尺者太祖攻甄萱時所難制之遺種也多居雲中道初李義旼子至榮為朔州將軍以水尺等本無賦役乃招諭屬于率妓紫雲仙盡籍其名徵貢及至榮死崔忠獻又以紫雲仙為妾計口徵貢滋甚水尺等大怨故丹兵至迎降鄉導之水尺本無貫籍好逐水草遷徙無常惟事田獵又編栁為器販鬻資業凡妓種多出栁器匠家丹兵至延昌二州金就礪皆撃却之三軍又與丹兵戰于渭州即今渭原敗績將軍李陽升等千餘人死京都聞之哭者滿城冦履氷渡大同江遂入西海道宰樞重房奏勿論太祖苗裔及文科出身悉令充軍王從之元帥趙冲等㸃兵于順天館驍勇皆為忠獻父子子即瑀門客官軍所㸃只老弱羸卒四年金興定元年僧徒謀誅忠獻不克忠獻遂大殺僧徒五軍潰于太祖灘大將軍李義儒白守貞將軍李希柱皆戰死元帥趙冲等奔還敵追至宣義門焚黄橋而退畧牛峯等縣寇忠厚二州歴楊根砥平趣咸州即今咸興府遂入女真地得女真兵長驅復來寇五年復以趙冲為西北面元帥金就礪為兵馬使撃契丹䝉古元帥浩沁遣使我軍約同討契丹時元帥浩沁等率兵一萬與東真萬努所遣完顔子淵兵二萬聲言討契丹攻和猛順徳四城破之六年金就礪赴浩沁軍浩沁使通事趙仲祥語就礪曰當先遥禮䝉古皇帝次禮萬努皇帝就礪曰天下安有二帝只拜䝉古皇帝就礪身長六尺五寸鬚過其腹浩沁見狀貌魁偉又聞其言大竒之引與同坐數日趙冲亦至浩沁置酒作樂以待㑹伐丹兵至江東城降之冲以契丹俘虜分送各道州縣擇閑曠之地俾之聚居給土田為業農為民俗號為契丹塲䝉古兵來屯鎮溟城外督納嵗貢崔忠獻死史臣曰忠獻起於微賤専執國命貪財好色鬻爵賣獄至於放逐二主多殺朝臣元惡大憝上通於天而得保首領天道之不可知乃如此耶七年義州别將韓恂郎將多智等殺其防守將軍以叛附東真兵馬使金君綏敦中之子遣使寄書於金元帥武格下誘誅之右諌議大夫李仁老卒仁老初名得玉自幼能屬文又善書與當時名儒吳世材林椿趙通皇甫沆咸淳李湛之結為七賢之游庚癸之亂祝髮游山後擢巍科性褊急見忤當世不為大用平章事趙冲卒諡文正冲永仁子生一月而母亡稍壯極哀慕家稱孝童風姿魁梧外莊重内寛和博聞强記諳練典故凡遇士愉愉然不施㦸級三掌禮闈所選多名士出入將相朝野倚重平時莅事未嘗露稜角故世徒知其為寛厚豁逹長者及持大兵臨大事然後乃知磊落不常之器矣為相開獨樂園於東臯每公餘必與賢士大夫逍遥以琴酒自娛卒年五十人皆惜之八年䝉古皇太弟遣珠格爾等來索土物獺皮一萬領細紬三千匹細苧二千匹緜子一萬觔龍團墨一千丁筆二百管紙十萬張紫菜五觔紅花藍筍朱紅各五千觔雌黄光漆桐油各千觔以金希磾知詩禮有膽畧善辭語為𩔖㑹使以待䝉使凡所開説莫不合理故前後使者皆服其處分珠格致詰希磾荅曰其迎迓之禮與夫國贐等事敢不盡心然君在都䕶府手射一人死生未可知若生則君之福死則君之一行必見拘留珠格慙服又䝉使與東真人來在客館宴飲唱和東真使先唱云東君初報暖希磾即和云北帝已收寒客使曰有何意而賦此句耶荅曰君以春意唱吾以春事和之客使歎服不復詰九年金天光元年城宜州和州鐵闗凡四旬而畢十年以平虜鎮女生九子皆有文武才嵗給租終其身大將軍李克仁謀誅崔瑀被殺右副承宣李公老卒公老文章富贍尤工於四六充趙冲幕獻擒敵之策多有中者及拜承宣王倚為心腹將大用之病卒家無甔石十二年宋理宗寳慶元年金正大二年崔瑀置政房於私第舊制吏部掌文銓兵部掌武選第其年月分其勞逸標其功過論其才否具載於書謂之故案中書擬升黜以奏之門下承制勅以行之自崔忠獻擅權私取案注擬除受授其黨與為承宣謂之政色承宣僚佐之任此者三品謂之政色尚書四品謂之政色小卿其㑹所謂之政房至是百官詣私第上政簿瑀坐聴事受之六品以下再拜堂下十四年崔瑀遷前王于喬桐初森溪縣人崔山甫犯罪而逃變姓名周演之以隂陽占術惑衆瑀召語親信一日宻語瑀曰公有王侯之相瑀以語腹心金希磾希磾問演之演之詣瑀曰宻語洩恐禍及瑀謂演之侮已㑹有人譖瑀曰頃者公有疾希磾等㑹演之家謀欲害公奉前王復位瑀信之遷前王於喬桐沉演之於海又沉希磾子宏已希磾時在全羅州道捕者至略無懼色自投於海遣及第朴寅聘于日本時倭賊侵掠州縣遣寅講和諭以歴世和好日本推檢賊倭誅之齎和好牒來十七年宋紹定三年䝉古太宗二年平章事琴儀卒儀體貌竒爽器度雄偉少力學善屬文嘗監清道剛直不撓民目為鐵太守與人面折無所諱然諂事崔忠獻敭歴華要頗用事門生皇甫瓘夜詣直廬作詩諷以休官儀以告忠獻流瓘于島太倉八廩地庫皆災崔瑀弟珦作亂於洪州知事敗自殺十八年崔瑀妻鄭氏死王命用順徳王后例𦵏䝉古元帥薩喇達將兵攻咸新鎮副使金僴防守將軍趙叔昌叔昌冲之子降叔昌為書諭朔州宣徳鎮使迎降鐵州郎將文大判官李希勣皆拒戰死之王以蔡松年為北界兵馬使仍徴諸道兵䝉古兵圍龜州三旬百計攻之兵馬使朴犀及分道將軍金慶孫随機設備應變如神䝉兵不克乃退史臣曰朴犀金慶孫以孤城弱卒拒天下方張驁之敵使不得東下屹然如山岳吾東方善守城者安市之後又有龜州犀慶孫之功誠不細矣䝉古兵分屯京城四門外王遣閔曦徃犒仍結和親時元帥薩喇達駐軍安北都䕶府三軍皆降王遣淮安公侹講和初䝉使珠格爾還國道死䝉人疑我殺之構為釁十九年以慈州副使崔椿命不降䝉兵遣内侍李白全徃西京將斬之椿命辭色不變䝉古官人見之問知其人乃曰於我雖逆命在爾為忠臣我且不殺爾既與我約和矣殺全城忠臣其可乎固請釋之遣上將軍趙叔昌侍御史薛慎如䝉古上表稱臣獻方物䝉古西河元帥寄書并送金繒二匹其書稱令公者蓋指瑀也瑀使李奎報作淮安公侹書荅之崔瑀脅王遷都江華殺指諭金世冲瑀欲遷都以避䝉兵與宰樞議于其第人情安土重遷然畏瑀無敢言者俞承旦極言其不可世冲排門而入詰瑀遷都之誤瑀怒殺之王發開京入御江華客館金允侯射殺䝉古元帥薩喇達允侯嘗為僧避亂處仁城薩喇達來攻允侯射殺之王嘉其功授上將軍不受乃改攝郎將二十年金哀宗天興二年畢賢甫伏誅賢甫西京人與洪福源舉城叛殺宣諭使鄭顗兵馬使閔㬢討之獲賢甫送京腰斬福源逃入䝉古擒其父大純弟百夀于安子徙餘民于海島後福源在䝉古為東京總管領髙麗軍民降附四十城讒搆本國隨兵徃來時人以為吠主瑀官其父及弟選張暐為壻賂遺不絶讒搆稍弛自是兵陷州郡皆福源導之二十一年宋端平元年誅趙叔昌辭連畢賢甫侍中金就礪卒諡威烈就礪彦陽人節儉正直持軍嚴士卒不犯秋毫有酒即用一巵與最下者均飲故得其死力江東之役事皆讓于冲至臨陣制敵多出竒計以成大功然未嘗自矜為相正色率下人不敢欺真忠義人也冊崔瑀為晉陽侯二十二年太子納知奏事金若先女為妃若先崔瑀壻也後其妻因燈夕入内王以太子妃母僕從輿蓋服飾一如王妃平章事金仁鏡卒仁鏡初名良鏡才識精敏文武吏材俱贍文詞清新尤工近體詩賦世稱良鏡詩賦諡貞肅二十三年曲宴内殿僕射宋景仁作處容舞略無愧色䝉古兵又來渡義州江分屯安北府及嘉慈龜朔郭博之地遂入黄州至信安二州衝斥東南二道城邑二十四年宋嘉熈元年前王薨於法天精舍𦵏碩陵廟號貞宗後改熈宗遣將軍金寳鼎等如䝉古上表乞解兵䝉古遣使來詔諭召兵還自是麗使徃來不絶二十六年崔怡怡瑀也舊改名孽子僧萬宗萬全萬全後歸俗名沆皆聚無賴惡僧貨殖為業倚勢作威凌辱守宰二道按察使王諧金之岱獨不屈裁抑之時王諧按慶尚州道令曰民未納税先督私債者罪之二僧畏威不敢肆之岱按全羅州道萬全住珍島邵寺其徒號通知者尤恣横其所請謁之岱皆不納後至其營數其罪命縳而沉殺之然萬全以之岱㢘慎少過莫能害之平章事致仕李奎報卒奎報初名仁氐以夢奎星報異改之九嵗能屬文時號竒童稍長經史百家佛老之書一覽輒記放曠以詩酒自娛號白雲居士中第十年不調宰相禁省交薦之久司兩制為詩文不蹈古人畦徑横騖别駕汪洋大肆諡文順三十二年宋淳祐五年崔怡宴宗室及宰樞於其第時五月以八面銀釦貝鈿四大盆各盛氷峯又四大樽滿揷紅紫芍藥十餘品結棚為山張繡幕置彩帛山張羅幃中結鞦韆飾以文繡綵花八坊廂工人皆盛飾入庭奏樂絃歌鼓吹轟震天地賞賜金帛鉅萬三十三年䝉古定宗元年冬十月雨毒蟲其蟲身裹細網剖之如斫白毛隨飲食入人腹中或咂入皮膚人輒死時號食人蟲試以諸藥不死塗以葱汁便死晉州副使王諧卒諧少登第拜監察御史守法不撓為晉州吏畏民懐及遷東都留守老幼涕泣請留遂復舊任沈毅剛正清白有大節其所計畫皆利於國三十五年以崔沆為樞宻院知奏事沆即怡子僧萬全也怡分與家兵五百餘人三十六年崔怡死其子沆服䘮二日而除及𦵏杜門不出烝父所愛諸妾宣㫖云晉陽公怡左右輔弼三韓如仰父母今忽棄世無所依頼子沆繼世鎮定可超授相位三十七年崔沆權除清州金州洪州及安東京山府等處徵納雪緜子黄麻白苧布魚染船税等物以收人心崔沆以司天臺事崔允旦大史丞吳安矩奏星變皆罷之時言路塞惟司天據占直奏欲使修徳自此日官之奏亦廢貶知刑部事庾碩為安北都䕶副使碩應圭孫性剛直嘗忤崔怡竄蓮花島沆繼政欲收人望召為知刑部金寳鼎李輔以私怨訴沆出之尋卒初碩為安東都䕶副使怡信讒流岩墮島將行老幼遮道號哭其妻亦擕子女以行鄉人各出人馬䕶送其妻辭曰家公流配妾與児息皆罪人何煩人馬鄉人固請竟不許後為東北面兵馬使前有一官以江鰩柱餽怡因以為例江鰩柱海物捕之甚難一禁絶之流民盡還碩清白守法不阿權貴屢以微過見斥執節不少屈樞宻院副使權守平卒守平嘗貧居遞食竄外人卜章漢田及章漢遇赦還守平素不知識且其田租已漕於江而袖租簿就與之章漢拒不受曰還其田亦足矣何用租為相讓久之守平竟投簿而去時用權貴子弟補牽龍守平辭以家貧親舊勸改娶富家曰貧富天也何忍棄糟糠之妻以求富室言者慚服三十八年守司空左僕射孫抃卒抃初名襲卿性剛毅長於吏事剖决如流嘗按慶尚有一民臨死有女長而已嫁末子在襁褓其財産盡與女而與子者只緇衣冠各一繩鞵一兩紙一卷而已文契甚明子長乃訟久未决抃召二人問曰父没時母安在曰先亡子年㡬許曰在齠齓抃因諭之曰父母之心於子女均也夫豈厚於有家之女而薄於無母髫齓之子耶顧兒所賴者姊也若遺與女等恐其愛之或不至養之或不全耳兒既長則欲此紙作狀服緇衣冠履繩鞵以告於官也兒與姊聞而感悟相對而泣遂中分與之抃且以妻派聨孽不得拜清要其妻勸改娶不聼崔沆流繼母大氏於海島尋弑之滅其族又殺樞宻院副使金慶孫初大氏助外孫金籹不右沆故沆怨之沉前夫子吳承績於海承績因潮退得不死沆聞之捕索殺之以慶孫為姻親又沉殺之慶孫台瑞子其母夢青衣童自天墮懐中遂有娠而生故初名雲來頭上有起骨龍爪怒則鬚髮皆立智勇絶人守黽州平羅州功無與比四十年宋寳祐元年䝉古憲宗三年以崔沆為門下侍中判吏部御史臺事沆在家遥謝䝉古主又以雅克為元帥統兵渡鴨緑江分攻國内諸州縣仍𫝊詔責以不出降迎命䝉兵陷春州文學曹孝立死之孝立知城不守與妻赴火死四十一年李峴伏誅峴性貪婪好傷人嘗為選軍别監多受賄賂人號銀尚書及使䝉古被留二年説雅克受金牌為鄉導常隨䝉軍諭降諸城軍中所獲婦女財寳盡為己有銀釵至滿一笥他物稱是及誅有人蹴其口曰喫盡㡬人銀帛耶廵門使李純孝性清白處事如流嘗使䝉古無一物齎還囊橐皆空遣門下平章事崔璘如䝉古元帥竒嚕逹屯所請罷兵車羅大言崔沆奉王出降則兵可罷是嵗䝉兵所虜男女無慮二十萬六千八百餘人殺戮者不可勝數所經州郡皆為煨燼自有䝉兵之亂未有甚於此也竒嚕逹繼雅克又領兵五千來四十二年以崔竩為殿中内給事竩沆之婢妾出也沆無適子欲以為嗣四十三年制諸道被兵凋殘租賦耗少其令州縣其人耕閒地收租補經費國初選州郡鄉吏子弟為質於京謂之其人以䝉兵停發六道宣㫖使時奉使者剥民横斂以固恩寵民甚苦反喜䝉兵之至金守剛還自䝉古守剛從䝉主入和林城乞罷兵主以不出降為辭守剛奏曰譬如獵人逐獸入於窟穴持弓矢當前困獸何從而出又氷雪慘冽土脈閉塞則草木豈能生哉主嘉之曰汝誠使乎當結兩國之好遂遣徐趾來命班師車羅大等收兵北還平章事崔璘卒璘屢使䝉古有専對才四十四年崔沆死王即以其子竩為借將軍贈沆為晉平公四十五年流宋吉儒於揪子島吉儒性貪酷諂事崔沆嘗為掖别抄鞫囚縳兩手拇指懸於梁架合結兩足拇指縋以重石去地尺餘熾炭其下使兩人交杖腰膂囚不勝毒皆誣服及為慶尚道水路别監有不從令入島者必朴殺之又奪人土田財物按察使宋彦庠劾報都兵馬其書至都堂其黨金仁俊等營救之竩舅巨成元拔聞之以告竩竩怒流吉儒罵仁俊等仁俊始與竩相疑貳栁璥與金仁俊林衍等誅崔竩王御康安殿百官陳賀如新即位𤼵竩家貲分賜有差金仁俊請除宦者金仁宣參職王亦欲授之恐後人援以為例終不許䝉古誅其總管洪福源初永寧公綧之入質也寓於福源漸積不平以福源作木偶咒咀奏於帝帝遣使騐之蹴殺福源以故其子察球爾謀陷本國無所不至䝉古竒嚕達復來侵桑節大王等亦領兵來屯古和州之地即今永興府殺守將慎執平於是和州迤北皆附於䝉古䝉古乃置雙城總管府於和州趙暉卓青等引䝉兵殺掠州縣至是以暉為總管以青為萬户四十六年宋開慶元年春二月燃燈宴諸王宰樞王再舉手以示羣臣曰凡赴宴者拍手以助予樂酒闌王猶樂甚羣臣拍手踊躍汗流被體至暮乃置遣太子倎奉表如䝉古參知政事李世材等四十人從行斂百官銀布以充其費國贐䭾馬不足抑買路人馬以故乘馬者少判衛尉事河干旦卒干旦善屬文事大表箋多出於手命營假闕於三郎城及神泥洞王問延基之地於術士白勝賢勝賢請創闕以試其驗王疾薨時太子倎入䝉古未還大將軍金仁俊初欲立安慶公卒從兩府議奉太孫諶入大内權監國事史臣曰康宗外為强敵所逼内為權臣所脅跋前㚄後動必掣肘棄宗廟捐城郭寓居海島操縱進退不出於强敵則必出於權臣真所謂寄生之君耳然循黙端拱以正自處享國垂五十年豈非麗運未窮天之眷顧未怠而黙有所相歟諸功臣畋於江外置酒張樂逹曙時國恤未終濟州副使金之錫蠲豆馬之貢濟州舊俗凡男年十五以上者嵗貢豆一斛衙門吏數百人各嵗貢馬一匹之錫並蠲之政清如水吏民懐服先是有慶世封者守濟亦以清白稱州人曰前有世封後有之錫元宗順孝王諱徳字日新舊諱倎髙宗長子母安恵太后栁氏以太子入朝䝉古髙宗薨明年還國即位元年宋景定元年䝉古世宗中統元年太孫以判禮賔省事羅得璜為濟州副使州人語曰昔經小盗今遇大盗言前守宋佋坐贓免時又有知天文而拜太學博士者能暴虎而為侍御醫者人嘲之曰占星太學博捉虎侍御醫太子倎自䝉古還即位於康安殿初太子自燕京赴憲宗行在過京兆潼闗中主者迎至華清宫請浴温泉太子曰此唐明皇所嘗御者雖異世人臣安敢䙝乎聞者嘆其知禮門下侍郎平章事致仕崔滋卒初滋名安崔怡嘗品第朝士手疏屏風當銓注輒考閲而叙之滋名在下故十年不調一日怡謂李奎報曰誰可繼公文秉者對曰有學諭崔安者及第金坵其次也怡乃試才時李儒李百順河干旦李咸任景蕭皆有文名怡欲試才令製書表使奎報第之凡十選滋五魁五副遂超擢代奎報掌文柄金仁俊等舉義反正滋時為冡宰以清嚴鎮俗太府少卿張季烈等還自䝉古主呼必賚曰朕即祚後爾國最先來賀朕甚喜焉賜衣帛王聚宫女於水房淫縱無節御史大夫金仁俊移置水房於房四年遣大官署丞洪泞詹事府録事郭王府如日本國請禁賊船初約以嵗常進奉一度船不過二艘至是有賊船二艘犯境故請禁之以李藏用守太傅判兵部事栁璥守太保參知政事金俊守太尉參知政事判御史臺事俊即仁俊五年秋八月王如䝉古命金俊監國李藏用從行王入䝉古永寧公綧言於中書省曰髙麗有三十八領領各千人若遣我當盡率來為朝廷用史丞相召藏用問之對曰我太祖之制蓋如此比來死於兵荒雖曰千人其實不然請與綧東歸㸃閲綧言是斬我我言是斬綧綧在側不敢復言又問髙麗州郡户口㡬何曰不知曰子為相國何為不知藏用指窗櫺曰丞相以為凡㡬個丞相曰不知藏用曰有司存宰相焉能盡知丞相黙然冬十二月乃還六年宋度宗咸淳元年䝉古至元二年以金俊為侍中封海陽侯王以俊誅權臣且有擁立功凡封爵立府一依晉陽公故事七年平章事致仕金之岱卒䝉古聽趙彞言彞本我國咸安人為僧歸俗入䝉古能解諸國語讒毁本國為事欲通和日本乃遣哈達殷宏等來令本國為嚮導王命宋君斐金賛與哈達等往日本至巨濟松邊浦畏風濤而還即令君斐隨哈達如䝉古奏其故䝉古又遣哈達偕君斐來諭書以責王又遣起居舍人潘阜齎䝉古書及國書如日本亦值風濤不達而還於是䝉古欲征日本遣托多爾等來閲軍額戰艦仍視日本水道黒山島七年北界四十餘城上書請金方慶復來鎮撫王乃以方慶判禮賔省事北界兵馬使誅金俊夷其族俊奪龍山别監李碩所獻内膳船二艘納其家未㡬見王王以碩所上膳狀示俊俊變色而退由是王益惡俊俊列置農莊以家臣文武柱管全羅池濬管忠清二人爭事聚斂諸子效之競聚無賴怙勢恣横侵奪人田怨讟甚多時林衍與俊有隙且揣知王惡俊宻與宦者康允紹謀遂言於王召俊至便殿使人斬之夷其族並誅其弟冲冲清介自守見其兄所為常切責及誅人皆惜之其黨誅流殆盡羣臣表賀遣使䝉古奏誅俊十年流平章事栁璥於黒山島初璥與大司成金坵禮部郎朱悦友善數相過從容談笑璥日聞衛社事以為實然命見其人皆羣小也又論古史言及當世宦官之事金鏡聞而銜之訴於王遂籍其家流之王又召坵切責之並流悦於島世子諶如䝉古林衍反立安慶公淐廢王幽之宦官金鏡崔等既與衍誅金俊勢傾朝野衍恐將害已乃收等斬之集三别抄六番都房于氈庭與宰樞議廢立侍中李藏用以遜位為言參政俞千遇曰此大事也請公反復思之况今世子在上國待其還亦未晚也衍未決罷翼日衍㑹百僚奉王弟安慶公淐即位遣郭汝弼如䝉古以遜位請世子諶自䝉古還至婆娑府聞變静州官奴丁伍孚奔告時因從官羅裕策止行乃執奏告使郭汝弼悉得其狀痛哭還䝉古西北面兵馬使營闕吏崔坦韓慎等起兵以誅林衍為名嘯聚龍岡咸從三和人殺西京留守及諸邑守令以反乃以西京附䝉古請兵三千來鎮之䝉古主賜坦金牌其徒李延令三和人銀牌仍令内屬改號西京為東寧府畫慈悲嶺為界初平章事洪鈞再鎮北界人懐其恵以父稱其子禄道代李信孫為兵馬使至營十月亂作坦不加害禄道奔還以張鎰代之原闕矢石俱盡士皆中矢不能起方慶據胡床指揮將軍楊東茂以䝉衝撃救之賊解去乃潰圍而出十二年侍中李藏用免䝉古布哈等宣言林衍廢立時與謀者尚在朝列不正其罪何以懲惡遂免宻城人方甫桂年等嘯聚郡人殺副使李頥欲應珍島賊未㡬為其黨趙阡所斬賊遂平官奴崇謙等聚其徒謀殺逹嚕噶齊及國中在位者徃投珍島賊逹嚕噶齊托多爾與察球爾㑹宰樞捕崇謙等按問皆服察球爾欲使辭連本國因謀起兵襲取京城托多爾執不可斬崇謙等四人餘悉釋之隊正宋思均告變拜攝别將䝉古遣實都及史樞代阿海行經畧司於鳳州等處營軍屯田實都奏䝉古云叛臣裴仲孫稽留使命負固不服乞追討從之先是䝉古下詔諭之仲孫勒留䝉使不受詔金方慶又與實都等討珍島賊大破之斬偽王淐賊黨金通精率餘衆竄入耽羅淐永寧公綧母兄也綧囑熈雍當救兄死察球爾先入殺淐及其子桓初卜還舊京得半存半亡之兆淐以亡者為出陸存者為入海乃随賊南下曰龍孫十二盡向南作帝京之讖於此騐矣王遣鄭子璵如䝉古謝平賊時䝉古兵討珍島者六千人馬無慮一萬八千加以鳳州屯田農牛亦不下五六千其糧餉一令本國供辨中外俱困民食草木之實制將軍𤣥文奕妻直學鄭文鑑妻皆投水而死不為賊汚節義可賞加封贈官其子孫右副承宣洪子藩奏曰比來不親聽政凡有司章奏一委宦豎出納中外觖望請自今復親庻政以慰輿望王不納時臺諌及士大夫緘黙保位自謂有智唯子藩讜論如此時議多之逹嚕噶齊托多爾告王曰我兵之戍南方者侵掠州郡民不聊生宜遣使諸道安撫於是遣張鎰于慶尚朱悦于全羅郭汝弼于忠清逹嚕噶齊托多爾卒䝉古所遣留國中聽斷國政者托多爾沉重寛厚撫恤人民聽斷明白未嘗枉法及疾作國醫進藥托多爾郤之曰我病殆不起若飲藥而死則讒搆爾國者必曰髙麗毒之遂不飲而卒䝉古建國號曰大元十三年置東西學堂以判秘書省事金軌尚書左承宣文烈為别監大府注簿姜渭賛文習圭等祝髪而逃時大府虛竭官吏雖殫私財以供御亦不免徵責渭贊等不堪其苦辭職不許故逃去十四年金方慶與元實都察球爾等討耽羅賊中軍入自咸徳浦左軍入自飛揚島攻破内外城賊魁金通精遁入山中賊將李順恭曹時適等降斬金元允等六人耽羅遂平於是實都留元兵五百方慶亦使將軍宋甫演等領兵一千留鎮而還王以方慶為侍中遣方慶子金綬如元告平耽羅以俞千遇為中書侍郎平章事十五年元遣總管察呼監造戰艦三百艘察球爾監督又發征東兵萬五千人及漕運東京米二萬碩仍令本國發軍五千助征日本國元遣使來索婦女以妻蠻子以衣冠子弟從王為圖嚕古者分番宿衛號和克齊王不豫薨於堤上宫遥尊世子諶為王諶在元未還元冊諶為王王至自元謁殯殿始服斬衰𦵏韶陵釋服史臣曰元宗之薨在六月間二月而世子以吉服受朝賀宴使臣又閲月而始服衰三日而釋之其服也何如是其緩其釋也何如彼其急也及王之薨忠宣當䘮未𦵏縱情犯禮者其家法所由來漸矣都督使金方慶將中軍朴之亮金忻知兵馬事任愷為副使金侁為左軍使韋得儒知兵馬事孫世貞為副使金文庇為右軍使羅裕朴保知兵馬事潘阜為副使號三翼軍與元都元帥呼敦左右副元帥察球爾劉復亨以䝉漢軍二萬五千我軍八千梢工引海水手六千七百戰艦九百餘艘𤼵合浦今昌原越十一日至一岐島倭兵陣於岸上諸將力戰斬千餘級遂捨舟三郎浦分道以進倭兵大敗伏屍如麻方慶請復决戰呼敦不聽乃引兵還㑹夜大風雨戰艦觸巖崖多敗金侁墮水死及還合浦軍未還者無慮萬三千五百餘人王遣竒藴迎公主親幸西北面逆之以元服同輦入國觀者駭愕時從行宗宰不開剃元制剃頂至額方其形留髪謂之察球爾王責之史臣曰大元威制天下元宗親朝欵附得結姻好摧伏權奸宜可以少紓國患而反見侵擾國家亦多故矣朝鮮史略卷八
