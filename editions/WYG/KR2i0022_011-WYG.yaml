body:
  text: 朝鮮史畧卷十一髙麗紀恭愍王諱顓古改祺䝉古諱巴延特穆爾忠肅子忠惠弟元年元至正十二年金羅道萬户栁濯持軍嚴整不擾州縣與士卒同甘苦賜教書衣酒勞之王結髪監察大夫李衍宗諫之王悦解之賜衍宗衣褥以寵之衍宗附趙日新拜是職後日新被劾恐禍及棄官歸田里史臣曰衍宗姦諛憸佞之尤者也其諫王結髪皆欺世盗名後趙日新恃功專恣衍宗為憲長阿附不劾若非日新事安知衍宗一生之真偽哉罷政房宥裴佺史臣曰元惡大憝當置于法佺用事於明陵以紊政刑其得免竄殛幸矣而王於發政之初曲貸其罪何以懲李齊賢避日新之忌三上書辭職不許李穡上書言時事曰正經界曰禦倭寇曰論文武曰崇學校曰抑異端召僧普虗入内問法虗曰為君之道在修明教化不必崇信佛法若不能理國家雖致勤於佛有何功徳無已則但修太祖所置寺社慎勿新創又曰君王去邪用正則為國不難矣虚後改名普愚封為王師立府曰圓融置官屬出入内佛堂多占田園牧馬滿野擅除僧職僧徒競趨吉昌府院君權凖卒忠肅與瀋王相持羣不逞多附瀋王凖守義不變曹頔之亂凖閉門不出性純重寡言笑儀表秀偉望之巍然可尊然倚勢占奪土田招納賄賂以致鉅富識者譏之趙日新作亂犯行宫殺宿衛臣僚日新與其黨鄭天起崔和尚等十餘人募閭里惡少謀去竒轍輪轅髙龍普李壽山等乗夜分捕之皆逃散唯執轅殺之圍行宫殺直宿崔徳林等四人刼王開御寶自為右政丞鄭天起為左政丞官其黨有差旋欲歸罪其黨以自免即斬崔和尚固請王幸十字街捕斬張升亮等八九人下天起于獄斬其子明道自加功臣號王宻召李仁復决議執日新誅之隂霾開霽於是以李齊賢為右政丞曹益清為左政丞流金鏞于海島史臣曰易曰履霜堅氷至夫亂賊之徒隂圖不軌非一朝一夕之故其所由來者漸矣趙日新嘗蓄無君之心暴横驕恣㺯權自專不待行宫之變而知其有叛亂也行宫之變宿衛将士皆被殺戮鏞獨免焉鏞之亂逆又豈待興王之變然後知也哉當日新之搆逆鏞亦與謀王不辨之於早馴致堅氷之禍豈不深可惜也二年李穡擢元朝制科第二甲第二名勅授應奉翰林文字承仕郎同知制誥兼國史編修官三年元徴將士討張士誠王以亷悌臣栁濯等四十餘人率軍士二千餘人赴征元丞相托克托欲討髙郵賊張士誠以帝命召悌臣濯及鄭世雲崔瑩李芳實安祐等四十餘人悌臣率兵如元以國人在燕京者緫二萬三千人為前鋒城将陷韃靼知院老長忌我國人專其功令曰今日暮矣明日乃取之麾軍而退其夜賊堅壁設備明日攻之不克拔㑹有人譖托克托帝流托克托于淮安自後南賊日盛我軍陷六合城又移防淮安路李權崔謜等六人戰死崔瑩力戰身被數鎗五年日無光中有黑子者連日竒轍權謙盧頙等謀反伏誅轍倚竒皇后之勢謙頙亦皆納女于元聲勢相依知天下亂自念積惡歛怨恐一朝勢去難保将圖大逆王先知之託以曲宴召轍謙頙並誅之并誅流黨與罷征東行中書省理問所停至正年號復舊官制以洪彦博為門下侍郎尹桓守門下侍中命印璫姜仲卿崔瑩及栁仁雨貢天甫金元鳳等討鴨江以西雙城以北初龍津人趙暉以雙城等地叛入元自髙宗戊午咸州以北皆没于元雙城人趙小生千户卓都卿寺丞趙暾小生叔父舉兵為拒守計仁雨乃以蠟書遺暾暾誘小生謀主趙都赤都赤遂來附於是仁雨與我桓祖時為雙城千户攻破雙城收復和登定長預髙文宜州及宣徳元興寧仁耀徳靜邉等鎮諸城小生等逃入伊板嶺北立石之地仁雨貪財好殺戮及都赤為千户忌而殺之北人歸附之心遂沮都堂令百司議幣諫官請廢銀瓶銀瓶重一斤直布百餘匹價重買寡用銀錢其議畧曰銀一兩其直八匹宜令鑄為錢隨其兩數以准帛穀多寡比之銀瓶鑄造易而用力少比之銅錢輸轉易而取利多并用五升布則公私便六年王聽僧普愚䜟説命李齊賢相宅于漢陽築宫闕致仕尹澤上言曰妙清惑仁廟㡬至覆國厥鑑不逺矧今四境有虞訓兵養士猶懼不給興工勞衆恐傷本根命寫無逸篇賜宰臣命尹澤講澤因陳周公輔成之勞乃言曰願殿下法成王能聽周公之訓嚴恭抑畏社稷之福王為改容澤嘗乞以大學衍義及崔承老上成宗書進講又諫王信佛又勸節用上皆深納之下蔡河中于獄自殺河中初流順天有僧逹禪自河中流所訪全贊曰蔡相欲與公謀大事語泄繫禪廵軍逮捕河中拷掠累旬河中誣服自縊斬于市門下侍中致仕李凌幹卒忠宣王嘗以所幸二姫賜凌幹及白文舉凌幹置姫别室莫敢犯従忠宣在元為盤纒别監同事者皆致富􅇒幹獨清苦自勵冬月破布單袴不私一錢及王竄吐蕃􅇒幹懐金潛附驛吏獻王王及從臣賴以不乏忠宣薨奉柩東歸號呼跋渉勤苦備至政堂文學安輔卒輔性剛直亷潔不事生産及没家無甔石之儲分遣諸道鹽鐵别監諫官李穡田禄生李寶林鄭樞等上書諫之左諫議南兢獨以為便乃遣之司天少監于必興上書言玉龍記云我國始于白頭終于智異其勢水根木幹之地以黑為父母以青為身若風俗順土則昌逆土則災風俗者君臣百姓衣服冠蓋樂調禮器什用是也今後文武百官黑衣青笠僧服黑巾大冠女服黑羅又於諸山栽松茂宻凡器用鍮銅瓦器以順風土從之復歸銓選于吏兵部七年趙小生卓都卿逃據海陽張士誠方國珍並遣使獻方物時國珍據台州士誠據江浙八年門下侍郎李承慶兆年之子言于王曰臣以李仁復為奸人王曰何謂也曰仁復平生所學經濟之術何不一陳於王東北面兵馬使鄭暉獻海青王曰今軍務方興宜崇儉約安用珍禽放之紅頭賊偽平章毛居敬衆號四萬氷渡鴨緑江陷義州靜州靜今并入義州殺守將朱永世金元鳳遂陷麟州今并入義州王以侍中李嵓為都元帥慶千興為副元帥金得培為都指揮使金希祖為西海道都指揮使安祐為安州都萬户李芳實為上萬户以禦之嵓不能軍賊陷西京刼掠州郡遣李承慶代之九年李芳實遇賊于鐵化斬百餘級諸軍次生陽驛進攻西京賊退屯龍岡咸從安祐等進軍咸従再戰斬二萬級虜偽元帥黄志善賊退保甑山李芳實以精兵一千騎追賊至延州江安祐金得培金於珍亦率精騎繼至是夜賊遁芳實蓐草追至古宣州斬數百級餘賊三百餘人一日一夜至義州渡鴨緑江而走遂班師王賜李承慶等功臣號斬黄志善倭冦全羅道沃溝等處及楊廣道平澤等十餘縣至喬桐京城戒嚴以栁濯為京畿兵馬都統使李春富東江都兵馬使我桓祖為西江兵馬使發丁坊里為軍又令百官助戰諫官詣宫門拜辭㕘政鄭世雲曰諫官従軍古所未聞王特免之國子博士等上言學官従軍古無其例亷悌臣李嵓皆曰爾雖不侍孔子孔子焉逃僉書金希祖爭之不得平章事李承慶卒承慶入仕元朝亷訪諸路以能斷决聞京城大饑布一匹直米五升以偰遜為髙昌伯遜髙昌國人王在元有舊後避兵挈家東來十年政堂文學尹澤曰臣深荷毅陵之知無報萬一乞命工寫睟容以賜臣於村荘日夕瞻敬又曰近來饑饉薦至加以師旅民病極矣前既構南京之闕今又營白嶽之宫民何以堪又曰用人為政之本進賢退不肖又曰凡事得失上意雖灼知其然委之大臣未即區處因仍之間其害已成救之莫及澤雖致仕自以先朝顧託知無不言王亦優容以我桓祖為東北面兵馬使兼拜户部尚書本國人入彼土者皆順命出來未幾薨王悼甚士大夫咸驚曰東北無人矣上洛侯金永煦卒永煦性嚴毅沉重親姻故舊有匱乏者無不賙給其孫士安士衡年已冠或勸求官永煦曰子弟果賢耶國家自用之茍不賢耶雖求而得之其可保乎紅頭賊偽平章潘誠沙劉關先生朱元帥等十餘萬衆渡鴨緑江冦朔州泥城以李芳實為西北面都指揮使金得培為都兵馬使安祐為上元帥擊之我軍敗績于安州賊又攻破岊嶺柵我軍大潰安祐等奔還王知事急奉太后南幸崔瑩大呌請守京城不聽次利川縣是日賊陷京城至福州即今安東留駐以鄭世雲為總兵官拜中書平章事督諸軍討賊十一年鄭世雲與都元帥安祐元帥金得培李芳實及我太祖大破紅賊復京城餘黨奔渡鴨緑江而走獲元帝玉璽二顆金寶一顆金銀銅印等物金鏞矯㫖令安祐等殺鄭世雲鏞素與世雲妬寵又恐祐芳實得培等成大功為王所重欲使祐等殺世雲因以為罪而并盡殺之乃矯㫖為書使其姪金琳宻諭祐等令圖世雲且曰世雲素忌卿等盍先圗之祐與芳實齎鏞書就得培議之得培曰昔穰苴擅誅荘賈衛青不殺蘓建古今明鑑不可不慎若不獲已執至闕下聴上區處堅執不可祐等强之於是置酒邀致世雲令壮士擊殺之王自福州還至尚州安祐凱還詣行宫上謁金鏞宻令門者搥其首祐顔色自若三指所佩囊大呼曰姑少緩願獻上前後就戮搥者更擊殺之囊書即鏞紿祐等令殺世雲書也鏞恐金琳泄其謀先斬之遂白王曰祐等擅殺主将不可赦乃禀宣㫖分捕芳實得培並殺之觀者莫不嗟悼史臣曰生殺人主之大柄安有人臣擅殺大臣於宫門而君不知者乎是王之左右皆鏞腹心壅蔽耳目而然也又誣搆得培芳實之罪而分捕殺之王之昏暗何如是之甚耶昔宋督殺孔父而及其君今鏞殺三元帥而旋有興王之變亂臣賊子之為惡古今一也髙麗五百年間强冦侵軼殆無寧嵗賴有英雄豪傑文武智勇之才左右宣力能禦外侮而鎮國家者如徐熈之平丹冦姜邯贊之制契丹尹瓘之逐女真趙冲金就勵之定遼孽朴犀金慶孫之却䝉古金方慶之靖海冦功在社稷而為時君所倚重也今紅賊之變焚蕩宫闕屠戮生靈元帥克復廓清之功又有大於向之将相矣惜哉㨗音纔報而緫兵為賊鏞所圗三帥相繼遇害一國人人皆欲食鏞之肉而不可得王何不察以死報功乎鄭文忠夢周為文以悼之曰使泰山之礪轉為鋒刃之血蓋未嘗不痛恨於恭愍也陞福州牧為安東大都䕶府安城縣為郡降水原府為郡王之駐福也福人盡心供頓卒徴兵諸道收復京都紅賊之招降楊廣也水原最先下州郡莫敢挫其鋒安城獨以小邑設計殱賊賊不敢南下故割水原四部曲以𨽻之趙小生誘引納克楚時元亂納克楚據有瀋陽之地稱行省丞相入冦薩克繖等地薩克繖即北青以我太祖為東北面兵馬使以禦之太祖遇於徳山洞擊走之又戰于韃靼洞大敗之是戰納克楚妻謂其夫曰公周行天下復有如此将軍乎宜遜而歸其妹亦曰斯人也天下無雙納克楚敗歸後遣人獻馬于王且及太祖蓋心服之也置禄轉色自播遷來禄轉出納不任倉官别立一所謂之禄田色又増斂民米豆名曰無端米民甚苦之冬十月地震監察大夫金續命等上書論臣道淆亂以致地震王召臺諫詰之臺諫面爭益切王怒甚栁淑進曰既求直言而怒言者可乎王怒小觧濟川請𨽻于元元以副樞阿勒坦布哈為耽羅萬户十二年二月王發清州地震及駐駕都城南興王寺金鏞反遣其黨犯行宫宦者安都赤右政丞洪彦博死之是夜賊金守等五十餘人突至興王寺斬門者直入詐稱奉帝㫖宿衛奔散宦者李剛達負王走詣大妃宻室䝉毯而匿盗入王寢殿安都赤貎𩔖王欲以代王遂臥于寝内賊認為王而殺之至右政丞洪彦博所令曰出之帝命彦博正衣冠出見曰爾乃賊也何稱命㫖賊殺之又分遣其黨殺留都宰相㑹左政丞栁濯因朔例祝釐在妙蓮寺聞變将集兵討賊由間道至廵軍鏞獨不赴妙蓮先至廵軍揚言討賊令諸宰先詣行在與其門客華之元相目凡賊被執來者不訊輙殺滅口遂轘鏞于雞林府自宻城移囚于此傳首京城籍其家流斬其黨三十餘人王尚未忘鏞為之泣下遣贊成事李公遂如元進陳情表初諸竒敗皇后挾憾㑹崔濡在元諂事丞相搠思監及本國宦者朴不花又以金鏞為内應因説后謀搆王廢之而立徳興君忠宣孽子為僧時在元公遂竒后外従兄也至是入元竒后厚待公遂歴言王實無罪只以諸竒盛滿不知足所致耳后怒猶未己令公遂奉徳興君東歸公遂托疾請留崔濡亦囑徳興須率公遂東歸公遂聞之謂書状官林樸曰吾既無父母又無後位已極矣豈復有顧藉意耶當祝髪入山不從彼也二人入奏帝不允太子竒后出以帝命召公遂上廣寒殿指殿額及金玉柱皆在萬夀山問之公遂皆對以諷語太子以公遂言奏帝曰朕固知此老賢汝外家唯此一人耳三司右使金光載卒諡文簡鉉台子事忠定甚見委任及王即位杜門不出事母盡孝母没廬墓終制每時祭涕泣不止王命旌表所居曰靈昌孝子里家居不治生産左右書琴湛如也亷悌臣罷以栁濯為右政丞遥授李公遂為左政丞紅賊之亂悌臣䭾妻帑財賄車馬甚盛棄母而去母没不歛而𦵏㑹以金鏞姻好罷相元以徳興君為國王遣使收王印章王不出令百官陳兵衛以迎之使還百官耆老上書中書省請執送徳興君及崔濡十三年崔濡奉徳興君以元兵一萬渡鴨緑江圍義州弓庫門安遇慶七戰却之濡入據宣州候騎至定州遇慶又擊敗之虜其将宋臣吉刳以徇軍運慶為左翼我太祖為右翼崔瑩為中軍大敗賊兵于隨州之獺川奔還燕京者纔十七騎於是帝遣翰林學士承㫖竒田龍本國伊川縣人詔王復位執送崔濡王誅之以李公遂領都僉議洪淳李子松金庾等並除右職初徳興之來國人在元者皆從之唯公遂等不従故有是命十四年公主以難産薨葬正陵王手寫真日夜對食悲泣三年不御肉膳以妖僧遍照為師傅賜號清閒居士咨訪國政封真平侯照靈山縣玉川寺奴也為僧目不知書王夢人抜劍刺已有僧救之得免㑹金亢命以照見其貎惟肖王大異之與語聦慧辯給王素信佛又惑夢屢宻召入内與之談空李承慶見之曰亂國家者必此髠也鄭世雲以為妖僧欲殺之王宻令避之承慶世雲死髠而為頭陀復來見王始入内用事士大夫妻以為神僧聴法求福而來照輙私焉宻直金蘭引照主其家以其二處女與之崔瑩責之照譖瑩出為雞林尹照以其愛憎即譖于王陞黜百官或至誅流人皆趨附瑞興君栁淑初見遍照出入禁闥稍抑之及其進用中傷大臣虐焰可畏每被招不徃照深銜之且惡忠直䜛毁百端王稍信之乃召淑執手歎曰何其衰耗乃爾淑乞歸田里遂許之任君輔雖因遍照復相内懐慚愧嘗白王曰崔瑩李龜壽皆興王功臣何罪貶黜且師傅本僧也雖國朝乏人豈可使賤僧為政取笑天下王不聴君輔退謂人曰以累葉衣冠幸䝉上恩承乏政府使無識僧得肆其奸後世其謂我何金普亦屢言於王遍照䜛普罷相欲并斥君輔王以不可一時俱黜只罷普君輔自是不復預聞國事王復以遍照為領都僉議使司事封鷲城君始稱姓辛改名盹王請屈行以救世盹陽不應以堅王意曰恐王信䜛王乃手書盟辭以誓之盹於是與議國政用事三旬罷逐親勲名望冡宰臺諫皆出其口始出禁中寓竒顯家以為僧時素通顯後妻主中饋貪淫日甚賂貨輻凑百官詣門議事飲酒啗肉恣意聲色謁王則清談齕菜菓茗飲宻直提學李逹衷嘗於廣坐謂盹曰人謂公酒色過度盹不悦即罷之十五年前刑部尚書鄭云敬卒云敬剛直善治民嘗以書状如元竒后方寵中貴多東人來饋頗倨傲云敬正色曰今日之饋為舊主也中貴愕然曰秀才教我矣後任全州有元使盧某暴横所至􅇒辱守令疾馳入州欲罪以不及郊迎云敬引禮不屈即日棄去父老呼哭盧亦愧服留之不得其剛直𩔖此王觀呼旗國俗四月八日為佛生日家家燃燈羣童剪紙注竿為旗周呼城中街里施米布為其費謂之呼旗左司議鄭樞右正言李存吾上疏極論盹王大怒召樞等面責時盹與王並據胡床存吾叱之曰老僧何得無禮如此盹惶駭不覺下床王愈怒下樞等于廵軍獄命李春富李穡鞫之必欲殺之春富問樞等曰誘爾上疏者誰歟皆不服抗對激烈穡謂春富曰自我太祖以來五百年間未嘗殺一諫官今因令公殺諫官恐惡聲逺播春富等然之得免死貶樞為東萊縣令存吾為長沙監務自是盹之桀驁尤甚宰相臺諫附盹而言路塞矣初王在位日久宰相多不稱意嘗謂世臣大族親黨根連互相掩蔽草野新進矯情飾行儒生懶而少剛黨比徇情三者皆不足用也思欲得離世獨立之人以革其弊及見盹以其出於賤㣲無所顧藉故抜於髠緇授以國政而不疑也置田民推刷都監以辛盹為判事李仁任李春富為參佐婦人訟者有姿色盹外示哀矜誘致其家輙淫焉由是女謁盛行大起魯國公主影殿前政堂文學元松壽卒松壽參銓注八年慎重名器不少私王敬重見松壽至必起待之及盹用事以憂卒年四十三有宰相器國人惜之侍中栁濯享王王安兩妃在東辛盹在西盹戲王曰二妃年少聖體不已勞乎史臣曰龍樓建章之嚴尊卑所以定位桂掖椒房之邃内外所以别嫌也而恭愍之於盹寵眤亦甚内外無禁當享徳寧也與盹入見驚母后心其選二妃也與盹共觀今濯之享也盹及王妃坐分東西使淫􅁾之賊䙝近宫闕雖戲侮不遜亦莫之恤是何心哉平居不嚴宫闈内外之别長姦宄肆伴奐無涯之心則将何以禁其未然乎十六年有民兄弟偕行弟得黄金二錠以其一與兄至陽川江同舟而濟弟忽投金于水兄怪而問之答曰吾平日愛兄甚篤今而分金忽萌忌兄之心此乃不祥之物也不若投諸江而忘之兄曰汝言誠是亦投金于水時同舟者皆愚民故無有問其姓名邑里云以判開城府事李穡兼大司成增置生員又選經術之士金九容鄭夢周朴尚裏朴宜中李崇仁等皆兼學官初館生不過數十穡更定學式每日坐明倫堂分經授業講畢論難忘倦於是學者坌集程朱性理之學始興時經書至東方只朱子集註耳夢周講説𤼵越出人意聞者頗疑及得胡炳文四書通無不脗合穡曰夢周論理横説竪説無非當理推為東方理學之祖以僧千禧為國師禪顯為王師二僧皆盹所善者王九拜禪顯立受百官朝服就班盹獨戎服立殿上顧謂史官尹紹宗曰毋妄書國事吾将取觀之知都僉議呉仁澤與前侍中慶千興等八九人宻議曰辛盹邪佞隂狡好䜛毁人斥逐勲舊殺戮無辜黨與日盛道詵記有非僧非俗亂政亡國之語必是此人宜白王早除之判書辛貴聞之以告盹盹入告于王捕繫仁澤等並杖流南裔雞林府院君李齊賢卒諡文忠齊賢頊之子自幼嶷然如成人忠宣留元構萬卷堂姚燧閻復元明善趙孟頫等諸學士咸逰王門齊賢周旋其間學益進天資厚重加以文學發於議論措諸事業俱有可觀平生未嘗疾言遽色自號益齋人無貴戚皆稱益齋然不樂性理之學無定力嘗權行省陞陛上拜表儀衛與王無異人譏之林樸好詭異又喜立名嘗自言但知奉公未嘗千謁然每夜敝衣徒行出入盹家為盹畫計蹤跡詭秘且譽盹盛徳盹悦之譖罷劄子房知印成石璘以樸代之自是樸善伺候王意又揣盹好惡惟務迎合見遇日宻史臣曰樸名士也當紅冦之㨗運籌戎幕當徳興之變誓死不從出使耽羅秋毫不犯屢抗疏定科舉之法陳時政之弊當時物論孰不以樸為賢為能也哉使樸死於徳興之變而不至於今日則一生終始千載之下孰得而知者哉十七年元至正二十八年大明太祖洪武元年罷國子監試都僉議侍中栁濯與鄭思道上書極諫影殿之役自上輪寺移營于馬巖王怒下濯等于廵軍欲殺之命李穡製教諭衆穡請罪名而不奉教王大怒并下穡于獄使李仁任鞫之穡曰今濯在獄穡為問事官而敢盡言者欲王動心省悟也因泣下仁任具以聞王感悟命釋濯等𤣥風人郭儀每遇名日徃靈山奠盹父墳令直墳者具辭逹盹盹喜召之拜正言後除按亷使辛盹殺栁淑初淑之退歸也於餞席作詩末云不是忠衰誠意薄大名之下久居難盹隂求淑罪有人為盹誦此詩盹譖于王曰淑以句踐比上范蠡自比罪莫大焉王乃命杖之除名籍没旽遣人縊殺之初家人送龍腦又謂不如走乃送良馬淑曰君父天也天可逃乎死生有命亡将何之遂就死顔色如平時人皆為之流涕其子實與厚皆流竄及盹誅王始知其然悼甚雪其寃諡文僖金文鉉譖辛旽弑其父逹祥及其兄君鼎初文鉉夜入其兄君鼎妾房見捕其父欲黜之故譖於旽遣禮儀判書張子温聘于吴王王禮接甚厚使六部御史臺宴會至臺宴日張樂大夫謂子温曰憲司之㑹未曾用樂今日之樂為使臣耳子温曰樂以和為主諸公既以和氣相接何必用樂夫子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉大夫曰尚書既知禮樂之本不必用樂乃止吴王聞之加厚禮以遣史臣曰子温市井之人也尚以一言見重於他國以盗一時之譽則其使於四方者選用士大夫有學問者遣之可也十八年用循資格大明太祖髙皇帝遣符寶郎偰斯賜王璽書以諭之於是停元至正年號行洪武年號七月為始王遣洪尚戴如大明賀登極王謁太后語及旱甚太后曰王知天之所以旱歟奈何委政臣下多殺有功無罪之人大興土木致傷和氣耶因泣下沾襟王有不豫色曰母后何彰子之過若是其甚耶自是孝衰蓋因盹譖也二十年前長沙監務李存吾卒存吾慶州人早孤力學慷慨有志節簡重寡言年十餘賦江漲詩云大野皆為没孤山獨不降識者異之及疏逆旽貶黜退居公州之石灘旽勢益熾憂憤成疾疾革令左右扶起曰旽尚熾乎曰然還臥曰旽亡吾乃亡返席未安而逝後王思其忠贈成均大司成其子來時年十嵗王手書諫臣存吾之子安國下政房授直長安國來小字辛盹謀反伏誅王嘆曰益齋嘗言旽骨相似古􅇯人必貽後患先見之明不可及已盹初以僧行見信于王既納金蘭女又蓄妾無算卿大夫妻貎美者必宻招私之凡在朝者希恩畏威爭獻臧獲寶器王猶以不受禄不近色不置田園信重之盹恣行威福恩讐必報世家大族誅殺殆盡出則原缺相之職舉而庶司百寮各供其職及其弊也省宰增至七八人事元以來事多倉猝僉議宻直每於都評議使司㑹議而商議之名又起與國政者至六七十人於是六部徒為虚設百司渙散無統而政事不復修舉國隨以亡嗚呼悲哉置子弟衛選年少貎美者屬焉以代言金興慶緫之洪倫韓安權縉洪寛盧瑄等在選中以淫􅁾得幸王慮無嗣使倫安輩强辱諸妃冀其生男以為已子定惠慎三妃死拒不從王性不喜色又不能御故公主生時御幸甚希及薨雖納諸妃置諸别宫不敢近日夜悲思公主遂成心疾嘗納年少之婢于房中召倫輩亂之王旁穴􅆤壁視之及心歆動引倫等入臥内使為其状倭船二十七艘入揚州留三日諸将領兵出戰大敗王以各司成衆愛馬及五部坊里人分𨽻五軍親率出昇平遂次龍泉寺以閲兵先是倭冦時時竊發於慶尚全羅等道邉境而已至是倭勢大熾西北東南諸道畿甸郡縣無處不發國之兵備疎虞又不習水戰兵出輙敗中郎将李禧鄭准提等上平冦䇿王大悦以禧為楊廣道安撫使准提為全羅道安撫使准提與禧上疏凡數十條其畧以為深陸之民不嫻舟楫難以禦倭但簽生長海島及自請水戰者令臣等将之期以五年可清海道都廵問使則徒費軍餉擾民生乞罷之准提改名地二十二年左正宫尹紹宗以金興慶等羣小在王側亂政宦者金師幸迎合王意大興影殿之役草疏欲請去興慶斬師幸罷影殿役獻納金允升諫議禹𤣥寶等托以紹宗在告曠職劾去之王朝太后太后曰影殿壮麗天下罕比勞民傷財莫甚焉水旱災害靡不由此請罷其役又人臣出從王事入治家産而金興慶等諸子弟日夜在宫不得歸家豈不怨王王嘗偏信賊盹不聴予言㡬至誤國今又若爾何耶宜令子弟輪番宿衛且萬㡬至繁宵旰勤政猶懼不給今王日中而起軍國之務豈無稽滯王宜夙興夜寐親聴國政以孝老母王不悦欲辭出后三復言之乃對曰謹従命太后又問曰何不御妃嬪王曰無如公主者因泣下太后笑曰死理之常王亦終不免矣何慟之甚恐為人笑慎勿復然遣贊成事崔瑩討濟州平之韓邦彦受命徃徴進獻馬于濟州州酋等曰何敢以元世祖蓄放之馬獻大明只送三百匹明使林宻等大怒於是遣瑩討平之作花園八角殿於泥峴周植花木以備宴逰二十三年興安府院君李仁復卒諡文忠仁復為人正大謹厚以禮自守力學善屬文國家辭命多出其手王方寵辛旽仁復宻啓旽非端人他日必為變請逺之不聴及旽誅王嘆其先見之明至是患疽垂殁弟仁任勸念佛對曰吾平生素不佞佛今豈可自欺改牟尼奴名曰禑封江寧府院大君追封故宫人韓氏祖考以禑冒稱韓氏出也宦者崔萬生幸臣洪倫等弑王前一日萬生侍王如厠宻啓曰益妃與洪倫合有身已五月矣王曰明日謁昌陵将殺倫以滅口汝知此謀亦不免萬生懼是夜與倫瑨寛安瑄等謀乗王醉手刃之呼曰賊自外至也黎明李仁任入見屏障及萬生衣上有渫血痕下萬生獄鞫之得其状遂繫倫等百官㑹于市轘萬生倫斬韓安權瑄洪寛盧瑨及其諸子並流父兄親黨金興慶伏誅初吾獻聞洪倫等謀以告興慶以倫等有寵恐王不信反為所害猶豫未敢聞及亂作獻具告崔瑩瑩遣獻與興慶貶所對辨興慶顧獻曰汝尚乳臭吾薦汝先王汝反欲噬我耶獻曰吾以倫等逆謀告公乃所以報公徳也興慶無以對稷山君白文寶卒文寶善屬文性質直不惑異端金義殺大明使蔡斌奔于北元仁任為宰相恐有問罪之師宻遣安師琦囑義殺斌以滅口仍欲與北元和親辛禑小字牟尼奴辛盹娶私婢般若生禑恭愍稱為已子辛禑元年大明洪武八年遣崔源如京師告喪請諡及承襲𤣥陵被弑金義殺使國人以通使為疑鄭夢周朴尚衷建議請遣北元以𤣥陵無嗣封瀋王暠孫托克托布哈為國王納克楚遣使來告擢安東府使李寶林為大司憲後寶林阿仁任意劾林樸為世所少寳林嘗宰京山府道聞婦人哭聲若有喜者執訊之果與奸夫謀殺夫者有人訟鄰人割我牛舌鄰人不服寳林渴其牛㑹里人各将水次第飲牛里人如令至所割人則牛駭走訊之果服云食我禾故斷其舌又人馬逸食人麥苗殆盡麥主将訴之馬主曰我有麥田稔與汝請勿訴麥主許之及夏麥再苗猶可取馬主曰汝麥亦稔不與麥主訴寳林命馬主坐麥主立曰俱走不及者罸馬主不及詰之曰彼立我坐其能及乎寳林曰麥亦然牧而後苗其及稔乎汝逸馬食麥罪一也乞令不告罪二也違約不與罪三也亂法之民不可不懲遂杖之以麥與告者為政嚴明𩔖此至是以治最擢拜是職羅興儒上書請行成日本乃以興儒為通信使遣之興儒初至日本國人以為諜者囚之我國良柔在其國請釋之其國僧周佐寄書云西海亂臣割據西邉觀釁出冦非我所為當克復後誓天指日禁約海冦北元遣使來李仁任池淵等欲迎之金九容李崇仁鄭道傅權近等上書都堂曰若迎北使舉國之人皆䝉亂賊之罪仁任與慶復興不受其書令道傅迎元使道傅詣復興第曰我當斬使首而來不爾則縳送于明辭頗不遜復興仁任怒乃流道傅于㑹津大司成鄭夢周等亦上書言迎元使之不可判典校寺事朴尚衷再上疏極論迎北使棄順從逆背强向弱之非計辭意俱切獻納李詹正言全伯英亦上疏糾舉仁任池淵唇齒煽變將然之禍不可測請誅之禹仁烈韓理阿仁任意上書以為諫官論宰相非細故也於是下詹伯英于獄使崔瑩淵鞫之辭連尚衷及田禄生瑩酷加刑訊並杖流之禄生尚衷皆道死又以鄭夢周金九容李崇仁林孝先亷廷秀亷興邦朴形鄭思道李成林尹虎崔乙義趙文信等謀害已並流之尚衷慷慨有大志博學善屬文兼通星命其行已蒞官必以其道不義而富且貴視之蔑如也史臣曰瑩以正直自許而反助􅇯黨嚴加酷刑賊害忠良觀後日攻遼之計則瑩之心自見矣改定都城五部户數凡屋間架二十以上為一户出軍一丁間架小則或併四五家為一户史臣曰太祖始置六衛衛有三十八領領各千人上下體統相為維持有唐府衛之遺意肅宗志吞女真日事鍊兵置别班吏胥商賈僕𨽻髠緇亦皆𨽻焉雖得一時之少效已不合於古制矣毅明已後軍政一歸於權姦國無一旅一伍之卒将皆私家之将兵皆私家之兵及至封疆多事倉皇調發括中外文武散職白丁雜色賤𨽻家僮無問賢愚皆編行伍或以屋架多少出丁有差軍政之不修一至於此雖欲禦外侮保邦家得乎下金義母妻于廵軍獄将殺之憲府言義雖叛逆婦女何知請勿殺乃没為尚州官婢以河允源為大司憲允源嘗書知非誤斷皇天降罸八字牌於柱每赴臺必掛後視事辛禑二年洪武九年卒盹妾般若夜潛入太后宫呼曰我實生主上何母韓氏耶仁任下般若獄兩府臺諫及耆老㑹興國寺議辨般若事竟投般若于臨津般若臨鞫呼曰天若知吾寃此門必頽司議許時纔入門門自頽人頗疑之放僧懶翁于宻城郡時懶翁于揚州檜巖寺設文殊㑹寺外士女無貴賤爭齎布帛果餅施與猶恐不及寺門填咽故放之行至驪興神勒寺死懶翁惠勤號也知貢舉政堂文學洪仲宣復以詩賦取士罷鄉試殿試議者非之以栁濴為全羅道元帥河乙沚聞濴代已來輙歸晉州農荘倭乗隙而至無敢禦者杖流乙沚配河東乙沚無才行且有簠簋之誚賂權貴得任閫寄倭冦扶餘至公州元帥朴仁桂戰死崔瑩請自徃擊之乃與楊廣道元帥崔公哲等擊倭於鴻山賊隠林中射瑩中口血流離神色自若射其賊應弦而倒戰益力遂大敗之俘斬殆盡凱還論功以瑩為鐵原府院君禑始習馳馬放鷹禑初稍志于學李仁任池淵林堅味等不喜儒竟以珍玩導之葬順敬王后韓氏于懿陵時韓畧自言我韓氏宗人也初韓氏卒我與韓氏族僧能祐火其屍收骨厝于奉恩寺松林乃于寺之北岡𤼵燒骨一缸備儀物移葬顯陵之西轜車至十川橋祖奠将徹燒魂帛延及柩幄并爇儀物惟柩賴救得免時人怪之或云天火辛禑三年大明洪武十年始行北元宣光年號池淵欲娶故大司憲王重貴妻至其第重貴妻捽其胡批其頰曰寧死従汝乎遂奔告崔瑩曰淵以妾有華屋故欲有之暴辱於妾公以清白聞故來告耳淵後與仁任有隙相積不平㑹淵門客結朋黨自謂池門四傑金允升華之元李悦金承徳且議仁任厚接北使停洪武年號之非仁任聞之以為誹謗朝政鞫流悦之元承徳于清州又嗾臺諫劾允升朋黨於是允升隂與淵謀去仁任仁任知其状與慶復興白禑誅淵及允升益謙益謙淵子遣人斬之元悦承徳等于配所遣前大司成鄭夢周于日本時朝廷忌夢周故遣之始置火焰都監從判事崔茂宣之言也時元焰焇匠李元與茂宣同里閈茂宣竊問其術使家僮數人私習試之建白于朝慶尚道倭冦大熾守将不能禦乃遣我太祖與金得齋等徃擊之太祖并日而行與賊戰於智異山相距二百許歩有一賊背立俯身手扣其臀示無畏心辱之太祖用片箭射之一矢而倒賊驚懼氣奪即大破之餘賊狼狽登山臨絶崖露刃垂槊如蝟毛官軍不得上太祖令軍中曰我馬先登則汝登當隨之遂觀地勢抜劒用刃背打馬一躍而上軍士或推或攀而隨之賊墜崖死者大半遂奮擊殱之後又擊倭於海州大破之辛禑四年大明洪武十一年鄭夢周至自日本復行洪武年號辛禑五年洪武十二年殺贊成事楊伯淵洪仲宣于流所又殺前提學金濤等七人杖流成石磷栁曼殊等四人仲宣與李仁任林堅味等同在政房有隙罷歸宜寧田里伯淵恃戰功頗自驕矜仁任堅味等嗾憲府劾伯淵通弟妻又奸李仁壽成大庸妾削職流于陜州崔瑩白禑曰伯淵謀害兩侍中欲自為相請按治其黨禑命瑩治之辭連仲宣臨死仰天誓曰予若無罪闕威及死天果大雷電以風又殺闕濤臨死對獄官曰我死不足惜闕其殃獄官皆惕然知其寃濤門生闕随至門外䕶屍有李悰者抱屍入川洗血闕衣之裹以簟網其頭而懸之再拜而去瑩之斷此獄刑戮過重國人寃之辛禑六年洪武十三年明徳太后洪氏薨恭愍王母臨薨謂禑曰我國傳世将五百年人君多不聴臣僚所言願王稽大義决大事必咨慶復興李仁任崔瑩及諸相慎勿觸情直行又君舉必書不可數出郊野以事逰觀禑出逰里巷射狗自是射殺雞犬日以為常城中雞犬㡬盡李仁任林堅味忌侍中慶復興清直托以嗜酒不治事白禑流清州又杖流復興所善評理薛徳等于外以尹桓為侍中以崔瑩兼海道都統使以我太祖為楊廣全羅慶尚道都廵察使邉安烈等為副皆受其節制倭自鎮浦之敗攻陷郡縣奮志殺掠三道沿海之地蕭然一空自有倭患未有如此之比故有是命元帥裴克亷鄭地等擊倭于沙斤乃驛敗績倭焚雲峯縣屯引月驛聲言将牧馬于光之金城北上中外大震太祖與安烈等引兵至南原克亷等來謁歡悦咸曰賊在險不若俟其屈與戰太祖慨然曰興師敵愾猶恐不見賊今遇賊不擊可乎遂部署諸将入險與戰大敗之太祖入險賊竒鋭果突出太祖以大羽箭栁葉箭迭射七十餘發皆中其面應弦而斃凡三遇鏖戰殱之後又接戰有賊将引槊向太祖甚急偏将李豆蘭射殪之太祖馬中矢而仆易乗又中仆又易乗飛矢中太祖左脚抽矢氣益壮賊有一将年纔十五六骨貎端麗驍勇無比乗白馬舞槊馳突所向披靡稱阿只抜都太祖欲射之以其人面上皆被堅甲無隙可射太祖謂豆蘭曰我射兠牟頂子落汝便射之遂躍馬射之正中頂子兠牟絶纓而側其人急整之太祖即射之又中頂子兠牟遂落豆蘭便射殺之於是賊挫氣太祖挺身奮擊遂大破之川流盡赤獲馬一千六百餘匹餘賊七十餘人奔智異山辛禑七年洪武十四年禑乗醉馳馬于龍首山墜馬輿還崔瑩泣諫曰忠惠王好色然必以夜不使人見忠肅王好逰然必以時不使民怨今殿下逰戲無度以致墜馬傷體臣等備位宰相不能匡相何面目見人禑曰自今改之辛禑八年洪武十五年政堂文學鄭公權卒公權性恭儉謹厚居官以正家廟制廢公權以祭器藏于别室堂祭之日必手自滌之奠物務極蠲潔疾權姦用事常懐憤惋遂患背疽而卒禑嘗馳騁閭里而尚畏懼臺諫宦豎進説曰臺諫皆上所除如有忤㫖替之何難自是禑益輕臺諫無復忌憚遊戲畋獵無虚日權近屢上疏又與同僚極諫禑醉甚欲射之胡抜都嘗虜掠東北面至是來冦端州我太祖以都指揮使赴東北面時李豆蘭以母喪在青州即今北青太祖使人强起之豆蘭乃脱衰服拜哭告天佩弓箭従行為前鋒先與戰大敗而還太祖尋至胡抜都著厚鎧三重襲紅褐衣乘黑牝馬横陣待之意輕太祖獨抜劒挺身馳出太祖亦單騎抜劒馳進揮劒相擊交相閃過不能中胡抜都未及勒馬太祖急廻騎射其背鎧厚箭未深入復射其馬馬倒而墮太祖又欲射之其麾下大至共救胡抜都僅以身遁去辛禑九年大明洪武十六年遣政堂文學鄭夢周如京師賀聖節且請諡承襲時本國與朝廷多釁帝怒将加兵於我増定嵗貢乃以五嵗貢不如約杖流使臣洪尚載金寶生李子庸等于逺地至是當遣使賀聖節人皆憚行規避最後乃擬遣宻直副使陳平仲平仲以臧獲賂林堅味遂辭疾堅味即舉夢周禑召面諭對曰君父之命水火尚不避况朝天乎然我國去南京凡八千里除候風渤海實九十日程今去聖節纔六旬脱候風浹旬則餘日僅五十日此臣恨也禑曰何日就道對曰安敢留宿遂行辛禑十一年大明洪武十八年代言尹就掌成均試皆取勢家乳臭之童時人譏之以為粉紅榜兒童好著粉紅衣故云鄭夢周與金庾洪尚載周謙等還自京師初夢周倍道及節日進表帝嘉之特賜慰撫優禮以送前此賀聖節使金庾及賀正使洪尚載周謙賀千秋使李子庸以海道阻險皆不及期故帝詰其受命稽緩且鞫弑君殺使之故竄于大理至是皆放還且許通朝聘地震聲如陣馬之奔牆屋頽圯人皆出避松岳西嶺石崩禑曰此地震無乃天欲陷遼東耶命贊成事沈徳符檢㸃進獻物于平壤府禁私挾金銀者押物魏堅犯令斬以徇雞林君李逹衷卒逹衷剛直不撓有識鑑嘗為東北面都廵問使及還我桓祖餞于野行酒逹衷立飲太祖行酒跪飲桓祖怪問之曰此子誠異人非公所及公之家業必此子大之因以子孫屬之恭愍朝擢為宻直提學忤旽罷所著詩文大為李齊賢所稱賞帝遣張􅄎段祐等來賜詔周倬雒英等來册禑為王又賜敬孝王諡恭愍於是禑焚黄于太廟致膰于􅄎及倬􅄎躬迎以受倬方食齎膰者不告置厨而去倬大怒責以三大不敬慢天子之命一也忽國王之教二也輕祖宗之賜三也倬等又求見我國祀典乃書社稷籍田風雲儀目以示之倬仍加忠臣烈士孝子順孫義夫節婦使并祀之及還禑贐以白金苧布衣服鞍馬不受曰今身不受寒且不徒行受将焉用但受朝臣贈行詩覽而歎曰東方有人矣禑遣曹敏脩河崙禹𤣥寶等如京師謝恩禑調馬于花園謂左右曰将水青木公文來予将制此馬時李仁任林堅味亷興邦縦其家人有良田率以水青木杖而奪之其主雖有公家文劵莫敢與辨時人謂之水青木公文禑聞而惡之故每言之辛禑十二年洪武十九年禑在李仁任第仁任妻進大爵禑盡爵戲曰吾一則為孫一則為婢婿今而對飲無乃失禮耶乃冒處容假面作戲以悦之韓山府院君李穡掌貢舉以舊例享禑于花園禑以穡為師傅敬重之親執手入欲對榻坐穡固辭禑親牽内廐鞍馬賜之漆原府院君尹桓卒桓家鉅富嘗乞告歸漆原嵗大饑人相食乃散家財以賑之又取貧民稱貸契劵悉燒之時方乆旱忽水湧桓田浸及人田大熟慶尚之民稱之不已又遣鄭夢周如京師請蠲減嵗貢夢周奏對詳明得除五年未納者及増定嵗貢常數禑喜甚賜衣帶鞍馬辛禑十三年洪武二十年定百官冠服一品至九品皆服紗帽圓領其品帶有差主是議者鄭夢周河崙亷廷秀姜淮伯李崇仁也百官皆服之禑與宦者及幸臣獨不服禑徴六道倡優陳百戲于東江必竭帑藏以供雜戲宰執臺諫不能諫至有作竒技以逢迎者一日禑裸水中以交羣妓天大雷電以雨張萬平李玖李種徳朝京師至遼東帝以本國執政之臣輕薄譎詐難以信憑勅遼東都司不許入聘乃還倭冦光州執前政金彦卿妻金氏欲汚之金罵賊大呌賊殺之井邑縣景徳妻安氏李得仁妻李氏亦不汚于賊皆死之辛禑十四年洪武二十一年誅亷興邦林堅味都吉敷李成林王福海并其族黨先是前宻直副使趙胖以奪田凌辱之故斬興邦奴李光于白州興邦聞之大怒誣胖謀叛收其妻及母仍逮捕胖禑命廵軍官及臺諫典法雜訊胖曰六七貪婪宰相縦奴四方奪人田民戕害百姓是大賊也今斬李光者為國家除民賊耳何云謀叛拷掠竟日不服時興邦為廵軍上萬户必欲誣服治極慘酷胖罵辱不小屈興邦使人亂擊其口左司議金若采以為不可而止之後數日禑如崔瑩第議胖獄命釋胖及母妻賜醫藥遂誅興邦等諸族黨其子孫在襁褓者皆投之江於是置田民辨正都監考覈林亷等奪佔民田又遣使各道捕其家臣惡奴誅之獨赦李仁任安置京山府初仁任謀竊國柄援立禑一國威福在其掌握支黨根據殺害忠良時又比之李猫堅味為其腹心放黜文臣請與興邦為婚三奸為一權奸親黨布列兩府中外要職無非私人奪人土田籠山絡野奪人奴婢千百為羣州縣津驛陵寝宫庫之田皆被攘取背主逃賊之人歸之如市亷使守令莫敢徴發瑩與太祖同心協力導禑除之瑩獨以仁任右已白禑不誅只安置流其孽子瓛及其弟仁敏仁敏子稷于玊州國人恨其網漏李仁復嘗惡二弟所為曰敗國亡家者必二弟也至是其孫存性果連坐見斬其黨何籥李存仁亦杖流以崔瑩為門下侍中我太祖守侍中李穡判三司事禑納崔瑩女為寧妃禑欲納瑩女瑩不可曰臣女鄙陋不可配至尊必欲納之臣當披剃入山泣且固拒後為鄭承可等所誤竟納之自李謹妃而下謹妃即仁任族琳之女九妃及三翁主皆倡妓供上煩夥倉庫俱竭預徴三年貢又加横歛其弊極矣帝以鐵嶺迤北本屬于元並令歸之遼東命立鐵嶺衛遣遼東百户來告禑稱疾不出迎崔瑩勸禑攻遼東李子松力言不可瑩托以堅味黨而殺之子松清亷國人注意復相聞其死莫不悲嘆遂徴八道兵禑與瑩如西海道名為獵海州白沙事至鳳州今鳳山郡召太祖始言攻遼之意太祖條陳四不可以小逆大一不可夏月興師二不可舉國逺征倭乘其虚三不可暑雨弓膠觧疾疫起四不可禑不納次平壤以瑩為八道都統使曹敏脩為左軍都統使我太祖為右軍都統使分諸将屬左右共三萬八千八百三十號十萬督令發行停洪武年號令國人復元服左右軍渡鴨緑江屯威化島都統使等再請班師禑與瑩皆不聴我太祖乃諭諸将以逆順利害遂回軍還渡鴨緑江禑聞變與瑩馳還京都諸軍來屯近郊為書請去瑩禑不従欲拒戰太祖領右軍由崇仁門入城與左軍犄角而進瑩知勢窮奔還花園不勝憤怒以槊洞刺門者乃入與禑在八角殿諸軍毁垣闌入郭忠輔等索瑩禑執瑩手泣别太祖謂瑩曰國家未寧人民勞困故不得已焉相對而泣遂流瑩于髙峯縣諸将更㑹議移配瑩于合浦後移于忠州放禑于江華百官奉傳國寶獻于定妃恭愍王妃立禑子昌年九嵗我太祖欲立王氏曹敏脩念仁任薦抜之恩謀立李謹妃子昌恐諸将違已以李穡為時名儒欲藉其言宻問於穡穡曰當立前王之子遂以定妃教立昌朴宜中還自京師帝引見待有加遂寝鐵嶺立衛之議宜中之行装無一物遼東䕶送鎮撫徐顯索布宜中傾囊示之觧所衣苧衣與之顯嘆其清亷以告禮部帝特厚待顯出曰偰宰相而下吾見麗使多矣未有若朴宰相者倭冦光州判典校寺事康好文妻文氏被虜不汚賊文氏擕二兒将走匿忽被虜行至夢佛山極樂菴有石崖髙可千餘尺文氏謂同被虜隣女曰汚賊求生不如潔身就死奮身而墜賊殺兒而去崖下有蘿蔓蒲草布宻得不死折右臂久而復蘓居三日聞賊退乃還鄉里莫不驚嘆遣政堂文學偰長壽以禑遜位表如京師流曹敏脩于昌寧敏脩當林亷之誅恐禍及已凡攘奪民田悉還其主既得志稍稍還奪復肆貪婪沮革私田大司憲趙浚劾而逐之以李穡為門下侍中我太祖守侍中始復銓選法舊制吏兵部分掌文武銓注大司憲趙浚上書請正田制初麗祖既一三韓首正田制分給臣民百官則視其品而給之身歿則收之府兵二十而受六十而還士人夫受田者有罪則收之國有定制臣民安業光宗定貢賦景宗立田柴科及成憲經界愈詳文宗恭儉節用家給人足中葉以降權姦蠧國逮事前元朝覲饋遺國贐等事殆無虚日省官逹魯花赤迭相徃來誅求無厭徴督無藝遂至叔季世族巨室占奪民田所在連阡陌絡山野一嵗徴租或再或三猶以為不足革田柴為私有版籍不明民胥咨怨以洪永通領門下府事國人皆曰以彼貪婪得免正月之誅今值更化之初尚不見斥又位上相真福人也改諸道按亷使為都觀察黜陟使賜教書鈇鉞皆用臺諫薦復以士人為縣令監務鄭地擊倭兵于南原大敗之時倭冦慶尚全羅楊廣自秋及夏屠燒州郡地時為三道都指揮使擊倭大㨗人謂非此戰三道民㡬盡矣朴葳亦為元帥擊倭頗有功西海道觀察使趙云仡将行上書其畧云國界自西海歴楊廣全羅至于慶尚海道㡬二千餘里有水中可居之洲曰大青小青喬洞江華珍島絶影南海巨濟等二十小島不可勝數皆有沃壤魚鹽之利乞於五軍将帥八道軍官各給虎符金牌至于千户百户授以牌面仍以大小海島為其食邑𫝊諸子孫則不惟将帥一身之富貴亦且子孫萬世衣食有餘人人各自為戰戰艦自備兵糧自齎而為㳺兵無時擊之則賊不敢窺覦民得以富庶民獲魚鹽之利國無漕轉之虞祖宗土地復全於今日矣云仡農壤縣人金得培壻立志竒古跌宕瑰偉徑情直行不肯隨時俯仰恭愍時登第退居尚州露隂山下辛禑朝起授諫議大夫又退居廣州古垣江村重營板橋沙平兩院自稱院主人本朝授江陵府使尋以病辭歸廣陵别墅将終自述墓誌遷禑于驪興改政房為尚瑞司以我太祖及李穡文逹漢安宗源兼判尚瑞寺事遣侍中李穡簽書宻直司事李崇仁如京師賀正請王官監國自𤣥陵薨帝每徴執政大臣入朝皆畏懼不行穡為相自請行以我太祖威徳日盛中外歸心恐其未還有變請一子従行太祖以太宗為書状官従行及還穡曰皇帝中無所主之主也典法及郎舎上疏曰瑩事𤣥陵定亂興王驅僧北鄙却倭冦蕩羣􅇯以濟生民誠社稷臣也然闇於大體决䇿攻遼獲罪天子願斷以大義昌從焉命斬之瑩鐵原人惟清五世孫風姿魁偉膂力過人剛直忠清年十六父元直臨終戒之曰見金如石瑩佩服遺訓不事生業居第湫隘服食儉素其視乘肥衣輕者如犬豕然每臨陣對敵神氣安閒矢石交於前畧無懼色戰士却一歩者悉斬故大小百戰未嘗一敗雖為将相握重兵關節不行世服其清務持大體終身掌重兵麾下軍士所識面者不過數十人每赴都堂正色直言不少隱左右無應者獨自歔欷而已然性少戇不學無術凡事斷以已意喜殺立威及其衰耗妄興攻遼之師尹紹宗論曰功葢一國罪滿天下世以為名言臨刑辭色自若死日都人罷市逺近聞者至於街童巷婦皆為之流涕死在道傍行者下馬朝鮮史畧卷十一
