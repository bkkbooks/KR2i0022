body:
  text: 朝鮮史略卷二新羅紀新羅原宗立是為法興王智證王元子梁天監十一年百濟芍加弑其君牟太子餘隆立齊中興元年是為武寧王討芍加誅之高句麗文咨王薨在位二十九年太子興安王立梁天監十八年是為安藏王在位十三年薨弟寳延立新羅頒律令始制百官公服新羅高句麗百濟三國並遣使朝梁新羅始行佛法初訥祇王時沙門墨胡子自高句麗至一善郡即今善山府郡人毛禮作窟室以居之至炤智王時有僧阿道者與其徒亦來毛禮家徃徃有信奉者至是王欲興佛教羣臣皆曰僧徒議論詭異若從之恐有後悔近臣異次頓獨曰佛法淵奥不可不信王以為異言下吏異次頓曰佛若有神吾死必有異及斬血從㫁處湧色白如乳衆怪之不復毁佛新羅以哲夫為上大等總知國事百濟移都泗泚即今扶餘縣國號南扶餘駕洛國王金仇衡降于新羅駕洛亡自始祖至亡凡十王總五百二十年新羅法興王薨在位二十七年王始建年號曰建元自國初行中國年號南北朝分裂故也立外官挈家之法直興王彡麥宗立梁大同六年直興法興弟立宗子拜異斯夫為兵部令掌内外兵馬事又選童男容儀端正者號風月主求善士為徒以勵孝弟忠信高句麗王寳延薨在位十五年是為安原王太子平成立生而聰慧雄偉過人在位十五年薨太子陽城立陳永定三年是為平原王新羅金居漆夫與百濟兵撃取高句麗十郡以僧惠亮來王以亮為僧統始置百座講會及八闗之法初漆夫入高句麗詣亮聴法因欲覘麗國强弱亮曰汝容貌非常流恐見執宜速返漆夫將還亮曰子燕額鷹視他日必為將帥無貽我害漆夫與之相誓而來至是亮見于道左遂與之俱來百濟不知有侯景之亂遣使如梁朝貢使者至見宫闕殘毁號泣端門外見者莫不洒淚伽倻樂師于勤知國將亂攜樂器入新羅王命法知階古萬徳等學樂伽倻王嘉悉製十二絃琴命于勤造曲奏之名曰伽倻初晉人以七絃琴送高句麗麗人不知鼓之之法國相王山岳頗改其制以奏有𤣥鶴來舞遂稱𤣥鶴琴又有王寳高者入地理山學琴五十年傳續命得續命得傳貴金貴金亦入地理山不出王恐琴道不傳以伊餐允興為南原守俾傳其業允興遣長清安清詣山中學之傳其所秘飄風等三曲安傳其子克宗克宗所製音曲有平調羽調百濟王明襛帥兵侵新羅軍主金武功撃殺之諡曰聖子昌立梁承聖三年在位四十五年薨諡曰威徳子季明立二年薨是為惠王子宣立二年薨是為法王命博士李文真始脩國史子璋立風儀英偉志氣雄傑是為武王新羅王命脩國史從伊餐異斯夫之請命大何餐金居漆夫等集文士撰之新羅王命伊餐異斯夫討大伽倻即今高靈縣滅之軍副斯多舍年十六先入栴檀門立白旗異斯夫引兵臨之遂滅其國王賞以良田及所虜三百口斯多舍以其田分與戰士生口放為良人始與武官郎約為死友及武官死哭之慟七日亦死新羅烈女際厚卒歸白雲初一達官同里閈一時生男女男曰白雲女曰際厚二家約為婚姻白雲十五而盲際厚父母欲改聘李俊平際厚密語白雲曰生同一辰約為夫婦久矣遂潛出從俱行山谷間為俠客所掠去白雲之從金闡追殺俠客奪際厚以還事聞王賜三人爵新羅王舍新宫為皇龍寺鑄丈六像初黄龍見其地因舍為寺有畫工率居畫老松于壁鳥雀徃徃飛入蹭蹬而落後畫色漫漶寺僧丹青補之鳥雀不復至新羅廢源花置花郎初簡美女二人奉為源花一曰南毛二曰俊貞聚徒三百餘人俊貞置酒勸南毛醉殺之其徒以告俊貞伏誅遂廢源花更取美男子粧飾之名花郎或道義相磨或歌舞相悦邪正自見擇而用之新羅真興王薨在位三十七年王改元鴻濟及末年剃髪被僧衣自號法雲妃亦為尼子金輪立陳大建八年以伊餐金居漆夫為上大等委以軍國事四年薨諡真智太子銅輪子伯浄立是為真平王王生而有竒相身體魁梧志識沈毅明達新羅兵部令金后稷智證王之曽孫王好畋獵后稷切諫不見聴臨死謂其子曰吾生不能匡救君惡雖死思有以悟君須瘞我於王遊畋路側其子從之他日王出畋中路若有聲曰王毌去王顧問之從者曰來自后稷墓也仍陳臨死之言王流涕曰夫子生而忠諫死而不忘其愛我深矣終身不復獵新羅始置船府署大監小監各一員又置禮部令二員與兵部令同位調府令二員一掌貢賦一掌車乘高句麗平原王薨在位二十三年太子元立是為嬰陽王隋開皇十年新羅國西秋大水漂没人戸三萬三百六十高句麗伐新羅不克其將温達死于兵温達容貌龍鍾家甚貧常乞食養母平原王有少女好啼王戲曰長必歸之温達及長將嫁高氏子女曰王者無戲言王怒曰從汝所適女出宫門至温達家温達見之疑其狐魅女備言之勸温達擇國馬病瘦棄者養之會王獵樂浪丘温達以所養馬行其馳騁常在人前王知其實備禮迎之至是請伐新羅與羅軍戰于阿旦城下為流矢所中而死新羅有大世者少有方外志甞曰在此山谷間以終則無異池魚籠鳥吾將航海至吳越㝷師訪道遂與友人仇漆自南海乘舟而去不知所終百濟使解讐攻新羅四城小監貴山箒項死之又陷椵岑城縣令讚徳死之後其子金城幢主奚論又與百濟兵戰于椵岑城死之新羅遣使如隋煬帝大業八年請師討高句麗許之帝親御師進至遼東麗兵阻水拒守命宇文愷造浮橋以度大兵左翊衞將來䕶兒浮海先至浿水遇麗兵撃破之乘勝造城下為伏兵所敗大將軍宇文述于仲文等與諸將又分九道而出會于鴨緑水西高句麗大臣乙支文徳詣其營詐降備觀虚實而還述等進軍至平壤城三十里見官軍疲敝城又險固度難猝拔且戰且行還至薩水隋軍半濟麗軍自後撃其後軍八軍俱潰唯衞文昇一軍獨全帝大怒鎖繋述等引還文徳資質沉鷙有智數兼解屬文隋大業九年帝復攻高句麗遼東城二十餘日不拔會楊𤣥感反書至帝大懼引軍還及十年帝復欲伐幸涿郡親御戎服次懷逺鎮高句麗懼乞降因送斛斯政政素與𤣥感善聞𤣥感反不自安來奔帝大悦班師新羅大饑沙梁宫諸舍人盜分倉穀有劍君者獨不受曰茍非其義雖千金豈可動心退詣近郎即花郎諸舍人恐言漏欲殺劍君而召之劍君欲徃近郎曰胡不白於有司曰畏我死而扺人罪所不忍也曰盍逃乎曰彼曲我直而反自逃非丈夫遂徃被毒死高句麗嬰陽王薨在位二十九年異母弟建武立是為榮留王唐武徳元年新羅薛罽頭隨海舶入唐罽頭甞曰我國用人論骨品茍非其族雖有鴻材傑功不能自振我願西遊中華奮百世之略立非常之功至是入唐後唐太宗伐高句麗自薦為果毅深入疾鬭而死帝泫然流涕脱御衣覆之贈大將軍新羅王遣舒𤣥等率兵攻高句麗娘臂城今青州麗兵逆撃羅兵兵失利舒𤣥子庾信為中幢幢主謂其父曰庾信平生以忠信自期臨戰不可不勇乃跨馬突陣斬其將提首而來諸軍因奮撃城遂陷舒𤣥首露王後裔也潛通肅訖宗女萬明後為萬努郡守欲與偕徃訖宗不許囚萬明别室忽震屋門守者驚亂萬明逃出隨之任舒𤣥甞于庚辰夜夢熒惑鎮二星降于已萬明亦夢童子衣金甲乘雲入堂㝷有娠二十月而生庾信背有七星文舒𤣥曰庚辰夜有吉夢得此兒宜以為名然禮不以日月為名今庚與庾字相似辰與信聲相近況古人有名庾信者遂名焉庾信見麗濟靺鞨侵軼國疆慨然有削平之志獨入中嶽石窑告天誓之有老人來授祕訣又攜寳劍入咽薄山告天夜有虚角一星光芒下垂劍若搖動然新羅上舍人實弓剛直為下舍人珍堤所讒謫冷林或謂曰何不自辯實弓曰昔屈原孤立而見擯黜李斯盡忠而被極刑佞臣惑主忠士被斥何足怪乎遂不言而徃新羅真平王薨在位五十四年無子國立王女徳曼唐太宗亦遣使加册命是為善徳女主改元仁平徳曼寛仁明敏唐帝賜牡丹花圖并花子徳曼曰此花絶艷而畫無蜂蝶是必無香種其子果如其言百濟王率臣僚常游泗泚河北浦時人稱為大王浦又創王興寺臨水窮極壯麗每親詣行香新羅烈女薛氏破鏡相誓初父陽秋衰病不堪戍薛自以婦人不得代居常憤鬱有嘉實者願代父許之薛破鏡為信待戍還成禮時國亂代者不至嘉實六年不還父欲改婚薛不從將逃嘉實忽到以破鏡騐之遂為夫婦高句麗日無光三日百濟王璋薨謚曰武在位四十二年太子義慈立義慈幼有孝友之行時號東海曽子高句麗復令東部大人蓋蘓文監築長城東北自扶餘城東南至海千有餘里至是十六年乃畢權近曰蘓文又因築城招集徒衆以行誅賞蓋欲其附己者衆也惜乎麗之君臣不能察之於微也高句麗太子桓權朝唐帝遣郎中陳大徳報之大徳所至城邑託觀山水游歴殆遍悉得山川道里險易及還備陳高句麗虚實帝於是始有東征之志百濟既取新羅國西獼猴等四十城又與高句麗謀欲取党項城絶朝唐之路羅主告急于唐百濟將軍允忠陷新羅大耶城即今陜川都督金品釋殺妻子自刎幢下舍知竹竹閉城門拒之舍知龍石勸竹竹降以圖後效竹竹曰吾父名我以竹竹者使我歳寒不凋可折而不可屈豈可畏死生降乎遂力戰城陷與龍石同死王遣伊餐金春秋乞師於高句麗欲報之品釋妻乃春秋女以故憤然有滅百濟之志與金庾信嚙指誓歸期至麗國請師麗王曰麻峴竹嶺本我國地地若還兵可出春秋抗辭以對王怒囚之春秋以青布賂寵臣先道解道解喻春秋以龜兎之説俗云東海龍女病甚欲得兎肝有一龜語龍王曰吾能得之遂登陸見兎極言海島安居之樂因負兎行既三里乃言其故兎曰吾神明之後能出五臟洗而納之日者少覺心煩遂出肝洗之暫置巖石之㡳而來若歸取肝汝得所求吾雖無肝尚活豈不兩相宜哉龜信之乃還纔上岸兎脱入草中春秋悟移書於王曰臣得歸二嶺可還王信之厚禮歸之高句麗蓋蘓文弑其君建武立王姪臧是為寳藏王貞觀十六年蘓文一名蓋金姓泉氏自云生水中以惑衆狀貌雄偉意氣鷙悍其父東部大人大對盧死文嗣凶殘太甚諸大人與王密議誅之事泄遂為所弑焉新羅遣使如唐乞師文皇帝不許時百濟與高麗連和將伐新羅命司農丞相里𤣥奬賜璽書于高句麗喻以戢兵蘓文不奉詔帝又遣蔣儼諭㫖蘓文脅使者囚窟室於是帝自將伐之以張亮及李世勣為將進攻遼東城時遼東屬高句麗拔之以其城為遼州又進攻白巖城城主孫伐音出降以其城為巖州高句麗將高延壽高惠真等帥其軍及靺鞨兵來救之帝敕諸軍齊出奮撃龍門人薛仁貴大呼陷陣所向無敵麗軍大潰延壽惠真帥其衆降帝進攻安市城城險兵精城主亦材勇圍城六旬交戰日六七合衝車礟石毁其城堞隨立木柵塞其缺堅守不下帝以遼左早寒糧食将盡敕班師高句麗東明王塑母像泣血三日新羅大臣毗曇亷宗等欲廢主舉兵屯於明活城王師營於月城金春秋等督將卒奮撃之毗曇等敗伏誅新羅主徳曼薨在位十六年主有知㡬數事見畫花知無香聞蛙知兵宫西玉門池蝦蟆大集主謂左右曰蝦蟆怒目兵士之相甞聞西南有玉門谷意有隣兵至其地乎命閼川徃搜之果有百濟兵至谷掩撃盡殺之預言死期又作瞻星臺及薨真徳主勝曼立真平王弟國飯女唐太宗貞觀二十一年復伐高句麗以牛進達李世勣為將攻南蘓石城等拔之百濟將軍義直圍新羅茂山甘勿洞岑三城金庾信帥兵拒之苦戰力竭軍有丕寧子者銳意力戰庾信謂曰今日事急矣非子誰能奮勵出竒以激衆心乎丕寧子横槊突陣殺數人而死其子舉真曰見父之死偷生茍存可乎亦突陣死其奴合節曰所天崩矣不死何為亦交鋒而死三軍感激齊進所向摧陷義直僅以身免新羅王遣金庾信伐百濟大破之佐平仲常言于王乃櫝還品釋夫妻之骨新羅王遣伊餐金春秋及其子文汪如唐太宗見春秋儀表英偉厚待之乃許詣國學觀釋奠及講論春秋因請天兵伐百濟乃勅蘓定方帥師征百濟春秋又請改章服從華制留文汪以備宿衞春秋還至海上遇高句麗邏兵從者温君解高冠大衣坐於船上邏兵以為春秋殺之春秋乘小船得免新羅王遣金法敏春秋子如唐高宗告破百濟百濟將殷相攻陷新羅七城金庾信撃破之斬殷相王又自製太平頌織錦為紋以獻又遣波寳餐金仁問春秋第二子如唐宿衞仁問幼而就學博覽羣書兼涉莊老浮圖之説工𨽻書善射御曉音律識量宏逺時年二十三新羅王勝曼薨在位八年初改元太和後行永徽年號始受百官朝賀及薨羣臣立金春秋為王永徽五年春秋真智王後孫龍春子唐遣使備禮册王詔書有難解處有名牛頭者能解之王曰見卿頭骨可稱强首强首姓任忠州人使製謝表文工而意盡王竒之初其母夢見人有角者有娠及生首角而黶既壯知讀書通曉義理不學佛而學儒甞娶冶家女父令改娶終不聴新羅金庾信攻百濟刀比川城克之先是級餐末柙被虜於百濟為佐平任子家後逃歸庾信知其可用令反間於任子曰兩國存亡可先知若子國亡則子依於我我國亡則我依於子任子曰子言已悉之可歸報庾信末柙還言百濟事甚悉於是併吞之謀益急新羅王以金歆運王婿柰勿王八世孫為郎幢大監出屯百濟陽山下濟人乘夜來襲羅軍驚駭歆運横馬握槊以待大舍詮知曰賊起暗中雖死人無識者歆運曰既以身許國知與不知一也遂突陣殺數人而死大監穢破小監狄得亦相與戰死步騎幢主寳用那聞歆運死曰彼骨貴勢榮猶不畏死況予生而無益遂赴敵死王聞而傷悼各贈官時人作陽山歌以傷之又有沙梁人夫果驟徒兄弟亦死于戰百濟王作望海亭與宫人荒淫躭樂佐平成忠極諫王怒囚之成忠上書曰臣甞觀時察變必有兵革之事敵兵若來使陸不過沈峴即炭峴在黄山今連山縣水不過入伎伐浦即白江據險隘以禦之王不省死獄中百濟王都井水及泗泚河水皆赤如血又有鬼入王宫大呼百濟亡新羅創漢山州壯義寺羅王欲伐百濟請兵于唐不報憂形于色若有長春罷郎者曰皇帝已命蘓定方等領兵將以明年五月伐百濟因忽不見王異之創寺以資㝠福長春罷郎甞戰死百濟者也唐太宗以蘓定方為神丘道行軍大縂管金仁問為副縂管帥水陸軍伐百濟敕新羅為聲援王帥金庾信等出師百濟王問戰守便宜佐平義直以為先撃唐兵達率常永以為先撃羅軍王猶豫未决問於興首嘗以佐平得罪竄外對曰白江炭峴我國要衝宜簡勇士守之使唐兵不得入白江羅軍不得過炭峴大王重閉固守待其糧盡卒疲然後奮撃破之必矣左右沮而不用及聞唐羅兵已過白江炭峴以階伯為將帥死士五千拒之階伯知必敗盡殺家屬至黄山猝遇羅兵鏖戰力屈而死定方仁問等到伎伐浦濟軍不能禦唐師乘勝進薄都城濟王知不免歎曰悔不用成忠之䇿乃與太子孝率左右夜遁保熊津城即今公城王宫諸姬走大王浦嵓石上墮死者亦衆世號落花岩於是王自熊津城詣定方降定方以濟王義慈及太子孝泰隆演及大臣將士八千人渡海還百濟亡自温祚開基歴三十王移都者四温祚都慰禮城近肖古都漢城文周都熊川聖王都南扶餘凡六百七十八年唐以其地分置熊津馬韓東明金漣徳安五都督府命劉仁願留鎮泗泚城歴年圖曰始祖乃以東明之𦙍為太子所忌懼不見容逃難奔竄間闗﨑嶇至河南建邦設都雖萬事草創尚能嚴兵固守禦樂浪靺鞨吞馬韓而滅之又能抗高句麗敵新羅成鼎足之勢以基七百年之業非豪傑之主能然乎多婁作稻田賑窮民優禮大臣有人君之度然搆釁新羅爭一小城數十年間兵革不息已婁脩好新羅得交隣之義蓋婁雖史稱恭順納叛臣而失鄰和誣小民而亂其妻何足道哉肖古仇首歴年雖長無事可稱古爾喜游畋未免禽荒之失然賑貧乏復租調定官制錮贓吏交隣脩好是足多者責稽汾西以千乘之尊不自慎重或死于敵兵或隕于賊手悲夫比流久在民間知民疾苦及其即位賑窮賙乏史稱寛慈愛人庶矣而四十一年之間災變屢見饑饉洊至民不聊生何哉契王在位纔二年但比流代汾西而立其終也傳汾西之子契王契王代比流而立其終也傳比流之子近肖古尚有遜讓之風近肖古與高句麗失和至殺其主挑怨速禍世為讐敵兩國之間干戈爛漫而不已近仇首在位十年粗保其國枕流始信佛法迎胡僧創寺度僧欲以徼福踰年薨而佛不足信明矣辰斯喜土木甘游畋侈宫室池沼以畜珍竒玩物喪志田於狗原或旬或月卒死行宫惜哉阿莘窮兵黷武殆無虚歳民困兵革多奔敵國輕質國本於島夷㡬不得嗣腆支久質於外王薨國有内難返而得國何其幸也久爾傳之毗有毗有傳之蓋鹵蓋鹵驕奢昏闇請上國欲伐强隣信敵間親昵戲玩大興工役惟宫室臺榭是崇是飾至於蒸土築城縁河樹堰伐石作槨人力盡悴倉廩告匱尚不知墮於敵國之術國勢魚爛而敵兵奄至噬臍無及身死人手尚誰咎哉傳曰國必自伐而後人伐之蓋鹵之謂矣文周嗣緒正卧薪甞膽之秋而優柔不斷受制强臣身且不保三斤以童稚之年能命將討賊復君父之讐快神人之憤是可稱也而享年不永惜哉東城當國凶歉民饑不恤起臨流閣極其壯麗游宴自恣閉宫門拒諫臣荒于游畋久而不返為賊臣所害武寧誅芍加得討賊之義然失子民之道不能勞來安集為敵國驅民前史稱仁慈寛厚何耶聖王初立能斷大事國人稱聖逮至末年與新羅謀伐高麗不得其志背舊好發忿兵遂死鋒鏑真所謂一朝之忿亡其身者也威徳雖無徳政享國悠久惠王即位二年而薨法王繼緒崇信佛教禁屠殺放鷹鷂焚漁獵之具創寺度僧蓋欲延祚也而踰年乃薨多見其惑也武王恃强驕驁侵掠新羅殆無寧歳干戈逓侵流屍蔽野唐皇詔諭戢兵外雖陳謝而内實不然晚年穿宫南池起望海樓游泗泚河般樂怠傲惟日不足國之不亡幸矣義慈之為太子也事親以孝與兄弟以友及其即位慮囚原罪其為政粗足可觀但其闇於大體無深謀逺略不知新羅脣齒之勢妄興干戈謀欲吞噬今年奪一城明年奪一城席累勝之威驕氣遽溢視新羅為囊中之物欲取之心囂然未已違帝詔無釋忿之心結高麗絶朝貢之路猶且淫酗躭樂杜絶忠諫天怒于上屢出災異丁寧譴告而猶不省悟晏然自肆不能保炭峴白江之險唐兵一至而社禝丘墟扶餘氏不祀忽諸嗚呼悲哉故百濟王義慈卒於唐帝贈衞尉卿葬于陳叔寳墓側新羅王金春秋薨在位八年子文武王立唐龍朔元年上諡曰武烈廟號太宗太宗統一三韓時和歳豐京城匹布直租五十石民謂聖代后曰文明即金庾信之妺初后姊寳姬夢登西兄山頂坐旋流徧國内覺與后言后戲曰願買兄夢因與錦裙為值後武烈納為后唐遣蘓定方領水陸兵伐高句麗諭新羅王帥諸將會伐蓋蘓文遣子男生守鴨緑唐將契苾何力撃破之耽羅國主徒冬音律國主名來朝新羅初高厚高清等渡海泊躭津來朝新羅時客星見南方太史奏異國人來朝之象也王嘉其來朝稱長子曰星主以其動星象也國號躭羅以來時初泊耽津故也唐以新羅為鷄林州大都督府以王為大都督故百濟宗室福信等起兵迎立義慈之子豐甞質倭國為王據周留城唐留鎮將軍劉仁願郎將劉仁軌與新羅將金欽伐之豐奔高句麗達率黒齒常之詣仁軌降常之百濟西部人驍毅有謀略嘯合逋亡據任存城復百濟二國餘城至是乃降入唐累從征伐積功為燕然大總管後周興等誣告與趙懐節叛詔繋獄死帝詔留仁軌鎮守以義慈之子在京師者隆為熊津都督遣還本國隆畏新羅不敢入舊國寄治高句麗死高句麗泉蓋蘓文死子男生代為莫離支官名如唐中書令其弟男建殺男生子獻忠自為莫離支討男生男生走保國内城遣子獻誠于唐求内附唐以李世勣為遼東道行軍大總管郝處俊薛仁貴等副之帥師伐高句麗使金仁問徴兵于新羅王帥師次唐城州以金欽純庾信弟金仁問為將徃助之時庾信有病留唐兵合新羅兵攻平壤城拔之高句麗王高臧降世勣執臧及其子福男徳男大臣男建等二十餘萬衆還京師高句麗亡自始祖東明王立國於卒本歴二十八王移都者七琉璃王都國内城山上王都丸都東川王都平壤故國原王復都丸都又移都平壤及東王城平原王移都長安城共七百五年唐分高句麗百七十六城六十九萬戸為都督府置安東都䕶府于平壤以薛仁貴為都䕶鎮撫之後移三萬八千三百戸于江淮之南及京西諸州空曠之地歴年圖曰始祖以英雄之資見忌於金蛙諸子逃難至卒本披草萊建邦國未遑制作然威徳日盛歸附亦衆降松讓斥靺鞨取荇人滅沃沮雄據一方虎視三韓何成功之易也琉璃以遺腹在他國承襲難矣幸而得嗣降鮮卑滅濊貊闢國浸廣然憤小罪而誅二臣惡好勇而殺太子是可歎已大武英明雄武拔怪由於微賤委豆智以軍國仇都以貪鄙被斥勃素以智能見褒征蓋馬滅樂浪扶餘奔竄而自避勾茶畏威而來降恢拓土宇國勢愈昌獨惜乎信夫人之讒有子如好童之賢而尚不自明以至于死跡其行事其晉獻之流乎閔中方喪宴樂游畋享年不永慕本暴戻不仁戕殺諫臣得其善終者難矣太祖享國九十餘年耋荒倦勤付托失人禍及忠臣愛子雖有闢土强國之功何足道哉次大以寵弟窺伺大器積有年紀及嗣位尚不悛心恣行誅殺天道好還其及也冝矣新大逃難出亡國人歸心推戴立之宜先明荅夫弑逆之罪以伸大義也而徳其援立之功反寵任之故國川以英明之資奮有為之志誅權姦訪遺逸聘巴素於草澤擢為國相推誠委任又賞舉者誠衰世未有之盛舉然後嗣不定死肉未冷于妃淫穢濁亂房闥山上烝于妃得國凟亂天倫所可道也言之醜也東川天性寛仁有人君之量乃何愎忠臣之諌侵犯上國驟勝輒驕及其一敗竄身狼狽幾於亡國乎中川雖無徳可稱而能辨寵姬之誣殺之不疑何其斷也西川禦肅慎拔檀盧諸部震懾晚年猜忌推刃同氣烽上䦧狠尤甚殺叔及弟愎諫自恣峻宇雕牆民困虐政卒及於禍美川早遯荒野備甞艱險宜有徳慧術智矣而無徳可稱徒以侵犯上國為事故國原值慕容之變奔敗鼠竄母妻見虜父尸亦發城郭宫室焚蕩殆盡旄倪珍寳輸掠無遺㡬不保社稷至於屈膝稱臣納質脩貢是宜卧薪甞膽之時也顧乃忘仇讐噬我脣齒搆釁百濟血染敵鋒惜哉小獸林立大學教子弟似可與有為而惑於異端邪説邀秦僧創佛寺奉之彌謹為東韓佞佛之始主故國壤侵强隣擾中國干戈糜爛猶且事佛求福福未獲而遽夭惑哉廣開土雄偉有竒才能戰勝攻取長壽享年愈長國富兵强文咨安藏安原皆中材庸主陽原武略不競國步日蹙平原遇旱而懼停無用之費捐不急之務勸農桑賑貧乏有足多者嬰陽初即位有志安民然不知畏天事大之義黨靺鞨侵上國隋文命將來討舉國震恐宜效順悔罪之不暇方且伐新羅侵百濟喜兵樂禍復致煬帝討罪之舉百萬之衆渡遼碣涉薩水搗巢覆穴不朝則夕不有文徳之應變𤣥感之内叛則國之存亡未可知也榮留昏愚暗弱賊臣蘓文有無將之心而不能辨之於早馴致堅冰之禍欲以弱制强㡬有不密禍不旋踵寳藏為蘓文所立權移於下政不已出國皆蘓文之國民皆蘓文之民專擅自恣窮凶極惡違帝詔囚王人罪逆貫盈唐太宗赫怒親將六師討之雖駐蹕之役不得志而還高麗國勢亦岌岌乎是雖蘓文之罪惡而亦寳藏不君之為也厥後太宗之憾不釋頻年命將出討將欲再舉此正君臣協力圖存之時也而主昏于上臣虐于下奢侈無度國事日非蘓文諸子自相魚肉至於訴中國為鄉導雖以高宗中材之主遣一老將一舉滅之如摧枯拉朽高氏七百年之宗社一朝丘墟悲夫朝鮮史略卷二
