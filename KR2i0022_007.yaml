body:
  text: 朝鮮史略卷七髙麗紀毅宗莊孝王諱晛字日昇仁宗子母恭睿太后任氏元年宋紹興十七年金皇統七年八月夜虎入大明宫王御西樓觀擊毬或自擊日以為常禁親族相婚三年金海陵王天徳元年政堂文學尹彦頥卒彦頤少登科工文章甞作易觧傳于世晚年酷嗜佛法請老退居坡平自號金剛居士甞與僧貫乗為空門友中軍兵馬使奏古制天子六軍大國三軍次國二軍小國一軍請改五軍為三軍從之四年平章事髙兆基左遷為左僕射金存中用事兆基屈已偷合為諫官所劾左遷五年侍中致仕金富軾卒謚文烈富軾豐貌碩體面黑目露以文章名世再掌禮闈以得士稱宋使徐兢來富軾為接伴兢見富軾善属文通古今乃著圖經載富軾世家又圖形歸奏天子鏤板以傳名振天下樞宻院知奏事鄭襲明卒襲明迎日縣人倜儻竒偉力學能文以鄉貢擢第王為太子仁宗欲廢之而立次子襲明為東宫侍讀盡力調護故得不廢久居諫職有諍臣風仁宗臨薨謂太子曰治國須聽襲明之言及王即位自以先朝顧托知無不言王憚之金存中等日夜短之襲明揣知王意仰藥而死宰相崔惟清文公元庾弼等率諫官王軾等伏閣請曰郎中鄭叙交結大寧侯王弟暻也邀致宴樂宦者鄭諴以私怨謀陷臺諫初於内宴諴帶犀臺官使吏取之諴怨之誘閔夀開誣告臺省怨王謀推大寧侯乃罷諴杖流叙于東萊叙将行王謂曰今日迫于朝議行當召還既流召命久不至乃撫琴作歌詞極悽惋自號𤓰亭後人名其曲曰鄭𤓰亭後移配巨濟鄭仲夫用事召還叙性輕薄有才藝其妻任氏乃任太后族也八年金貞元二年更定科舉法初塲迭試論筞中塲試經義終塲試詩賦又國學生考以六行積十四分以上者許且赴終塲不拘其額又除三塲連卷法水原吏崔婁伯者年十五父尚翥為虎所食即何斧斫之刳其腹取父骸肉以葬盛肉于瓮埋川中廬墓服闋盡食之後登第仕至起居舍人十年金正隆元年少保金存中卒存中性聰慧有詩名與鄭諴相結用事大張威福財累鉅萬安定公任元厚卒初名元凱器宇宏深風采嚴重博通經史為宰相勤儉清白判吏部銓注甚公不信託請人服其明十一年幸國清敬天兩寺有司以行在所狹隘請去史官王曰史官記予言動不可暫離也史臣曰毅宗之為君失徳滋甚假使懼直筆而欲去史官為左右者當援古證今力陳其不可今乃先意導之欲去史官何也欲逃姦諛之誅得乎遷太后任氏于普濟寺流弟大寕侯暻于天安府貶崔惟清為忠州牧史王素信圗䜟不友諸弟宻諭臺諫劾大寕侯恐太后先遷之以宦者鄭諴權知閤事祗候知御史臺事李公升等不署告身王怒皆貶黜史臣曰宦寺與於搢紳之列古無其制王以乳媪之故溺於私愛既授朝官又督告身何也由是閹人日盛若王光就白子端輩相繼用事蔽塞聰明宰相臺諫畏威脅勢緘黙不言終致普賢之變築東離宫城以故大臣第宅為宫又毁民家五十餘區多作亭榭遣金柔立往審羽陵島柔立回奏云島中有大山下有村落基址七所有石佛鐵鐘石塔多生柴胡石橘然土多巖石民不可居寢其議御史中丞吳中正死中正起自胥吏嚴烈詭隨要結貴近能為禍福時崔褒偁亦强狠疾不附已知中正依阿報恩讐故薦為是職未幾死十二年門下侍郎平章事致仕梁元俊卒元俊出自胥吏甞與諫官論鄭諴堅執不變時議重之性清儉純直終始一節不事産業不通餽謝門巷蕭然初守光州妻事姑不謹黜之妻子號哭乞哀終不許至使其妻獨還人或譏其不仁右僕射申淑棄官歸田里淑髙靈縣人博學經書以清儉忠正著名十七年宋隆興元年金大定三年左正言文克謙上疏言宦者白善淵專擅威福與宫人無比為醜行無比得幸於王生三女九男術人榮儀左道取媚於上常侍崔褒偁職掌權要勢傾中外貪墨無厭請斬善淵無比黜榮儀罷褒偁以謝一國疏中又及宫禁帷薄之事王怒焚其疏貶克謙為晉州判官初無比壻崔光鈎為録事諫官不署告身王召諫議李知深尹麟瞻等督署之皆唯唯而退有人嘲之曰莫説為司諫無言是正言口吃為諫議悠悠何所論至是克謙作疏知深等又不連署克謙貶後視事自若又有人誦宋人並游英俊顔何厚之句議之十八年冬十一月隂霧四塞行者失路太史奏五行志曰霧者衆邪之氣連日不觧其國昏亂又曰霧起十步外不見人是謂晝昏占曰破國王者出入起居不可無常今陛下處非其位任非其人明堂久曠而不居天災可懼而不省移徙無常號令不時故有此異王竟不悟十九年幸觀瀾亭初吏部侍郎韓靖别創佛宇於仁濟院中内侍侍郎金敦中待制金敦時重創觀瀾寺内宦鄭諴創奉靈寺並為王祝釐之所王屢幸靖等争相務侈觀玩以悦之城東沙川龍淵寺南有石壁數仭峭立臨川曰虎岩流水停滀樹木蓊蔚命構亭其側名延福竒花異木列植四隅與宰侍屢宴于此二十一年殺大寧侯暻家僮羅彦有成黄益王以燃燈如奉恩寺夜還至觀風樓承宣金敦中馬素不調聞鉦鼓聲益驚觸一騎士矢房矢躍出落輦傍敦中不自首王驚愕以為流矢疾馳還宫於是逮捕絡繹疑有成等所為鞫問深刻有成等誣服斬之及有成妻百官稱賀幸衆美亭亭在清寕齋南麓初是亭之役也有一卒貧甚不能自給役徒共分飯一匙食之一日其妻具食來餉且曰宜召所親共之卒曰家貧何以備辦将私於人而得之乎豈竊人所有乎妻曰貌醜誰與私性拙安能盜但剪髪買來耳因示其首卒嗚咽不能食聞者悲之王馳馬至獺嶺茶院從臣皆莫及王獨倚院柱謂侍者曰鄭襲明若在吾豈得至此史臣曰毅宗輕佻無人君之度即阼二十餘年荒滛怠忽不仁不義習與性成不可救藥幸而天誘其衷追念襲明悔心萌而善端已露茍有一二忠正之臣因其牖而開導之不至於終迷不復矣二十二年宋乾道四年耽羅賊良守等謀反安撫使趙冬曦討平之二十四年春正月朔御大觀殿受賀王自製臣僚賀表史臣曰世之稱人主華藻浮靡者必以陳后主隋煬帝為首然不過與臣下賦詩争能而已至於自撰表贊徳則雖二主亦未嘗􅌤然為之毅宗之失於兹甚矣以内侍黄文荘為國子博士直翰林院王幸延福亭時羣臣皆占所見之物為嘉瑞蓬艾三莖生于庭以為瑞華文莊見水鳥指為𤣥鶴作詩贊之王稱歎欲拜正言以年少改拜是職庚寅八月王幸普賢院武臣鄭仲夫李義方李髙等反大殺扈從文官宦寺等遣兵盡殺留都文官以王還宫王荒滛不恤政事承宣林宗植起居注韓頼怙寵傲物蔑視武士仲夫等憤激因王自興王寺幸普賢院矯旨聚軍殺宗植等金敦中在途聞亂佯醉堕馬而逃頼匿御床下髙等脅出殺之承宣李世通等凡扈從文官及大小臣僚宦寺皆遇害唯承宣盧永醇以兵家子免仲夫等選驍勇人往殺留都宰臣崔褒偁許洪材金敦時李知深等五十餘人敦中匿紺嶽山仲夫挾宿怨搆之急其奴重賞来告之按捕殺之敦中臨死嘆曰流矢之變禍及無辜今日之及宜矣迎王弟翼陽公皓即位初崔汝諧夢太祖授笏於皓至是果騐放王于巨濟縣太子于珍島縣殺太孫釋文克謙為承宣普賢之亂克謙聞亂逃匿追迹獲之諸将素聞其名不殺囚之文臣李公升等多頼以免武臣亦倚之多咨訪故事毅宗性輕佻喜文藻好擊毬多作池臺亭榭與文臣許洪材金敦中敦時李復基韓頼輩比狎游幸沉滛詩酒日以繼夜侍衛武士飢困痛切骨髓卒及於亂明宗光孝王諱皓字之旦毅宗母弟元年宋乾道七年金大定十一年李高與僧脩惠等謀反伏誅髙有非望之志及元子冠将宴于麗正宫髙招致惡少斬馬饗之将作亂金大用之子為髙驅使者聞其謀以告義方素惡髙逼已即以鐵椎擊殺之遣工部郎中庾應圭如金借作前王使上表告以讓位金主曰廢兄篡位造飾虚辭欺㒺上國合行天罰應圭辨對不屈不食五日立庭待命金主嘉其忠誠乃授回詔厚慰而送之仍遣完顔靖詢問前王傳位事故王稱前王已避位出居他所病篤不能就位拜命路又險逺非使者所宜徃以故不得見前王王乃具前王表以附靖行平章事徐恭卒恭有膽畧善騎射為宰相益謙遜深疾文吏驕傲禮遇武人故不及庚寅之禍宫闕災鄭仲夫等恐有變閉紫城門不納救火人殿宇悉焚王出山呼亭痛哭庾應圭詣景靈殿出五室祖真又出中省國印三年癸巳八月東北面兵馬使金甫當起兵與韓彦國李敬直等討鄭仲夫李義方等謀復前王不克死之仲夫義方等復大殺文臣史臣曰甫當起兵於東南慷慨發憤以討亂逆救君父為己任其用心不可謂之不正矣其與敬直純錫寅俊諸輩同奉前王以倡大義可謂名正言順而事亦出於是者不幸而敗至於殺身良可惜也李義旼弑前王于慶州初金甫當起兵於東界與李敬直張純錫栁寅俊裴允材韓彦國等合謀奉前王出居慶州仲夫等聞之遣李義旼等領兵趨慶州州人内應囚前王於館義旼出之至坤元寺北淵拉脊骨裹以褥合兩釜投淵中旋風卒起塵沙飛揚寺僧有善泅者取釜棄屍屍出水涘有日烏鳶不食州户長弼仁等宻具棺奉瘞水濵初金使來相金敦中甚不差毅宗異之亦使人問曰寡人夀幾何金使曰滿朝老少之臣盡逝然後有臨川之患及庚癸之亂老少文臣皆被害而王亦遇淵上之變其言果驗四年宋淳熙元年西京留守趙位寵起兵討鄭仲夫李義方檄召兩界諸城岊嶺以北皆應之平章事尹鱗瞻率三軍至岊嶺與戰敗績西兵陷和州即今永興府西北郡縣皆陷後三年鱗瞻與将軍杜景升𤣥徳秀等攻拔西城斬位寵史臣曰位寵為君父討賊可謂義舉也但不於金甫當舉義之時而逗遛失機其計誤矣中書侍郎平章事崔惟清卒惟清昌原郡人平章事奭之子少孤嗜學經史子集靡不該通中第不求仕宦有薦舉者即曰學未就固辭久之被薦直翰林院官至平章事庚癸之亂文臣皆被害而諸将素服徳望戒軍士勿入其第期功之親俱免嘗撰李翰林集注及栁文事實鏤板以傳但好佛日誦經李義方伏誅義方自納女東宫益擅威福衆心憤怨時尹鱗瞻治兵西郊僧徒亦從軍義方偶出宣義門外鄭筠仲夫子宻誘僧宗旵等伺隙斬之分捕俊儀兄弟及其黨皆殺之奏黜義方女俊儀嘗罵義方汝有三大惡放君而弑之取其第宅姬妾一也脅姦太后女弟二也專擅國政三也義方大怒欲殺之文克謙止之曰以弟殺兄惡莫大焉義方不果五年工部侍郎庾應圭卒應圭平章事弼之子性頴悟美丰儀時人謂之玉人善屬文再舉不第入補内侍操行貞固持議端方斷事若夙成然出倅南京政尚清介一介不取於人其妻因免乳得疾但菜羮而已有衙吏宻饋隻雉妻曰良人平生未嘗受人饋遺豈宜以我口腹累良人清徳耶吏慙而退南人頌之甞告奏于金金人髙其使節每于使介徃來必問安否卒年四十五發前王䘮改葬陵曰禧廟號毅宗百官𤣥冠素服三日趙位寵起兵故也初将軍朴存威甞使於雲中道每誇納釜之事至是雲州人應位寵斬之六年三月東海水變為血色中書侍郎平章亊尹鱗瞻卒鱗瞻彦頤之子性聰悟過人雖千百人一問姓名輒記不忘庚寅之後武臣用事鱗瞻每被掣肘脂韋自保而已及平西賞罰不中措置失宜致使西北降附之民屢叛物議少之九年同知樞宻院事于學儒卒學儒倜儻有氣槩久宿衛忠謹無他季髙義方等作亂議主兵者皆曰在今舍于公復何人哉遂詣其家謀之學儒曰公之志大矣然吾父嘗戒曰武官見屈於文官久矣能無憤乎去之易如拉朽然文官見害禍及吾輩亦不旋踵汝宜慎之父雖没言猶在耳死且不從及二李得志謀害之學儒懼求娶義方姊得免叅知政事陳俊卒俊性質直有勇力庚癸之亂文臣之家頼俊全活者甚多時人謂有隂徳後必昌其孫次華温皆登第有文名華善為詩詞與李奎報齊名時號李正言陳翰林鄭仲夫宋有仁伏誅将軍慶大升甞憤仲夫跋扈謀欲討之會其子筠潜圗尚公主王患之又其壻有仁斥文克謙韓文俊大失人心朝臣皆側目大升乃與勇士許升決䇿殺筠於直所發禁軍分捕仲夫及有仁父子悉斬之梟首于市朝士詣闕賀大升曰弑君者尚在焉賀為李義旼聞之大懼十年内嬖明春死王失聲號哭太后寛譬之曰此雖鍾情然不可使聞於重房鄭仲夫等置重房於内常自㑹直國家大事無不恭决後亦仍之王猶嗚咽不能止冡宰閔令謨性訥怯少虧操履判兵部李光挺頑貪無識奔競賄賂無復亷恥郎舍奏舊制文吏散官補外者皆有年限今或一二年而超受或三十年而不調政濫人怨請依年限制韓文俊等力排其議史臣曰庚癸以來政歸武夫雖有一二文臣之執國政者復有貪鄙無節操不能奉公守正政以賄成則又安得鎮武夫不遜之心乎如令謨之為冡宰光挺之主銓選不滿公議而為郎舍論駁者盖以此也當時選舉之法濫毁非獨武臣之罪亦文臣執政之過也罷管城富城二縣管城縣令洪彦荒滛虐民吏民執彦幽之富城令亦與縣尉不相能害及于民民殺尉有司奏罷之十三年将軍慶大升卒大升清州人膂力絶人早有大志不事家産父珍貪鄙多奪人田及卒大升以其田案悉納選軍一無所取人服其清常憤武人不法慨然有復古之志文官倚以為重及誅鄭宋人多趨附然非有學識勇略者輒拒之武臣畏憚不敢縱肆卒年三十王聽譛捕都房大升去仲夫恐有害已者招死士百餘養門下號曰都房並流逺島金子格誣告都房恃勢作亂王命捕流之十四年召還李義旼初義旼畏慶大升歸其鄉慶州屢召不至及大升卒猶不至王懼其為亂遣中使敦諭乃至史臣曰義旼躬行大事亂賊之魁而獨漏天誅王宜明正典刑雪天地神人之憤顧為積威所怯屢下詔諭待遇之恩比舊愈隆曽未數年身都將相手握重兵亂臣賊子将何所懲艾乎以鄭邦祐知御史臺事鄭允當為吏部貟外郎李居正為左正言邦祐起自胥吏特授臺諫不滿人意允當年少無知其父世裕出為兵馬使歛民財貨連獻内府故有是升居正無他材能王欲除正言林民庇與居正有舊因薦曰居正性和平且訥黙非耿介者也乃授之王凡用人唯與嬖臣宦竪議親署恭官以上封其草直付政曺名曰下批兵部尚書朴純弼大營私第於東宫旁太子請上禁之王曰朴尚書必不聽我言聞者莫不憤歎十五年命文臣製瀟湘八景詩倣其詩意摹寫為圗王精於圗畫與畫工李光弼等繪畫物像終日忘倦光弼父寕亦以畫知名甞入宋徽宗以一竒畫誇之寕曰臣筆也帝不信寕拆粧背果有其姓名散員同正盧克清家貧将賣宅未售因事之外郡其妻受郎中𤣥徳秀白銀十二斤賣之及克清還詣徳秀曰予甞買此只給九斤耳居數年無所加飾而贏得三斤豈理也請還之徳秀曰爾能守義而予獨未耶遂不受克清曰予平生不為非義豈可賤買貴賣以黷于貨子若不從即當悉還其直復吾家也徳秀不得已受之因謂曰予豈不逮克清者乎遂施銀佛寺聞者歎息侍御史二人與宦官㑹廣真寺為流頭飲國俗以六月十五日沐髪於東流水祓除不祥因㑹飲號流頭飲史臣曰商鞅因景監見趙良寒心趙談驂乗爰絲變色是故有志之士羞托宦䜿況處臺閣任風憲者而與宦䜿㑹飲乎工部尚書咸有一卒有一起於胥吏夙夜刻苦家貧衣敝履穿力排巫覡焚毁滛祀平生不事生業其妻請為子孫立産業曰予早孤無援清苦守節以立門户兒輩但當正直節儉以俟命耳何戚戚于貧窶乎平章事李公升卒謚文貞公升生而頴悟總角能屬文操行髙潔然卜延福亭基遂興大役人多怨之癸巳之亂匿佛寺頼門生文克謙得免性輕躁不能容人過見輒嫚罵十六年秘書監雀陟卿卒陟卿完山人初侍郎朴椿齡守完山以聯句選郡童陟卿及崔均崔松年皆擢第為名士時號完山三童陟卿性亷介常補京山府判官秩滿還京足不至公卿之門者餘年崔允儀判吏部知其清直拜為耽羅令以鎮獷俗陟卿興利革弊民皆安之及還居京三年貧不自存挈家歸鄉㑹耽羅人苦令尉侵暴反曰如得陟卿當釋兵即除耽羅令邑人見之投戈羅拜凡所至皆有聲績清名勁節老而不衰鎮星犯嵗設消災道塲以上将軍崔世輔同脩國事時有人訴脩國史文克謙直書毅宗被弑之事宜令武臣兼之使不得直書王重違武臣意然以同脩國事下制世輔不請而以史字改之左倉竭無以頒禄借典牧司及将作監銀布補之流䜛人朴敦夫于逺島時匿名書甚多人皆危懼重房宻令禁軍伺之敦夫懐書将貼門捕得流之道死十七年秋七月晦日有食之工部尚書曹元正上將軍石隣等謀逆伏誅初元正奪中書省公𪠘田租文克謙上章請治其罪乃左遷其子英植英迪應倫及壻李住又在近宻貪暴愈甚重房亦奏黜之石隣少寒㣲世居倉旁拾落庭米以生補禁軍庚寅之亂從李義方擢郎將遂顯甞受驛吏銀屬事於四海道按察康用儒不從隣憾之請王免其職王不聽隣怒瞋目張拳厲聲曰吾不復仕矣遂觧帶投地而去偃蹇不朝二人合謀夜遣賊七十餘人踰垣入宫格殺梁翼等中郎将髙安祐聞變赴闕至市樓橋邉見一髠詐為病乞兒卧糞壤中即收捕有紅燭跋在腰間囚繫鞫問乃曹元正怨文克謙欲去之與石隣石沖石夫朱迪等遣家臣作亂悉捕誅之十八年秋七月大雨定張宣豫髙和六州漂流民屋不可勝數又鎮溟境内黄蟲黄鼠隨雨而下大損禾稼十九年平章事文克謙卒克謙南平郡人知門下省事公裕子䕃補剛定都監判官竟擢第為人忠孝勤儉慈仁正直三掌禮闈所舉多名士然聽權豪請託不察賢否銓注乖錯又官其齠齓子弟廣植田園二十年以崔世輔守太師杜景升守太尉李義旼同中書門下平章事朴純弼中書侍郎平章事史正儒守司空左僕射恭知政事李奕㽔恭知政事李知命為太子少傅白任至知門下省事先是省宰增至七至是又增八里巷歌曰皇國實無寺省中置七齋七齋今未了八齋復入來盖齋與宰聲相近為廋辭以譏之二十一年宋紹熙二年金明昌二年以杜景升監脩國史時有醫題壁自稱玉堂人有人嘲之曰戰将今為脩國史不妨醫作玉堂人景升與李義旼坐省中論事相失義旼奮拳擊柱時有人作詩嘲之詩云吾畏李與杜屹然與宰輔黄閣三四年拳風一萬古政堂文學李知命卒知命博覧羣書善詞賦工草𨽻擢第調黄州書記居官亷正賑活飢民甚衆後為中州判官政如黄州庚寅之亂内外文臣逃遁無地惟知命為州人所䕶得免王以為有文行擢為諫官自是所著聲績再掌禮闈若趙冲韓光衍李奎報俞升旦劉冲基皆其所取世以得人稱之二十二年徳寧公主卒仁宗女天姿艷麗舉止閑雅毅宗屢召入内頗有醜聲大将軍金存傑自殺時南賊金沙彌據雲門孝心據草田嘯聚亡命剽掠州縣王命存傑率将軍李至純等討之至純義旼子也義旼嘗夢紅霓起两腋頗自負又聞古䜟有龍孫十二盡更有十八子之語因懐非望與南賊通謀其子至純輒泄軍中動静故屢敗存傑憤曰治之則其父必害我否則賊盗熾遂仰藥二十五年仁宗出妃福昌院主李氏卒仁宗念其覆椀之功賜田宅奴婢王即位奉事彌篤及卒塟以后禮二十六年宋慶元二年金承安元年将軍崔忠獻忠獻以勇敢選補别抄以勞遷将軍與其弟忠粹發兵誅賊臣李義旼大殺朝臣二十七年秋九月大雷電崔忠獻廢王放于江華立王弟平凉公旼崔忠獻殺其弟忠粹忠粹欲納其女于太子忠獻止之忠粹怒謀害忠獻忠獻起兵誅之前中書令杜景升卒于紫燕島初忠獻欲廢王乃流景升于島景升萬頃縣人性質寛厚少文有勇力初為牽龍庚寅之亂武人多劫奪人財景升獨不離殿門秋毫不犯及金甫當趙位寵之役征戰有功封功臣掌吏部銓注雖内寵權貴莫敢撓之舊制三品以上遷級例上讓表景升獨曰内不欲讓而借人筆以飾外禮吾不忍為也至是憂憤嘔血卒神宗靖孝王諱旼改晫字至華明宗弟元年宋慶元四年金承安三年置山川禆補都監崔忠獻從術士議置之金宣問使孫俁來詰遜位事必欲親見前王授詔門下侍郎趙永仁曰前王養疾南州計程三十日乃至俁曰茍如是不必親授遂傳詔于王二年崔忠獻以兵部尚書知吏部事總文武銓注出入禁闥以兵自衛忠獻恐其生變不測大小文武官吏閑良之士至於軍卒强有力者並皆招致分為六番更日值宿其家號曰都房四年刑部尚書閔湜卒湜令謨子豁達有大度明宗諸小各招納權賄朝士争附湜獨不徃五年宋嘉泰三年金㤗和二年崔忠獻在私第與吏部貟外郎盧琯忠獻外戚起市井性巧黠善承迎注擬文武官以奏王頷之二部判事但檢閲而已門下侍中趙永仁卒永仁博學善屬文少時魁然有宰相器明宗命輔導太子及為承宣多所匡救物議歸重前王薨于昌樂宫王欲塟以王禮忠獻以為不可降從塟妃禮太子斥在江華不得與喪事七年王患疽傳位太子移御徳陽侯邸薨忠獻議減䘮十四日降東京留守為知慶州事陞安東都䕶為大都䕶府忠獻以慶州有叛賊安東盡心捍禦故陞降之韓惟漢入隐智異山終身不出惟漢世居京都見忠獻擅政曰難将至矣遂攜妻子隐智異山清脩苦節不與世人交徵為西大悲院録事不就乃移居深谷終身不返未幾果有契丹之難䝉古兵再至熙宗成孝王諱徳改韺字不陂神宗子母靖宣太后金氏元年宋開禧元年金泰和五年以守太師崔忠獻封晉康侯立府曰興寧後改為晉康府置僚屬自後出入宫禁便服張盖侍從門客殆三千餘人三年䝉古太祖元年崔忠獻殺其甥朴晉材晉材門客多於忠獻率皆勇悍晉材流言舅氏将有無君之心忠獻知其必害己召至詰之斷脚筋流白翎鎮尋死四年祔神宗于太廟本朝廟制九室而有新祔主則奉出主安于本陵忠獻議據古典有功者不遷親盡者毁之以順宗親盡當出以神宗祔于第九室太祖在西東向惠顯同為第一昭宣肅同為第二昭仁宗為第三昭文宗為第一穆睿宗為第二穆神宗為第三穆史臣曰漢書云父昭子穆孫復為昭公羊傳曰父為昭子為穆孫從王父則昭穆之序一定不易矣今國無恒典而随時變易昭穆之序大紊矣王曲宴于忠獻茅亭唱和終夜劇飲亭在男山里第旁植雙松崔頤為賦雙松詩兩制文士皆和李奎報作序記以美之五年秋九月崔忠獻㑹賔客設重陽宴使都房有力者手搏勝者即授校尉隊正以賞之史臣任翊曰按國家頒政例六月謂權務政十二月謂大政吏兵判事與諸同僚㑹坐于各部功者陟之罪者黜之一陟一黜皆承上命過此時雖有所缺未甞差授况無功者乎忠獻威侵一國獨專政柄若有所缺則不顧官爵之為公器乃以眼前小戯亂其邦憲又因左右所托或授東班權務之職若納賄稱意者即許之其頒政無常專恣弄法未有甚于此者矣召明宗太子璹于江華封漢南公改名貞平章事致仕崔讜卒讜善屬文敡歴中外皆有聲績名重一時年未衰耄上章乞退扁所居齋曰雙明與弟詵及張自牧李俊昌白光臣髙莹中李世長𤣥徳秀趙通等為耆老㑹逍遥自適圖形刻石傳於世時人謂之地上仙忠獻廢王遷于紫鷰島王與王濬明于承慶等謀去忠獻事泄見廢奉立漢南公貞改名祦朝鮮史畧卷七
