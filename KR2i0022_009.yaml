body:
  text: 朝鮮史略卷九高麗紀忠烈王諱謀後改昛元宗長子母順敬太后金氏元年宋孝恭帝徳祐元年元至元十二年太府卿朴榆上疏言我國男少女多而尊卑止於一妻其無子者亦不敢畜妾異國人來娶妻無定限臣恐人物皆將北流宜令臣僚許娶庶妻隨品降殺庶人得娶一妻一妾其庶妻所生子皆比適子得仕于朝怨曠以消户口日増疏上宰相有畏妻者寢其議榆嘗言東方屬木木之生數三而成數八東方之男寡女多理數然也元遣蠻子軍來分處海鹽白三州一千四百人王及公主幸洛山寺自是屢幸寺院禁白衣太史局言東方木位色尚青而白者金之色也國人自易服多裼以白紵之衣木制於金之象也請禁白色故從之罷全羅道按察使安戩長興府副使辛佐宣鷹坊吳淑富怙勢肆暴戩等不禮淑富譖王罷之初作宣傳消息舊制凡命令徵求必下宣㫖王即位宣㫖頻煩州郡疲於迎命李汾成建白令承宣奉王㫖作書署名紙尾發下諸道按察守令謂之消息於是消息蜂午州縣苦之王問李汾成曰聞郎將中將等以不得臨民之任為憾今欲交差何如對曰武人有吏才知民事者蓋寡如有才兼文武寛猛相濟者無論東西使之臨民可也王納之自庚癸以來權臣柄國立文武交差之法始以武官補外及承宣朴恒掌銓注東班必外補然後授朝官西班不補外至是武官請王左右復之且故事政房員當除授晨入暮出干謁填門自恒掌銓注始留宿禁中除授訖乃出王不豫欲下赦承宣洪子藩以數赦不可請以口傳放囚史臣曰使犯法得脱宣㫖與口傳何别乎後世權豪藉口傳釋法司罪囚未必非子藩啟之也定朝官服章宰樞以上玉帶六品以上犀帶七品以下黒帶以金光逺為慶尚道都指揮使修戰艦以元將復征日本故也二年宋端宗景炎元年王及公主獵于猫串自此幸獵無常改宣㫖曰王㫖朕曰孤赦曰宥奏曰呈先是達嚕噶齊詰其僭故遣使請改知僉議府事致仕張鎰卒鎰性恭温正直善屬文優於吏才置通文館令禁内學館七品以下年未四十者習漢語時譯者多起微賤傳語多不以實懐姦濟私故參文學事金坵獻議置之參文學事俞千遇卒千遇性聰敏多機辨為崔怡所器重入政房多受賂為史官不修史曰當時國事皆晉陽公所為吾䝉厚恩何敢傳其惡於後耶𬈑州吏金遷得母於遼陽以歸母及弟徳麟為䝉兵所虜遷時年十五傳聞母死服衰三年後十四年有習成者傳母書即欲贖來齎白金入遼東得母於軍卒要左家徳麟亦生在鄰家遷贖母而還後徳麟隨元使來亦以白金贖之僉議府言公主怯怜口及内僚廣佔良田多受賜牌不納租税請收還賜牌不聽怯怜口華言私屬也公主立府置屬及僚故因縁作弊四年宋帝昺祥興元年流侍中金方慶于大青島先是韋得儒盧進義以私怨謀陷金方慶誣告云方慶與其子忻壻趙忭等謀去王及公主達嚕噶齊入據江華以反王命栁璥與實都大衢等雜問知誣妄釋之察球爾挾憾本國嘗欲伺釁及聞方慶事奏于帝請中書省來鞫詔與王公主同問於是王與實都察球爾復鞫方慶及其子忻察球爾以鐡索圈其首若將加釘又叱杖者擊其頭裸立終日時天極寒肌膚凍如潑墨察球爾必欲服之加以慘毒身無完肌絶而復蘇者屢矣方慶曰小國戴上國如天愛之如親豈有背天逆親自取滅亡哉顧謂察球爾曰欲殺便殺我不以不義屈於是只以藏甲為罪流方慶于大青島忻于白翎島國人皆遮道泣送右司議大夫鄭興辭職歸羅州時李汾禧兄弟附察球爾醖釀金方慶之罪故興恥與同朝乞歸養母王怒諭遣之尋召還令境内變元服時自宰相至下僚無不開剃唯禁内學館不剃左承㫖朴恒呼執事官諭之於是學生皆剃帝命金方慶父子韋得儒盧進義等從王入朝對辨於是方慶父子得儒進義如元至姚家寨進義舌爛而死得儒至元亦死人以為天誅參文學士金坵卒坵善屬文掌國文翰時上國徵詰殆無虚嵗坵撰表章遇事措辭皆中於理元學士王鶚每見其表必稱美之以不見其面為恨性悃愊無華寡言語至論國事切直無所避諡文真新置必且齊以朴恒金周鼎等為之又以内僚鄭承伍為申聞色舊制凡國家事宰樞㑹議令承宣稟㫖而行周鼎建議曰宰樞既衆無適謀政宜别置必且齊委以機務又内僚不可皆令啓事當更擇人為申聞色而罷其餘恒等常㑹禁中參決機務號别㕔五年用樂祀新殿瓦鷲史臣曰臧文仲祀爰居以金奏夫子謂之不智況用樂以祀瓦鷲乎日本倭人殺元使初帝遣使日本王令舍人郎將徐贊及梢工上左等三十人導行倭人皆殺之王遣郎將池瑄如元奏之火星食月六年監察侍丞崔有渰以論時務直言忤㫖流大青島承㫖趙仁規言於王曰有渰勵節奉上不可輕棄固請再三王怒稍解召還監察侍史沈諹等伏陳王遊田馳馬之失以及忽赤鷹坊爭設内宴窮奢極侈之弊且舉將軍尹秀侍宴内殿登床起舞犯禮不恭之罪禪師祖英淫穢無行出入卧内之事皆直斥不諱王大怒命鞫于崇文館究問首議之人闗木索置瓦股間令人迭踏其上血迸流地諹終不言遂囚巡馬所白文節臯郭預閔漬乘間乞賜寛貸乃釋之諹謇諤無他以振綱自任初為公州副使有長城縣女言錦城大王降我為神堂巫矣吾將往上國與縣人孔允邱行所過州縣皆公服郊迎至公州諹不待巫怒傳神語曰我必禍諹退寓日新驛諹使人覘之巫與允邱宿遂捕鞫之俱服王以詩賦親試文臣取趙簡等九人賜黄牌籍内侍王留意詩文親試文臣中考謂殿試門生待遇異常只試當年登第者僧祖英請不限登第久近並赴將其姪子宣等試藁達王請拆糊封定行目以子宣為首王召朴恒郭預等改考及榜出簡居首皆非祖英所定七年王與實都察球爾議征日本事王南面實都等東面事元以來王與使者東西相對今實都等不敢抗禮國人大悦議畢實都察球爾及金方慶朴球金周鼎等復以舟師至日本大明浦周鼎先與倭交鋒諸軍皆力與戰郎將康彦等死之向一岐島船軍及梢工遭風多失所之方慶等又與倭力戰斬首三百餘級日本兵突進軍潰察球爾僅免軍中大疫死于兵疫者三千餘人實都等累戰不利且范文虎過期不至文虎將南軍由南海期㑹實都等于日本議迴軍既而文虎以戰艦三千五百艘蠻軍十餘萬至適值大風蠻軍皆溺死屍隨潮汐入浦浦為之塞可踐而行文虎實都等遂北還元軍不返者十萬有竒我軍不返者亦七千餘人元乃罷征東行省贊成事朴恒卒恒春州人初䝉兵陷州恒自京往視失父母所之積屍中得肖貌者輒收瘞凡三百餘人恒能文章長於吏才寛厚善接人但臨事自用不恤人言掌銓注其所擢多其恩舊王與公主幸慶尚道南州按亷閔萱茍容自衒專擅啟事以媚於王人謂内按亷元置鎮邉萬户府於金州等處以印侯為昭勇大將軍鎮邉萬户賜虎符以昇天即今順天府府使崔碩為秘書郎昇天舊俗每邑守遞還贈以馬八匹及碩還邑人例持馬請擇碩笑曰馬能至京足矣何擇焉至家以馬歸之吏不受碩曰吾守汝州吾有牝馬生駒今帶以來是我之貪也汝之不受豈非知我之貪而以我為貌辭耶并其駒與之自是其弊遂絶州人頌徳立石號八馬碑作大屋于禁苑使張恭李平養鷹王日必再至二人殺城中雞狗無算八年大司成白文節卒文節文詞富贍為一時所推不以才自負元宗復位如元林衍以其子惟幹及腹心扈行固要勿言廢立事王使文節撰表言以病辭位文節閣筆泣諫王感悟奏以實文節常若懶拙及是人知其有志節尹秀朴義李貞元卿等勸王遊獵世子年九嵗忽泣下曰今兹百姓困窮又當東作時父王何為逺獵顧謂義曰每以鷹犬縱臾吾君者此老狗也義慙靦而退九年元欲復征日本本國人庾賙言於帝曰以蠻夷攻蠻夷中國之勢也請令髙麗蠻子征日本勿遣䝉古軍又令髙麗備兵糧二十萬碩帝許之圖嚕古金忻謂賙曰汝非黔弼資諒之孫耶而欲壞國家如此王又用尹秀之言將令儒士充軍右承㫖鄭可臣曰先王用人文武隨其材比之於身如左右手故上國之法儒户不與軍事今殿下欲使褎博之徒被堅執鋭逺從征伐恐虧聖徳王然之王謂宰樞曰國小民貧旱魃為虐欲罷鷹坊印侯曰鷹坊請於帝而置之豈宜罷十年典法判書金壻卒時貞和院妃有寵於王認民為𨽻民訴于典法司有㫖督令斷與貞和壻與同僚知其寃不能違㫖唯郎李行儉死執不可㑹疾作在告壻等遂斷為𨽻有人夢利刃自天而下亂斫一司之吏明日壻發背疽而死其後同僚相繼而死唯行儉獨免十一年東寧府千户崔坦來享王史臣曰坦背本國附大元割國之半而據之噬主之心狺然未已其享之也豈真出於誠邪安知不隂懐睥睨之心而陽為此區區之禮也哉王何不察待仇讐如腹心甘受其享而不之疑乎同知貢舉左承㫖崔守璜事佛甚篤當宴賀客略具酒饌不肉而素王㫖别監林貞杞遺白粲一舟守璜曰吾於王賜尚不受況民膏乎拒不納貞杞慚怒即以米舟賂權貴代守璜為承㫖十二年王欲以參官授一内官左承㫖安戩執不可王强之對曰題品銓注豈臣所堪乞擇賢者代之言甚切王怒起入内戩隨之啟曰臣明當見代其内豎參官之命乞留之以須後日王已逾閫顧而厲聲曰可左右皆懼戩退徐曰殿下許臣矣遂削去擬牒人皆嘆服知密直司事郭預如元卒于道年五十五為人平淡勁直謙遜樂易雖至貴顯如布衣時善屬文書法瘦勁成一家體當世效之翕然一變其在翰院每雨中跣足持􅏛獨至龍化池賞蓮後人髙其風致多詠其事十三年罷僉議府事金周鼎王宴羣臣周鼎稱觴而退公主呼曰卿子深逼妻自縊父不能懲子耶周鼎跪白曰虎且不食其子公主不恱周鼎退支頥而睡公主使人責之曰卿醉耶睡耶周鼎曰臣無睡也公主大怒罷其職監試試員林貞杞享王故事掌試者宴賀客凡三日近年先試享王謂之品呈蓋以宴品先呈于王也遂為常例全羅道王㫖别監權宜以銀四十斤虎皮二十領獻世子世子曰此物皆剥民斂怨非吾所欲遣人悉還其主知僉議府事朱恱卒諡文節恱綾城縣人嘗任羅靜二州昇天長興二府皆有聲績及按忠清慶尚全羅威名日振人皆敬畏國有大事擇使命則必首舉性剛直嚴重不與世俯仰疾惡如讐必厲聲大罵嘗以事至相府聽宰相語坐而不伏為按亷時内寺崔仲卿奉使來以美服誇人恱衣敝衣伸脚而坐捫蝨而談傍若無人仲卿慙赧而退恱有豁達寛厚之量不營家産雖為達官自奉如寒士文章富贍筆法亦竒恱貌醜鼻如爛橘公主宴羣臣恱起而為夀公主驚曰何遽令老醜鬼近前耶王曰此老貌醜如鬼心清如水公主敬重舉觴而飲十四年禁慶尚道勸農使獻細麻布先是蔡謨為勸農使多斂細麻布獻于王又賂左右權貴及李徳孫代之稍増其數至是薛永仁又倍其尺數布極細民甚苦之王聞之有是命知都僉議司事亷承益免時洪子藩為首相趙仁規為亞相承益次之承益得幸兩宫常居禁中希至都堂一日子藩先出仁規語承益曰國人謂洪公真宰相謂我為老譯謂公為老咒我等不預真宰相之目唯當勤朝衙夕直耳承益即辭免蓋仁規以譯語承益以神咒顯云世子以各道勸農使聚斂為事傷民害財白王罷之以按亷使兼其任世子嘗踞内僚元奕膝上奕謂世子曰人主不宜聰察殿下聰明太過宜小寛容世子作色曰汝輩使我癡暗持弄掌上如軟餅乎奕懼世子時年十四賜尹佐宣等及第宰相趙仁規子禑名居同進士頭王為禑嫌之國制科舉之目乙科三人丙科七人同進士二十三人世以同進士頭宦不達人皆惡之指為同頭問於李混加丙科八人置禑其末林貞杞死貞把雖以科第進然昧於文學嘗掌監試不能命題人笑之為王㫖别監務聚斂媚權貴驟遷擢至是暴死時有宰相洪休女寡為尼性喜言人短公主欲問民間事令出入卧内公主聞貞把死有悽愴色尼在側詐曰貞杞之死不足怪也以血成身其死宜速謂割民血以立其身也公主勃然色變王及公主選良家美女將獻于帝樞密院副使洪文系女亦在選中圖免未得文系遂剪其女髪公主聞之大怒囚文系痛加酷刑籍其家又囚其女問剪髪之故女曰我自剪之父實不知公主使人以鐵鞭亂捶身無完肌終不伏時宰相及致仕金方慶等詣殿門營救不聽流文系後數日洪子藩更力請命還家産然疾之甚卒以女賜䝉古阿固岱十五年康煦死王問左右曰莫是燃頭臂以救王疾者歟世子曰人臣事上之道在忠勤盡節燃頭燃臂乃浮屠之事非君子之所為而媚上敢行非禮雖死何惜聞者嘆服李㻂暴死㻂好勇善騎射養鷹遊獵為事生捕鳥雀去其毛口嚼以飼鷹隼或割生雞留其半而飼之王之好獵皆㻂導之僉議中贊致仕栁璥卒諡文正璥文化縣人公權之孫三别抄之亂璥在江華闔門被執不汚賊脱走徒步見王于松京璥有藻鑑論文章先體製後工拙累典禮闈所取皆知名士十六年元詔罷東寧府復歸我西北諸城王拜其總管韓慎桂文庇為大將軍𤣥元烈為太僕尹羅公彦李翰為將軍復置西北諸城守令以將軍鄭復均為西京留守前知僉議府事金周鼎卒周鼎少好學沈厚寡言不妄交遊初調富城尉時北兵大至國家驚擾周鼎備敵撫民威惠並著一方稱之其罷達嚕噶齊王京留戍軍合浦鎮守軍屯田等軍請赦金方慶皆周鼎筴也王益重之東征之役颶風覆舟官軍多溺死周鼎以計拯溺所活甚衆然為鷹坊都監使以鷹犬媚主頗張威福世子如元謁帝引見便殿問爾讀何書對曰有師儒鄭可臣閔漬從行來宿衛之暇時從質問孝經論語帝大悦試喚可臣來世子引與俱入賜坐問本國世代相傳之序理亂之迹風俗之宜聽之不倦其後命公卿議征交趾又召與同議二人對稱㫖於是授可臣翰林學士漬直學士後一年帝召見世子于紫檀殿御案前有物大圓小鋭色潔而貞高可尺有五寸内可受酒數斗乃摩訶鉢國所獻駱駞鳥卵也命世子觀之仍使可臣賦詩以進詩曰有卵大如甕中藏不老春願將千嵗夀醺及海東人十七年元叛賊納延餘黨哈坦兵前數年來陷和州登州殺人為糧得婦女聚麀而脯之始遣萬户印侯禦之王避兵江都丹兵又踰鐵嶺闌入交州道交州即今淮陽府陷楊根攻原州雉嶽城鄉貢進士元沖甲以數十人奮擊却之於是州兵稍集遂與合擊聲振山嶽斬賊帥圖烈圖等六十八人射殺者㡬半賊鋒挫鋭諸城亦堅守始有輕賊之心於是元遣將軍色徹肯奈曼岱等來助討之與我軍合撃哈坦于燕岐正左山下大敗之伏屍三十餘里賊精騎千餘渡河而遁金忻韓希愈與元軍復與賊騎戰又大敗之是戰賊有一勇士射我軍每發輒倒韓希愈持鎗馳馬突入賊陣人馬辟易扼勇士而出斬之掲其首于鎗示之賊皆褫氣大軍合擊敗之哈坦父子潰圍遁去僉議中贊計珙卒諡文敬珙孔岩縣人性恭儉不事生産雖至達官食不過一器布被蒲薦處之怡然羣居慎口其少也常率一僕掩骼埋胔殆無虚日見棄屍自負瘞之嘗夜月彈琴鄰有處女踰牆而奔珙不敢近喻以禮義其女慙悔而退十八年金延夀還自元報世子還期且以世子言白王曰嵗歉民饑車駕所至供億不貲願上毋出迎境上況父不可為子屈也王怒曰世子言不當如是史臣曰世子之失言於王王之加怒於世子實悖於天性以一小釁而嫌隙遽萌明者已知有後日父子相殘之變矣王以監察御史金有成為宣諭使置文翰署郭麟為書狀官䕶送入元日本人還其國仍致書招諭帝有詔故也時書狀闕人人皆以計避麟獨曰事不辭難臣子之義宰相喜遂充書狀婦翁崔諹欲圖免麟奮然曰死一也死國事不猶愈於死妻子手乎乃行日本嘗憾東征皆拘留不還二人存殁世不得聞十九年元洪巴圖爾福源孫來管造船復征日本也望王宫下馬禮遇宰相甚恭二十年王在元世祖皇帝崩奠薦之禮哀慕之誠皆致其極見新天子請歸耽羅曽屬䝉古帝從之耽羅雖還我國然買馬不絶罷造戰艦帝崩洪君祥白丞相完顔澤罷東征二十一年元成宗元貞元年以洪子藩為僉議令趙仁規為僉議中贊鄭可臣為僉議侍郎贊成事金忻知僉議司事金之淑判三司事安珦為密直司事李混同知三司事洪君祥為益城侯洪茶丘常怨本國君祥以為寧怨永寧公不敢負國為本國興利除害無不用力故論功褒封世子署事于都僉議司世子南向中贊西向侍郎贊成事以下東向及入朝于王士庶人擁馬上書訟寃馬不得前史臣曰世子之於君父侍膳問安之外皆非所預今忠烈除世子為都僉議使之署事忠宣以世子奏請除臣僚又受寃民訴訟父子胥失之矣卒至忠烈謀欲廢嫡忠宣脅制君父交搆相夷之禍已形於此矣監察侍史許有全被讒囚巡馬所將撻于市無敢救者指諭高宗秀乃白王曰監察為王耳目糾彈百官今以小人之讒撻子市人以上為何如主再三譬解得免二十二年王夜宴香閣見壁上明皇夜宴謂左右曰寡人雖君小國遊宴獨不及明皇自是夜以繼日奇技淫巧無所不至賜閔漬米百碩王嘗遣内僚高汝舟命漬製詩漬餽汝舟以白酒青𤓰汝舟白其清貧故有此賜世子尚晉王噶瑪拉之女布達實哩公主金元祥朴允材因王幸妓謫仙來製進太平曲得拜官皆梁川人二十三年元大德元年公主薨世子自元奔喪殺閹人陶成器等四人又治巫蠱事殺宫人無比即王之幸姬泰山郡人國人震懾史臣曰世子席元朝之寵輕視本國其奔母喪略無顔色之戚哭泣之哀遽收王之宦寺與寵姬斬之父子相猜終至竄逐為天下笑者豈非不知父在斯為子君在斯為臣之禮而然乎二十四年元遣咸寧侯王維詔王傳位於世子封王為逸壽王世子謜即位以慶尚全羅忠清地大事劇置按亷使副按亷之有使副始此王下書徵前司諫李承休時承休隱居三陟縣龍溪别業罷政房以翰林院主選法令學士崔旵等四人及承㫖金承掌銓選僉議中贊鄭可臣卒諡文靖可臣羅州人性正直端嚴諳練典故題品銓衡皆當物議一時辭命多出其手及為冢宰人想望太平至是暴卒或曰太上王之遜位也可臣製表有人言表中語有非太上王意者若詰其由撰表者豈得逭責可臣憂懼飲藥死宻直司使安戩卒戩久典銓選守正不阿時稱鐵餻元遣博勒呼來趣國王公主入朝王餞于金郊酒酣博勒呼以帝命取國王印授逸夀王逸夀王幸壽寧宫受詔詔曰聞謜莅政以來頗涉專擅處决失宜衆心疑懼蓋以年少無所經練故然耳今使卿依前統理國政且召謜入侍闕庭使之明習于事謜入元帝使丞相召問扈從安珦曰汝王何不近公主耶珦對曰閨闥之間非外臣所知丞相以奏帝曰此人可謂知大體不復問閹人黄石良夤緣用事譖左司諫秋適將囚巡馬所闕内獄押者欲由徑行適不肯曰凡有罪者皆歸有司未有枷鎖王所者吾當行官道使國人知何必效婦兒掩面委巷乎王幸夀康宫倖臣呉祁金元祥内僚石天補天卿等選中外官妓官婢巫女有姿色善歌舞者籍置宫中於管絃坊大樂才人外别作一隊衣羅綺戴馬尾笠稱為男粧教以新聲各私名妓日夜歌舞無復君臣之禮其歌曰三藏寺裏㸃燈去有社主兮執吾手倘此言兮出寺外謂上座兮是汝語又云有蛇含龍尾聞過太山岑萬人各一語斟酌在兩心二十五年上洛公金方慶卒方慶安東人新羅敬順王逺孫母有娠屢夢餐雲霞及生養於祖敏成家小有嗔恚必卧啼街衢牛馬為之避性忠直信厚嚴毅寡言器宇寛宏不拘小節多識典故能斷事檢身勤儉不遺故舊雖致仕閒居憂國如家國有大議必咨之年八十九頭髪不白氣骨異常能寒暑無疾翛然而逝時用事者惡方慶遂沮禮葬後諡忠烈竒爾濟蘇欲革本國奴婢之法王上表請止其表略曰我始祖垂訓後嗣云賤𩔖其種有别若許從良必通仕路謀亂國家由是小邦之法於其八世户籍不干賤𩔖然後乃得筮仕凡為賤𩔖父若母一賤則賤雖本主放許為良其所生子孫却還為賤又其本主絶嗣亦屬同宗所以然者不欲使從良也二十七年併省内外官其官名有同上國者悉改之又以芝黄代赭袍紅傘代黄傘除蹈舞警蹕之禮皆從元命也以命貂為忠清道按亷使先是朱悦子印逺為慶尚按亷貢二十升黄麻布又惡聞烏鵲聲令人嚇以弓矢一聞其聲即徵銀瓶民甚苦之王欲罷其職以貂代宰相曰貂曽為龍山别監侵於百姓又為安東判官坐賍流以貂代印逺猶以暴易暴王不聽印逺仍舊不罷貂出按忠清僉議中贊致仕崔守璜卒守璜性正直勤儉家貧不能衣食恬不為意初以國學學諭兼都兵馬錄事一日以公事歴詣諸相家署案有一相不冠與客坐守璜抱案而進既又退跪其相屢使之前守璜若進而不進者良久其相乃悟起入冠而出其執禮不諂如此二十八年僉議中贊薛公儉卒公儉性亷謹好禮六品官有父母喪不論知否必素服往弔蔡洪哲嘗問疾入卧内見布被莞席蕭然若僧居出而嘆曰自吾輩而望公所謂壤蟲之與黄鶴二十九年洪子藩元沖甲等與諸宰相率三軍圍王宫執呉祁送于元鄭瑎曰退一奸臣不過一武夫力耳何至用兵不聽元杖流祁及石天補于安西初祁以䜛佞得幸離間王父子陷害忠良人皆切齒言于特穆爾布哈不聽而還同行元使李學士者於都亭唱一句曰白酒紅人面囑安珦和之珦遲留李自和曰黄金黒吏心蓋諷特穆爾布哈受祁賂緩其罪也王如元至西京帝不許入朝乃還蓋欲入朝沮前王還國且請以前王公主改嫁王姪瑞興侯琠也史臣曰忠宣公主之琴瑟不調人所難言也忠烈信用憸小膚愬離間之言不念幹蠱之重既阻忠宣還國欲以佳婦嫁與同姓之親綱常天理於是大毁矣三十年僉議中贊成事伍允孚卒允孚世為太史局官精於占候又善卜筮無不驗中性切直寡言頗以國事為已憂每因災異推之於時政得失即入諫不聽涕泣固爭期於必從嘗告朔太祖真殿既奠且拜泣曰太祖太祖君之國事非矣因嗚咽不自勝其誠懇𩔖如此嘗自圖天文以獻日者傳法焉置國學贍學錢初贊成事安珦憂庠序大毁儒學日衰議兩府令六品以上各出銀一斤七品以下出布有差歸之養賢庫存本取息永為教養之資王聞之亦出内庫錢穀以助之珦又以餘貲附愽士金文鼎赴燕畫先聖及七十子之像又購祭器樂器六經諸子史以來請以李㦃李瑱為經史教授都監使於是横經受業者以數百數三十一年達嚕噶齊和琳卒和琳疾篤有為之進藥者和琳曰汝國奸臣執命父子相圖故帝遣我來監我若飲藥死其得無後言乎况死生有命良藥奚為竟不飲而卒王召僧紹瓊于宫中與瓊昌院妃受菩薩戒韓希愈崔崇諫之不聽三十二年僉議中贊韓希愈卒希愈性樸素豁達善射御有膽力從金方慶討珍島耽羅日本皆有功家無蓄積屢丐貸於人嘗從王出田每射輒中王賜馬亦不畜輒以與人其平居治弓矢繕甲胄若臨戰陣年雖老每月夜操長鎗且走且跳曰吾力尚可用也僉議中贊致仕安珦卒諡文成珦興州人莊重安詳在相府能謀善斷同列但順承惟謹不敢爭常以養育人材興復斯文為已任且有鑑識初見金怡白元恒曰後必貴又李齊賢李異少俱有名召令賦詩觀之曰齊賢必貴且壽異則不年矣後皆驗晚年常掛晦菴先生真以致景慕之意遂號晦軒其文章亦清勁可觀及葬七館十二徒皆素服祭於路慶興君洪子藩卒於元子藩僕射瓘之後性敏達魁梧俊偉材幹絶人三為首相議論持正有大臣風度至是入朝謁丞相具言王惟紹廢嫡之謀且欲奉二王東還未就而卒先喪母事父孝雖迫於官事不廢定省性又好潔每更衣必盥手日沐浴夜必具衣冠拜天諡忠正王如元欲與前王俱東還王惟紹宋邦英韓慎等讒搆兩宫謀廢嫡以瑞興侯琠尚前王公主為嗣洪子藩崔有渰等力言其非三十三年元成宗崩前王與皇姪阿裕爾巴里巴特喇太子及右丞相達爾罕等定䇿迎立懷寧王哈尚為帝奉太子㫖捕王惟紹等囚之遷王於慶夀寺初王同在前王邸王所任事者悉罷之即以從臣權漢功主選法除拜所親信者王拱手行印而國政盡歸於前王乃誅瑞興侯琠及王惟紹宋邦英韓慎宋璘宋義崔涓籍其家以韓希愈生時略無規諫竄其子儉于嘉州復吏役希愈本嘉州吏也史臣曰王惟紹等離間父子之罪固所當誅然豈無自而然耶忠宣流父王近臣殺父王嬖妾又各樹黨援自相傾軋至於逼遷父子之變於斯極矣忠宣不能改行自新移怒於父王左右而盡誅之是可忍乎哉直史館尹頎以前王命奉所撰先代實錄如元史臣曰古者列國皆有史官掌記時事未聞有出之邦域之外者何忠宣之不思也元遣王還國因署行省三十四年王薨於神孝寺遺教機務委付瀋陽王王嘗與金坵李松縉等唱和有龍樓集史臣曰忠敬之世内則權臣擅政外則强敵來侵禍變極矣一朝誅戮權臣歸附上國天子嘉之釐降公主再朝京師敷奏東方之弊召還官軍東民以安奈何驕心遽生耽于遊田廣置鷹坊使惡少李貞輩侵暴州郡溺於宴樂唱和龍樓使僧祖英等昵近左右及其晩年過聽左右之譖至欲廢適而立姪其在東宫雖曰明習典故讀書知大義果何用哉前王自元來詣殯殿入哭設奠夀寧宫受羣臣朝賀禮未畢大雷電雨雹王幸許琮家納故平陽公昡妻許氏又幸金文衍家烝淑昌院妃妃文衍妹也時獨監察糾正禹倬白衣持斧束藁上書敢諫近臣展疏不敢讀倬厲聲曰卿為近臣未能格非而逢惡至此卿知其罪耶左右震慄王有慚色然未幾封妃為淑妃禁外從兄弟通㛰高麗自國初宫闈不避五服之㛰國人效之忠宣王諱謜改璋字仲昻䝉古諱益智禮普化忠烈長子母元世祖女大長公主元年元至大二年初立𣙜鹽法王欲備國用公私各處鹽盆盡令入官估價銀一斤六十四碩銀壹兩四碩布一疋二碩令用鹽者皆赴義鹽倉和買若私置鹽盆及私相貿易者嚴行治罪又發民為鹽户民甚苦之嵗入諸道鹽價布四萬疋元太后幸五臺山王扈從時王在元上洛公金忻卒忻方慶子性豁達慈恵愛人尤恤親戚之窮者王命致仕密直副使呉良遇撰上昇王請諡表仍令自今給以見官之俸表箋製撰一切委之二年王在元凡國事傳㫖而已欲傳位世子鑑為從臣所沮乃止未幾殺世子史臣曰忠宣自入元朝信讒近佞左右前後罔非憸壬小人侍從羈緤無非兇悍健兒朝夕膚愬王與上王父子之間讒隙已成安知王與世子讒亦行必置之死地而後已耶王表請元追王祖曰忠敬考曰忠烈始改宗為王畏元威也以贊成事栁清臣為僉議政丞先是崔有渰年髙故令五月一至都堂議軍國大事清臣理細務至是遂以清臣代有渰以式目都監掌邦國重事僉議政丞判三司使三司即今户曹掌錢穀密直使宻直司宻直掌兵務陞二品與僉議府僉議府即今議政府同稱兩府又改諸司及州郡號以入元宦者李大順等十六人同日封為君安平公主嘗獻本國閹寺數人於世祖頗得親寵至有奉制來東復其家官其族於是父兄爭相宦其子弟又有强暴者小有憤怨輒自割勢故不數十年刀鋸者甚多成宗皇帝以來閹人用事至官大司徒者王在京師出入三宫與此輩親狎故並封之僉議中贊金之淑卒之淑性亷潔剛正三别抄之亂陷賊不汚及卒二女以家貧未嫁為尼三年權㫜性耿介不茍合嘗有遁世之志父韙强留之為四州禮昇孟价副使皆以亷能精明稱又為東都留守撤甲坊前此作一庫賦民綾羅貯之名甲坊以充貢獻留守私其贏餘㫜撤去之後為僉議贊成事然信浮屠斷葷肉自號夢庵居士一夕遁入禪興社剃髪其子溥馳往大哭㫜曰汝復鬚髪我耶竟不聽至是卒四年元仁宗皇慶元年齊安大君淑卒淑為人亷正諳練典故國稱為宗室之賢密直司使李思温等以王久留元實由權漢功崔誠之久掌銓選利其贈賂勸王不歸乃請徽政使失列門人名矯太后制下漢功等獄王怒白太后釋之流思温等于臨洮僉議政丞李混卒混性寛厚與鄭瑎尹珤在政房相推致一日相語以所失混謂瑎曰人謂君巧謂珤曰人謂君好自尊瑎乃謂混曰人謂君不亷然乎混久掌選性且不亷故家稍富務為疎散喜賔客好琴棋嘗泛寧海得海浮查製為舞鼓至今傳于樂府憲府囚妖僧曉可曉可嘗持宻水米屑示人以為甘露舍利皆吾身所出人莫知其詐至有飲且藏者又得一窟可容身者積薪其上而登之謂其徒曰吾欲茶毗後七日當化為法身遂爇薪煙焰四起乃自薪中入窟食柿栗至期撥灰而出憲司覺其詐按問遂服至是又以罪囚五年元欲王歸國王請帝傳位于長子江陵大君燾又以侄延安君暠為世子暠即王異母兄江陽公滋子也王愛撫如子欲仍留朝廷不聽遂與王及公主還稱上王史臣曰忠宣以侄暠為世子父子兄弟卒搆猜嫌其禍至于數世而未弭貽謀之不臧如此吐蕃之竄非不幸也朝鮮史略卷九
