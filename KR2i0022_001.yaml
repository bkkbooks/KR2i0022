body:
  text: 朝鮮史略卷一檀君東方初無君長只有九種夷有神人降于太白山在今寧邉府即妙香山檀木下國人立為君唐堯二十五年戊辰國號朝鮮在東表日出之地故曰朝鮮索隱曰以有汕水故名都平壤徙白嶽後入阿斯達山今九月山為神是為檀君名王儉古紀云禮君與堯並立至商武丁八年為神夀四千十八然權近應制詩曰傳世不知幾厯年㑹過千蓋傳世厯年非檀君夀也箕子周武王克商箕子率中國人五千入朝鮮武王因封之都平壤是為後朝鮮教民禮義田蠶織作設八條之教相殺以當時償殺相傷以榖償相盜者男沒入為其家奴女為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所售其民終不相盜無門戶之閉婦人貞信不淫辟飲食以籩豆有仁賢之化其後子孫稍驕虐燕乃攻其西滿潘汗為界朝鮮遂弱至四十代孫否屬於秦子準立為衛滿誘逼浮海南奔衛滿燕人衛滿因盧綰亂漢高祖時燕王綰亂亡命來渡浿水即今大同江誘逐箕準據王儉城即今平壤仍號朝鮮至孫右渠不奉漢詔武帝遣公孫遂滅之四郡漢武帝討右渠分其地為樂浪平壤臨屯東縣今江陵𤣥菟東沃沮城今咸鏡地真蕃雷縣二府漢昭帝以平那𤣥菟郡為平州都督府臨屯樂浪郡為東府都督府三韓馬韓今全羅地箕準避衛滿浮海居韓地金馬郡今益山郡號韓王其民土著知蠶桑作綿布性勇悍居處作土屋其戶向上統國五十四後百濟王溫祚并之自箕子至亡一千餘年辰韓今慶州秦亡人避入韓韓割東界以與之常用馬韓人作主地宜五榖俗饒蠶桑善作縑布乘駕牛馬男女有别行者讓路統國十二辨韓辨一作卞今平壤立國於韓地不知其始祖年代屬於辰韓亦統十二國權近曰後漢書以為卞韓在南辰韓在東馬韓在西其謂卞韓在南者蓋自漢界遼東之地而云耳非謂卞韓在辰馬二韓之南也崔致逺因謂馬韓麗也卞韓百濟也誤矣三國新羅始祖赫居世立漢宣帝五鳯元年初高墟村長蘇伐公得大卵於蘿井林間剖有嬰兒養之岐嶷夙成六部異之朝鮮遺民居東海濱分為六村或曰六部共立為君號居西干方言王也都辰韓地國號徐羅伐以朴為姓俗以瓠為朴所剖卵似瓠故姓之立閼英為妃初龍見於閼英井右脅生女老嫗養之以井名之妃能內輔人謂之二聖王巡撫六部勸督農桑不伐馬韓之喪使民敬讓樂浪來侵見夜戶不扃服其有道引兵退東沃沮稱為聖人沃沮在麗之東北連挹婁南接濊貊人性强勇今咸鏡地遣使獻馬卞韓以國來降權近曰羅祖閼英之生皆怪而不常豈非海隅之地有生之衆淳朴無知間有一為詭說者舉皆信而神之以傳後世也高句麗始祖朱䝉立漢元帝建昭二年新羅始祖二十一年先是東扶餘王金蛙扶餘王解夫婁老無子求嗣祭山川所御馬至鯤淵見大石相對而淚轉石有小兒金色蛙形喜而養之名曰金蛙及長立為太子得河伯女栁花于太白山南優渤水在今寧邉府幽于室中為日影所照而娠生一卵蛙欲剖之不能母裹置暖處有男子破殼而出骨表英偉七歲自作弓矢發無不中名為朱䝉扶餘俗謂善射者為朱䝉蛙七子忌欲殺之朱䝉乃與烏夷陜父摩離等行至掩㴲水無梁祝曰我天帝子河伯外甥今日逃亂追者將及奈何於是魚鱉成橋得渡橋解追兵不及至毛屯谷遇三賢麻衣衲衣水藻衣俱至卒本扶餘今成川府其王無子妻以女生沸流及溫祚王薨朱䝉嗣自稱高辛之後國號高句麗因姓高時沸流水上松壤國王以國來降封為多勿侯麗語復舊王為多勿又滅荇人國在太白山東南即今三陟府及北沃沮一名置溝婁北接挹婁挹婁在不咸山北東濱大海多山險人多勇力土氣寒常居穴弓長四尺矢用楛青石為鏃古之肅慎氏國也高句麗王母栁花卒於東扶餘其王金蛙以太后禮葬之立神廟高句麗王朱䝉薨號東明王太子類利立移都國內即今義州又築尉那巖城朱䝉在扶餘娶禮氏有娠朱䝉去後乃生有竒節善彈丸誤中汲婦盆以無父被罵問于母知父所在搜柱下得父所遺劍持往卒得見王王以所藏斷劍合之果驗乃立為太子新羅遣瓠公聘于馬韓韓王讓之瓠公對曰我國自二聖肇興人事修天時和倉庾充實人民敬讓辰韓卞韓樂浪倭人無不畏懷而猶謙虛遣下臣修聘反怒劫之何耶韓王欲殺之左右諫乃聽還瓠公本倭人初以瓠渡海來故號焉百濟始祖溫祚立漢鴻嘉三年羅始祖四十年父高句麗王朱䝉以在東扶餘時所娶禮氏女子類利為太子溫祚與兄沸流恐不相容南行沸流居彌鄒忽今仁州府溫祚都河南慰禮城今稷山縣國號百濟初以鳥干等十人從行故號十濟後以百姓樂從改百濟後徙南漢山城今廣州又徙南平壤城今漢京以扶餘為氏系出扶餘故云沸流以其都水土鹹濕不能居到慰禮見宫室之盛慚憤死百濟患靺鞨來侵靺鞨在不咸山北與北沃沮相接古肅慎氏國即今野人善冦鈔三國並被其侵以族父乙音有智識為右輔委兵事及卒以解婁代之神識淵奧年過七十膂力不愆百濟王都有老嫗化為男百濟遣使馬韓告遷都漢山仍定疆域北至浿河南限熊川西窮大海東極走壤百濟王立東明王廟及國母廟史臣曰百濟與高句麗自别為宗立東明之廟則不當配以他國之母而别祀其母也百濟漢城人家馬生牛一首二身日者曰牛一首二身者大王并鄰國之應也王喜遂有并吞辰馬之志新羅王赫居世薨在位六十一年太子南解立漢元始四年號次次雄或云慈充方言巫蓋神而敬畏之稱新羅有昔脫解者身長九尺風神秀朗智識過人精專學問兼通地理王妻以女以為大輔委以軍國政事多婆那國王娶女國女生大卵置櫝中浮海至阿珍浦老嫗開櫝有兒養之以櫝來時有鵲隨鳴省鵲以昔為姓以解櫝而出名脫解倭侵新羅邉郡自此屢犯邉郡高句麗王遷都尉那巖城太子解明不隨恃强力結怨鄰國解明留都黃龍國王贈强弓解明對其使彎折之王賜死太子曰父命不可逃乃往礪津原以槍插地走馬觸槍死年二十一王莽發高句麗兵伐胡王不欲從莽遣嚴尤擊之降封王為下句麗侯高句麗王類利薨天鳯五年號琉璃明王太子無恤立以乙豆智為左輔高句麗王北伐扶餘北溟人怪由道請從征拔劍大號直進斬扶餘王帶素其季弟皆金蛙之子自立為王移都曷思水濱從弟率國人來降賜姓絡氏皆有絡文故也新羅王南解薨遺命朴昔以年長相襲太子儒理立漢更始二年號尼師今儒理讓于昔脫解曰智人多齒以儒理多齒立之尼師今方言齒理也百濟始祖溫祚薨太子多婁王立漢建武四年新羅分六部為二仍賜姓李崔孫鄭裴薛二部有會蘇曲王女每年自七月既望率部內女子會六部庭績麻夜分罷至八月十五日校功負者置酒謂之嘉俳作會蘇曲歌之新羅改官制置十七品曰伊伐餐曰伊尺餐曰迎餐曰波珍餐曰大阿餐皆授直骨王族曰阿餐曰一吉餐曰沙餐曰級伐餐曰大奈麻曰奈麻曰大舍曰舍知曰吉士曰大烏曰小烏曰造位高句麗王以貪暴廢沸流部長仇都逸茍焚永為庶人舉鄒勃素代之三人詣堂下謝罪勃素曰人孰無過過而能改則善莫大焉仇都等感愧不復為惡高句麗王元妃恐王子好童以愛奪嫡譖無禮王疑之或勸自釋曰我若釋之是顯母之惡貽父之憂遂伏劍死百濟始種稻駕洛國即今金海府始祖金首露立漢建武十九年初九千酋長駕洛無君臣位號有九千各總衆為酋長得金合于龜峯開視之有六金卵皆化為男竒偉長大衆推始生者為主姓金氏因金卵為姓以始見名首露國號大駕洛又稱伽倻餘五人各為五伽倻主曰阿羅伽倻曰古寧伽倻曰大伽倻曰星山伽倻曰小伽倻駕洛後改金官漢遣兵伐樂浪以其地為郡縣薩水以北屬漢高句麗王無恤薨號大武神王王拔怪由舉豆智以貪鄙斥仇都以知能褒勃素征蓋馬滅樂浪扶餘奔竄而自避勾茶畏威而來降然信內讒殺賢子好童惜也太子解憂幼王弟解邑朱立建武二十年高句麗王解邑朱薨號閔中王前王太子解憂立建武二十四年暴戾不仁不恤國事坐必藉人卧則枕之人或動搖輒殺之有諫者射之百姓多怨杜魯弒之號慕本王在位六年國人迎琉璃王子再思之子宫立之建武二十九年是為太祖王新羅王儒理薨王存問鰥寡孤獨賑老病鄰國人聞而歸之者衆然從父亂命卒傳之昔氏非貽謀燕翼之道也在位三十四年昔脫解立漢中元二年南解王壻也史臣曰新羅朴氏為王者十昔氏為王者八金氏為王者二十八是新羅者金氏之新羅非朴昔之新羅豈不由於南解之亂命儒理之處不得宜乎以瓠公為太輔遣宗戚朴闕分理州郡號州主郡主新羅王得閼智小兒之稱養為子姓金氏初王夜聞金城西始林間有雞聲遣瓠公視之有小金櫝掛樹梢白雞鳴于下開櫝視之有小兒王喜養為子名閼智姓金氏改始林為雞林因以為國號權近曰姦人見王以神異得國故亦神異其子行詐而盜國如黃歇吕不韋之尤者也百濟王多婁薨在位四十年太子已婁立新羅脫解王薨王以南解之壻不當立而立又惑金櫝之說使重器卒歸之金氏然傳於儒理之子則善矣在位二十四年婆娑王立儒理王子漢章帝建初五年王節儉愛民勸農桑練兵甲問高年賜榖分遣十人亷察州郡有不勤職事者黜之築月城移都之在位三十三年薨太子祇摩立漢安帝永初六年高句麗王與濊貊襲漢𤣥菟濊貊本朝鮮之地南與辰韓北與高句麗沃沮接東窮大海西至樂浪漢武帝元朔五年濊君南閭叛降于漢以其地為滄海郡濊即今江陵府貊即今春川府高句麗王以其弟遂成統軍國事丸都地震王夢一豹齧虎尾占者曰虎者百獸之長豹者同類而小者也意者王之族類殆有謀絶大王之後者乎王不悅問高福章福章對以作善則災反為福高句麗以穆度婁為左輔高福章為右輔與參遂成政度婁知遂成有異心稱疾不仕百濟王已婁薨在位五十一年太子蓋婁立新羅祇摩王薨在位二十三年儒理王子逸聖王立漢陽嘉三年高句麗王傳位于弟遂成高福章諌曰遂成忍而不仁今日受禪明日害大王之子孫王不聽史臣曰當丸都地震之日或者占夢之時福章泛言福善禍淫之說而一失其機後雖請誅吁亦晚矣遂成立年七十六漢質帝本初元年高句麗王遂成殺右輔高福章臨刑嘆曰今君以不義殺一忠臣吾與其生於無道之時不如死之速也乃即刑高句麗王遂成殺大祖王元子莫根其弟莫德恐禍及自縊死新羅王逸聖薨王置政事堂修堤防闢田野又禁民用金銀珠在位二十二年子阿達羅王立漢永興二年新羅置迎日縣東海濱有二人夫曰迎烏妻曰細烏迎烏漂至日本國小島為主其妻細烏尋其夫漂至其國立為妃人以迎烏細烏為日月之精至是置迎日縣開竹嶺路在豐基縣高句麗前王宫薨壽百十九嵗臨明答夫弒其君遂成號次大王立其弟伯固伯固乃以臨明答夫為國相以前王太子鄒安為讓國君初答夫之難鄒安逃竄至是詣闕謝罪王賜狗山賴婁頭谷二所封為君百濟節婦都彌妻與其夫同奔高句麗蓋婁王聞都彌妻艷留都彌使近臣詐為王欲私之妻請更衣詐飾一婢薦之王知見欺誣都彌以罪矐兩目置小船泛之河更欲亂其妻妻託月事不從逃至泉城島遇其夫遂同奔高句麗百濟蓋婁王薨子肖古王立漢延熹九年漢𤣥菟郡太守耿臨以大兵攻高句麗答夫因其士卒饑窘引還追戰於坐原大敗之高句麗王伯固薨在位十五年號新大王太子男武立漢光和二年姿表雄偉涖事聽斷寬猛得中立于氏為后新羅阿達羅王薨在位三十一年無嗣伐休王立脫解王孫漢中平元年占風雲預知水旱豐儉又能知人邪正人謂之聖高句麗左可慮等叛伏誅初中畏大夫沛者於畀留評者左可慮皆以外戚執國柄多行不義國人怨憤王怒欲誅之左可慮等叛聚衆羣攻王都王徴兵討平高句麗聘處士乙巴素為國相巴素隱鴨緑谷性質剛毅智慮淵深東都晏留薦之除國相明政教信賞罰人民乂安內外無事立賑貸法每歲自三月至七月出官榖以賑貸至冬月還輸以為定式新羅伐休王薨在位十五年奈解王立漢建安元年伐休王次子伊買之子高句麗故國川王男武薨在位十九年于后矯遺命立王弟延優王薨后祕不發喪夜往王弟發岐第曰王無後子宜嗣之發岐不從責曰婦人夜行禮乎后慚又往延優第延優迎入飲之遂執延優手入宫翌日矯命立之男武弟發岐請師於遼東太守公孫康討延優其弟罽須以王命率兵禦之發岐不克自殺高句麗王延優立前王妃于氏為后駕洛國王首露卒壽百五十八嵗新羅人勿稽子入𨼆于師彘山勿稽子嘗從太子于老救伽羅國有功不見録及竭火之戰斬獲甚衆又不見録遂被髮攜琴入師彘山而不返高句麗王立子郊彘為太子初郊豕逸至酒桶村有一女執之王聞而異之微行幸其女生子因以郊豕而得名曰郊彘後改名優位居百濟肖古王薨在位四十九年子仇首王立建安十九年高句麗王延優薨是為山上王在位三十一年太子優位居立魏明帝太和元年新羅奈解王薨在位三十五年壻助賁王立太和四年助賁伐休王太子骨正子百濟仇首王薨在位二十一年肖古王弟古爾王立魏青龍二年新羅助賁王薨在位十八年弟沾解王立魏正始八年封父骨正為立神葛文王新羅追封王皆曰葛文王魏遣幽州刺史毌丘儉屠高句麗丸都城王奔南沃沮魏兵退王還國移都平壤初王至竹嶺軍士盡散東部人密友者募死士與赴敵力戰王間行得脫魏軍追不止東部人紐由詐降入魏軍藏刀食器刺殺魏將與之俱死魏軍退王還國論二人功為第一高句麗東川王優位居薨在位二十二年太子然弗立魏正始九年東川之薨國人懷德莫不哀傷近臣至欲自殺以殉及葬至墓自死者甚多倭使葛耶右聘新羅王使昔于老儐之于老戲言早晚以汝王為鹽奴王妃為爨婢倭主聞之遣將伐新羅于老以由已致冦單騎赴倭軍謝倭人執而燒殺之後倭使來于老妻請王私饗之及其醉使人執而焚之于老奈解王子訖解王之父嘗伐甘文沙伐爾國有功高句麗王殺其夫人貫那王后椽氏恐貫那専寵譛於王貫那懼反讒后於王王怒以革囊盛之投西海百濟改官制置內臣佐平掌宣納事內頭佐平掌庫藏事內法佐平掌禮儀事衛士佐平掌宿衛事朝廷佐平掌刑獄事兵官佐平掌外兵馬事六佐平並一品又置達率二品恩率三品德率四品扜率五品奈率六品將德七品施德八品固德九品季德十品對德十一品文督十二品武督十三品佐軍十四品振武十五品新羅沾解王薨在位十五年味鄒王立魏景元二年王姓金閼智七世孫助賁王以女妻之王薨無嗣國人立之百濟立犯贓之禁凡官人受財及盜者三倍徴贓禁錮終身新羅以伊餐良夫為舒弗邯兼知內外兵馬事高句麗中川王然弗薨在位二十三年子藥盧立晉泰始六年殺其弟逸友勃素初二人詐稱病往溫陽戲樂無節出言悖逆王令力士執而殺之肅慎侵高句麗屠邉岷王遣弟達賈伐之拔檀盧城殺其長封達賈為安國君新羅味鄒王薨在位二十三年儒禮王立晉太康五年味鄒問高年親政刑訪民疾苦不營宫室有人君之德百濟古爾王薨在位五十五年子責稽王立太康七年高句麗西川王藥盧薨在位二十三年太子相夫立晉元康二年以其叔父安國君達賈有大功國人所倚望又謂其弟咄固蓄異心皆殺之國人知其無罪惜之燕慕容瘣屢侵高句麗國相倉助利乃薦北部大兄高奴子為新城太守善政有威聲瘣不復來侵伊西故國今清道郡攻新國金城新羅禦之不能克忽有異兵皆珥竹葉助羅軍擊賊破之竟不知所歸人或見竹葉數萬積於味鄒王陵前因號竹長陵史臣曰伊西國已於漢建武十八年為新羅所滅而復於晉元康七年攻新羅金城豈滅而復起耶新羅王賜印觀署調二人爵初印觀賣綿於市署調以榖買之而還忽有鳶攬綿墮於印觀家印觀取還于署調署調以天與却不受印觀乃還其本榖署調以賣已久矣拒之并棄於市市官聞于上有是官百濟王責稽為貊兵所害在位十三年子汾西王立元康八年新羅儒禮王薨在位十五年助賁王孫基臨王立元康八年高句麗國相倉助利廢其王相夫立乙弗為王晉永康元年乙弗相夫弟咄固之子出遁水室村人隂牟家傭作漢樂浪太守遣刺客刺殺百濟王汾西在位七年比流王立晉永興元年汾西諸子皆幼國人立仇首王子比流久在民間寬慈愛人新羅王基臨薨在位十三年訖解王立晉永嘉四年角干于老子狀貌俊異心膽明敏忘父之讐聽昏島夷終受侵辱昔氏之祀於是絶矣高句麗美川王乙弗薨在位三十三年太子斯由立改名釗晉咸和六年燕王慕容皓攻陷丸都城發美川王墓載其尸虜王母王妃以歸後王稱臣輸貢還母及父尸百濟比流王薨在位四十一年契王立汾西王子晉建元二年百濟契王薨在位三年近肖古王立比流王子晉永和二年新羅訖解王薨在位四十七年奈勿王立奈勿姓金氏味鄒弟末仇子永和十二年立金氏為妃味鄒女百濟王大舉侵高句麗王拒戰中流矢薨在位四十一年是為故國原王太子丘夫立晉文帝咸安元年移都漢山秦王苻堅遣使送浮屠順道及佛像佛經于高句麗高句麗佛法始此百濟近肖古王薨在位三十年太子近仇首立晉寧康三年百濟自開國以來未有文字近肖古以高興為博士始有書記百濟近仇首王薨在位十年子枕流王立晉太元九年胡僧摩羅難陀自晉至王迎置宫內禮敬焉始立大學頒律令高句麗小獸林王薨弟伊連立太元九年百濟枕流王薨在位三年弟辰斯立太元十一年設關防自青木嶺北距八坤城西至于海高句麗故國壤王伊連薨在位九年太子談德立太元十七年是為廣開土王百濟王畋于狗原薨于行宫在位八年阿莘王立太元十八年以其舅真武為左將委以兵事武沈毅有大略新羅奈勿王薨在位四十七年嗣子幼國人立實聖晉元興元年實聖金閼智裔孫王以未斯品為舒弗委以軍國事百濟王阿莘薨在位十四年太子腆支立晉義熙元年腆支質倭國仲弟訓解攝政以待太子還季弟碟禮殺訓解自立腆支聞王訃請倭主歸國倭主遣還以兵衛送至國界聞變依海島國人殺碟禮迎立為王新羅王聞倭人置營於對馬島謀將襲之未斯品諫而止高句麗王談德薨王嘗下令崇佛求福立國社修宗廟在位二十二年子巨璉立是為長壽王義熙九年新羅訥祇王奈勿王子弒實聖王自立號麻立干取表位之稱初奈勿王以實聖質於高句麗實聖怨之及為王欲害其子訥祇以報之訥祇怨王弒之新羅㰱良州于朴堤上不屈倭死之初訥祇王弟卜好質高句麗未斯欣質倭及王立思見二弟聞㰱良州于朴堤上勇而有謀召問之堤上請行遊往說高句麗王與卜好同還又請囚家屬詐為叛者入倭國倭人不疑使與未斯欣同處一日堤上使未斯欣潛還倭主怒縳堤上諭以禍福堤上言益抗倭主愈怒剝足皮刈蕪葭使趨其上更問之答如故乃燒殺之王聞之哀痛贈大阿餐使未斯欣娶其第二女王得見二弟置酒極歡作憂息曲堤上妻上鵄述嶺望倭國慟哭而死仍為鵄述神百濟腆支王薨在位十六年子久爾辛立宋高祖永初元年八年薨子毗有立宋元嘉四年二十九年薨子餘慶立是為蓋鹵王新羅教民牛車之法王親養老于南堂賜榖帛有差新羅訥祇王薨在位四十二年子慈悲王立宋大明二年納未斯欣女為妃高句麗王巨璉自將攻百濟殺其王餘慶初浮屠道琳應募僞得罪亡入百濟王好碁琳曰臣碁頗入妙王召與碁果國手遂信昵之琳乃說王葺城郭修宫室蒸土築城作石槨葬父骨倉廩虛竭人民窮困琳逃還告之麗王伐百濟圍王都王死於兵子文周立宋元徽三年移都熊津即今公州耽羅國即今濟州來獻方物于百濟耽羅在南海中初無人物有三那人從地湧出長曰良乙那次曰高乙那三曰夫乙那一日三人獵海濱得石函開之有三女及諸駒犢五榖種遂分娶三女始播五穀養駒犢日就富庶或稱耽牟羅百濟兵官佐平解仇弒其君文周立太子三斤年十三二年王命真老討殺解仇三年王薨東城王牟大立宋升明三年牟大文周王弟昆支子膽力過人善射起臨流閣於宫東高五丈又穿池置囿以養竒禽諫臣抗疏不報恐有復諫者閉宫門新羅有百結先生者家極貧衣百結時人因號之慕榮啓期之為人常以琴自隨凡喜怒悲歡不平之事必於琴宣之歲將暮鄰里舂粟其妻聞杵聲曰人皆有粟可舂我獨無何以卒歲先生仰天歎曰死生有命富貴在天其來也不可拒其往也不可追汝何傷乎乃鼓琴作杵聲以慰之世傳為碓樂新羅慈悲王薨在位二十三年子照智王立九年始置郵驛市肆十年幸天泉亭得烏銜書射琴匣王妃及內殿焚修僧伏誅王幸天泉有烏銜書來鳴得其書外面云開見二人死不開一人死日官奏云一人者君也王開視之書曰射琴匣王入宫射之果有人乃內殿焚修僧王妃引與潛通者也皆伏誅自是國俗每歲是日以糯飯祭烏又以龍馬猪鼠之異每於歲首辰午亥子日設祭禁百事謂之怛忉高句麗長壽王薨在位七十九年太孫羅雲立是為文咨王齊永明九年新羅王納捺已郡即今榮州女初王幸郡郡人波路獻其女碧花王不納後追念屢至其第幸之路見老嫗問曰國人以王為何如主嫗曰衆以為聖妾獨疑之王幸波路女屢微服而行夫龍為魚服漁者所制今王不自慎重此而為聖孰非聖乎王大慚潛匿其女納宫中是年冬王薨在位十二年無嗣再從弟智大路立齊永元二年四年始定國號新羅稱王前此或稱新羅或稱斯盧言新者德業日新羅者網羅四方之意禁殉葬前此王薨殉以男女各五人至是禁焉親定州郡縣以金異夫為阿琴羅州軍主伐于山國在溟州正東海島名鬱陵降之在位十五年薨諡智證新羅諡法始此朝鮮史略卷一
