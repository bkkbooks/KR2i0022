body:
  text: 朝鮮史畧卷四新羅紀憲康王諱晸唐僖宗乾符三年王出遊鶴城即今符山郡還至海浦忽雲霧晦㝠迷失道路禱于海神開霧因名開雲浦有異人處容者竒形詭服詣王前歌舞從王入京又有四人詣駕前歌舞其歌有智理多都都破等語謂以智理國者多逃而都邑将破故歌以警之時人不知反以為瑞王燕羣臣於臨海殿酒酣鼓琴左右各進歌詞崔致逺奉帝詔還自唐致逺沙梁部人年十二隨海舶入唐尋師力學至十八登第調溧水縣尉遷侍御史内供奉髙駢討黄巢辟為従事其表状書啓多出其手黄巢見檄書不覺下牀由是名振及東還王留為侍讀致逺欲展所藴而被疑忌不能容出為太山富城等郡太守真聖女主時疏陳時務主嘉納之以為阿餐致逺東還值世亂無復仕進意自放山水間慶州南山剛州氷山陜州清源寺智異山雙溪寺合浦縣月影臺皆其逰玩之所挈家隱伽倻山與母兄浮圖賢俊及定𤣥師結為道友以終老十二年王薨王性聦敏看書一覽輙誦弟晃立定康王諱晃唐僖宗光啓元年四年王薨無嗣女弟曼立真聖女主諱曼定康王之女弟唐僖宗文徳元年主素與魏𢎞通𢎞死潛引年少美丈夫私之授以要職由是佞倖肆志紀綱壊弛時有人譏謗時政榜於路主疑隱者王巨仁所為命下獄将誅之巨仁憤怨作詩書獄壁詩曰于公慟哭三年旱鄒衍含愁五月霜今我幽愁還似古皇天無語但蒼蒼是夕忽震雷雨雹主懼釋之弓裔叛于北原即今原州弓裔憲安王之庶子也以重午日生於外家生而有齒且其生日光燄異常日官勸王殺之使者取於襁褓中投樓下乳母竊捧之誤以手觸之眇一目抱而逃及長祝髪為僧號善宗不拘檢僧律軒輊有膽氣徃見北原賊梁吉吉分兵使東略地累戰輙勝聚衆漸多都松岳郡復移鐵圓國號泰封弓裔自號彌勒佛常怨宗國見前王畫像抜劍撃之又妻康氏嘗力諫其非裔怒以烈火燒鐵杵撞其隂殺之甄萱叛據完山州即今全州自稱後百濟萱尚州加恩縣人本姓李父阿慈介以農自活萱生父耕野母餉之置於林下虎來乳之及壮自稱甄萱萱體貎雄竒志氣倜儻多智畧入王京為裨将時女主淫昏紀綱紊弛萱嘯聚亡命所至響應遂襲武珍州即今光州自為王弓裔以王建為鐵圓郡太守建松嶽郡人父隆築室嶽南僧道詵來相之曰此地當出聖人仍授一封書曰明年公必得貴子既長與之書秘世莫知也及期果生建神光紫氣繞室充庭及年十七詵復來見建告以出師置陣地利天時之法望秩山川感通保祐之理建龍顔日角方頥廣顙器度雄深寛厚有濟世之量至是投弓裔建父隆亦以松嶽郡時隆為郡沙餐歸裔十一年主薨太子嶢立孝恭王諱嶢憲康王庶子真聖封為太子唐昭宗光化元年弓裔遣其将王建伐廣州忠州唐城即今南陽府青州槐壤即今槐山郡皆降之又敗甄萱於錦城即今羅州建自以功髙且見弓裔驕虐雖居髙位時為侍中常不樂復求閫外出鎮錦城一日裔召建曰卿聚衆謀反何耶建曰烏有是哉裔曰我能觀心掌奉崔凝佯墜筆下庭㣲語建不服則危建乃悟曰臣實謀反裔笑曰卿可謂直也以金銀粧鞍賜之建位冠百僚然非素志且畏䜛不樂居位毎出入公門平章國計惟抑情謹慎務得人心王嬖賤妾不恤政事大臣殷影諫不従影執其妾殺之十六年王薨無嗣國人立朴景暉神徳王諱景暉姓朴氏阿逹羅王逺孫後梁太祖乾化三年六年王薨太子昇英立景明王諱昇英後梁末帝貞明三年甄萱二十七年弓裔十八年髙麗太祖元年泰封諸將立王建為王國號髙麗初建有異夢夢登海中九層金塔又得張昌瑾鏡文之符市有異人賣古鏡唐商客張昌瑾買之有文畧曰三水中四維下上帝降子於辰馬先操雞後摶鴨已年中二龍見一則藏身青木中一則見形黑金東文人宋含𢎞等解之曰三水中四維下上帝降子於辰馬者辰韓馬韓也已年中二龍見一則藏身青木中一則見形黑金東青木松也謂松嶽郡人以龍為名者之子孫可為君王也黑金鐵也指鐵圓謂今王初盛於此殆終滅於此乎先操雞後摶鴨者王侍中得國後先得雞林後收鴨緑之意也弓裔令物色求異人東州勃颯寺有鎮星塑像如其狀人心響附将軍洪儒斐𤣥慶申崇謙卜智謙等夜詣建第宻謀推戴建堅拒夫人栁氏提甲以被之諸将扶擁而出遂即位於布政殿建元天授弓裔聞變驚駭遁于巖谷為斧壤即今平康縣民所害隱士朴儒見髙麗王儒仕弓裔見政亂隱於山谷髙麗王創法王王輪等十寺于都内又設八關㑹毎嵗仲冬於闕庭置輪燈一座列香燈四旁又結兩綵棚呈百戲歌舞于前皆新羅故事八關之戒曰不殺生曰不偷盗曰不淫佚曰不妄語曰不飲酒曰不坐髙大牀曰不著奢華曰不自樂觀聴關者閉也謂禁閉八罪不犯也髙麗王移都松嶽改鐵圓為東州即今鐵原府八年王薨弟魏膺立髙麗王始定官制景哀王諱魏膺後唐同光二年甄萱三十四年髙麗太祖八年甄萱襲髙鬱府今蔚山郡猝入王都時王出逰鮑石亭忽聞兵至倉卒不知所為與夫人走匿城南離宫侍從僚宫人伶官皆被陷没萱索王弑之强辱王妃乃立王族弟金傅為王麗王親率精騎五千邀擊萱於公山桐藪敗績大将申崇謙金樂皆死于兵後萱因吳越王貽書請和髙麗王為書報之髙麗王殺蘇判宗偘及将軍狄鈇二人俱以姦佞得幸弓裔譖害良善麗王即位首誅之敬順王諱傅姓金氏文聖王之裔後唐天成二年甄萱三十七年髙麗太祖十一年甄萱圍古昌郡麗王従庾黔弼計進軍於瓶山在郡北十里與萱戰萱敗走獲侍郎金渥以古城主全宣平為大匡權幸本姓金賜姓權張吉為大相陞郡為安東府王遣太守謙用于髙麗請相見麗王徃㑹于國都肅隊而行秋毫不犯都人相慶曰昔甄氏之來也如逢豺虎今王公之來也如見父母髙麗西京民家雌雞化為雄又大風屋瓦皆飛麗王曰昔有邪臣潛蓄異謀其家雌雞化為雄不悛其惡卒致誅滅吴王劉濞之時大風毁門抜木濞不知戒亦以覆亡且祥瑞志云行役不平貢賦煩重下民怨上有此之應今四方勞役不息供費既多貢賦未省竊恐縁此以致天譴尚慮羣臣不行公道使民怨咨或懐非分之心致變至此宜各悛心毋及於禍髙麗崔凝卒諡熈愷凝黄州土山人仕弓裔入髙麗官至内奉卿通五經善屬文兼識治體然恒齋素不食肉又製進其主𤼵願疏麗王嘗謂凝曰昔新羅造九層塔遂成一統今欲於開京造七層塔西京造九層塔冀借𤣥功合三韓為一家卿為我作發願疏凝製進甄萱子神劍與國相能奐謀幽其父於金山佛宇殺其弟金剛自立萱第四子金剛身長多智萱愛之欲傳位其兄神劍良劍龍劍等憂憫二兄出鎮外神劍獨在内作亂移萱於金山佛宇令壮士守之萱飲醉守卒與季男能乂等奔髙麗麗王待以厚禮號為尚父王與羣臣謀降髙麗王子曰國之存亡必有天命當與忠臣義士收合民心以死自守豈宜以一千年社稷輕與人乎王不聴使金封休齎書請降于髙麗王子哭泣以辭徑入皆骨山即金剛山在襄陽倚巖為屋麻衣草食終其身麗王受王降書遣使徃報王率百僚發王都香車寶馬連亘三十餘里入開京麗王館于栁花宫妻以長女樂浪公主行庭見之禮封為樂浪王國除為慶州麗王納𫝊伯父億亷女生子郁是為顯宗之考安宗新羅亡朴氏十王昔氏八王金氏三十七王合五十五王共九百九十二年歴年圗曰始祖之生異於常人是盡天命匪人為也當此時蕞爾三韓各保一隅徒事干戈互相侵伐無君臣名位之分始祖年方幼冲為國人推戴其寛厚足以有容其雄偉足以濟民建邦設都築城郭營宫室勸督農桑不伐鄰喪使民敬讓至於夜户不扃倭人感徳而不犯卞韓舉國而來降樂浪服其有道沃沮稱為聖人享國六十年之間家給人足民不見兵以基一千年之業其殆天授乎南解遺命朴昔二姓以年長而立新羅氏三姓相𫝊實兆於此儒理從父亂命卒傳之昔氏非貽謀燕翼之道也脱解以南解之壻不當立而立又惑雞林金櫃之説養閼智為子使新羅重器卒歸之金氏惜也然其終也不傳於子而傳於儒理之子視後世貪天之位欲傳己子而推刃同氣者何其賢也婆娑節儉愛民勸農桑問髙年亷察州郡屏黜尸素謹天災恤民隱年榖屢豐可謂守成之良主也秖摩逸聖守而不失阿逹羅粗保厥位及薨無子國人又立昔氏之後伐休能占天時又知人邪正柰解睦鄰恤民助賁臨事明斷沾觧不能强國怯於海寇使大臣見殺辱國甚矣味鄒金閼智之裔繼朴昔之後得有大寶新羅易姓今已三矣其授受雖未盡得宜然王能留意政刑訪民疾苦務農桑省經費有人君之徳金氏之興其肇於此乎儒禮基臨皆昔氏之後儒禮之委任重臣基臨之威信鄰敵猶足可稱訖解忘父之讐聴婚島夷終受侵辱昔氏之祀於是絶矣柰勿亦金氏也能以武畧自守實聖嘗質髙句麗挾憾於前王欲殺其子而後快於心其及也宜矣訥祇篡立新羅氏三姓相讓之風至是掃地慈悲救患禦冦炤智謙恭自守然而晩年魚服得免豫且之禍幸矣智證鋭意圖理定國號王洗累朝因循之陋頒喪制禁殉葬有足多者法興始崇佛教信之既篤奉之愈謹倡為裔戎之邪説聾瞽斯民為新羅基禍之主又不知春秋大一統之義偕行年號越禮犯分甚矣直興佞佛尤甚創興輪皇龍二寺鑄成丈六金身朘民膏血且屈千乘之尊為桑門之行方袍圓頂以終其身遂使佛刹半於閭閻齊民盡為緇褐流禍無窮真智享年不永真平享國雖長而繼嗣不定卒以神器付之女兒之手善徳真徳皆以隂居尊牝雞司晨邦家杌􅑾天厭穢徳太宗挺生以不世出之資奮大有為之志倚任良佐言聴計従至誠事大衣冠文物並從唐制崇奨節義激勵将士仗天朝之威雪百濟世讐雄視髙句麗如囊中之物将取而有之享年不永功業不究惜哉文武以英明之資承先人之烈請唐兵滅髙麗始一三韓克成前志何功烈之盛也何乃納髙麗叛衆據百濟故地得罪於唐㡬不自保乎神文孝昭聖徳僅能守成孝成惑佛滋甚景徳納忠諫定州號優於孝成惠恭荒于聲色身且不保宣徳躬行不道元聖與聞其故昭聖短祚哀荘昏弱憲徳簒弑禍亂相仍興徳不惑左道遇災知懼猶可稱者僖康得不以正竟為金明所害蓋自神文以降朴散淳離亂賊接踵其禍蔓延至是極矣神武能知討賊復讐之義義旗一揮而元惡授首撥亂反正人心痛快羅之國勢㡬㣲而復振文聖憲安景文憲康之時中外寧謐民物阜成盛極而衰理固然也定康昏闇復以大器付之女弟其家法所由來逺矣真聖淫恣浮於唐曌斵喪邦基新羅氏之亡於兹决矣自是羣盗蝟起弓裔叛北原甄萱據完山生民塗炭疆宇日蹙孝恭昏弱特寄生之君耳神徳景明景哀又以朴氏之逺裔當叔季之衰僅能相繼國事已非謂之何哉况當景哀之時甄賊跋扈侵逼郊畿猶且荒淫逰佚晏然自肆鮑石之樂方酣而萱兵奄至君臣被戮宫闈見辱言之可為於邑敬順亦以金氏之後為萱所立天命已去人心已離以區區一州之地生聚圖存固亦難矣然不能効死一朝甘為降虜宗社丘虗嗚呼惜哉朝鮮史畧卷四
