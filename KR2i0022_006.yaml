body:
  text: 朝鮮史略卷六髙麗紀獻宗恭殤王諱昱宣宗子母思肅太后李氏元年宋紹聖二年遼夀隆元年正月日有暈兩傍有彗太史奏日有彗近臣亂諸侯欲有反者王幼不知修省李資義謀反伏誅初宣宗於思肅太后生王又納侍中李頲之女元信公主生漢山侯昀資義公主兄也以王幼弱不能聽決萬幾謀欲立昀至是聚兵將舉事邵台輔使王國髦率兵入衛令壯士髙義和斬資義及其黨崔忠伯等以王國髦權尚書兵部事時王室微弱而權歸武將識者嘆之王禪位於叔父雞林公熙熙即位李齊賢曰顯之三子兄弟相傳以及於順順以居喪過哀夭折無嗣而傳於宣宣薨而太子嗣是為獻宗國人熟習見聞乃謂宣有五弟而立孺子以是歸罪何不思之甚也唯不得周公於親博陸於臣委任而輔政其危且亂可翹足而待也後世有不幸而遺大投艱於襁褓之中者可以此為誡哉肅宗明孝王諱顯字天常初諱熙宣宗母弟元年前王出居興盛宫金謂磾上書請遷都南京其書略曰道詵記云髙麗有三京松嶽為中京木覔壤為南京平壤為西京四時各宜所住開國後百六十餘年都木覔壤今時正當巡駐新京之期伏望於三角山南木覔北平建立都城王置南京開創都監遣崔思諏尹瓘等相之思諏等奏云臣等就慮原驛視山水不合建都唯三角山南山形水勢符合古文請隨形建都王從之右僕射恭知政事朴寅亮卒諡文烈寅亮文詞雅麗宋熙寧中與金覲使宋其所著述宋人稱之至刋二公詩文號小華集遼嘗欲過鴨緑江為界寅亮修表曰普天之下既莫非王土王臣尺地之餘何必曰我疆我理又曰歸汶陽之舊田撫綏敝境回長沙之拙袖抃舞昌辰遼帝覽之寢其議二年前王薨于興盛宫東女真寇鎮溟縣東北面兵馬使金漢中遣判官康拯與戰克之斬首四十級始設鑄錢官使錢使猶行也三年民貧不能興用命州縣出米穀許民貿易使知錢利始用銀瓶為貨其制以銀一斤為之像本國地形俗號濶口七年宋崇寧元年遼天祚帝乾統二年宰相邵台輔等奏國學養士麋費不資實為民弊中國之法難以行於我國請罷之不報史臣曰台輔罷學之請雖窮巷庸夫所不敢出諸口者肅宗乃擢置於論道經邦之位及其三表請老盛稱儒雅不允其請何也肅宗非不知其為人特以其溺於立已之私恩而昧於擇相之公義也時稱肅宗好文其好文也豈亦玩心於章句之末而與羣臣賦詩唱和而已耶置京城左右酒務又於街衢兩傍勿論尊卑各置店鋪以興使錢之利禮部奏我國教化禮義自箕子始而廟貌猶闕不在祀典乞使求其墳塋立祠以祭從之遼遣中書舍人孟初來賀生辰兵部貟外郎金緣為館伴初見其年少頗易之一日並轡出郊雪始霽初唱云馬蹄踏雪乾雷動緣即對曰旗尾翻風烈火飛初愕然曰真天才也由是情好日篤相唱和及别解金帶贈之八年東女真太師英格遣使來朝有本國醫自完顔部來言女真居黑水者部落日強兵益精悍王遣使相通即金之先也以崔思諏為門下侍中林幹為門下侍郎平章事李䫨為中書侍郎平章事栁伸為僕射政堂文學崔𢎞嗣為樞密院使尹瓘知樞密院事命林幹伐東女真女真本靺鞨苗裔散居山澤未有統一及英格烏雅舒為部長頗得衆心界上有連山險絶人馬不能渡間有一徑俗謂瓶項若塞其徑則女真路絶故邀功者獻議請出師平之幹與女真戰於定州城外敗績初內侍林彥主出兵之議直史館李永曰兵凶戰危不可妄動彥當無事時欲用兵生釁不可也王不聽幹又邀功引不教之兵遽出與戰敗績復以尹瓘為東北面行營兵馬都統與女真戰斬三十餘級我軍死傷陷沒者過半軍勢不振遂卑辭請和結盟而還政堂文學栁伸卒伸狀貌不踰中人而有膽量少擢髙第以清謹名嘗牧清州民敬之如神國家欲移都南京伸獨言其不可凡論國家事悉主忠義十年王還自西京不豫至長平門外薨於輦中太子俁即位王幼而聰慧及長孝敬勤儉雄毅果斷五經子史無不該覽然遊樂頗數屢幸寺院多致民敝李齊賢曰以漢高知人之明欲易太子而不知代王之終為太平天子封之邉郡唐太宗之賢而不克定嗣卒用昏童乃使凶牝啄其孫殆盡然兩漢四百年臨天下者皆孝文之裔也唐三百年自中睿迄昭哀亦文帝之後也我文考十九子而以再興宗國期肅宗而肅宗由藩侯紹大統有子若孫繼繼繩繩以至于今四百餘年斯豈非天乎睿宗文孝王諱俁字世民母明懿太后栁氏元年宋崇寧五年遼乾統六年政堂文學鄭文卒文恭儉朴訥不事生産居室卑陋僅庇風雨蒞官謹慎典刑曹十餘年未嘗出入人罪奉使入宋受賜金帛分與從人將其餘買書以歸他無所求取宋人多之侍中魏繼廷三上表請老王手詔不允繼廷稱疾不起王遣使敦諭乃入省視事御史以纍旬稱病奏核之即上表乞退許之金富佾曰繼廷以文章名世清白謇直輔佐纍朝宣宗燈夕置酒王酒酣命繼廷舞繼廷辭曰有伶人何用臣舞王不之強宣宗寵姬萬春起第壯麗繼廷奏曰萬春誑惑上意勞役百姓大起私第請毁之書上不報宣宗遣李資義使宋繼廷為副資義多市珍貨繼廷一無所求舉世皆好佛繼廷獨不然是故國人想望大用見其施設及為相循默無所建明蓋知其勢之不可為又以老病耳至是乞退上惜其去再降手詔以寵留之又遣中使而敦諭之故入朝數日復告而歸焉御史不原情而劾之豈不謬哉二年以僧曇真為王師初欲封真為王師以諫議金緣為封崇使緣辭曰臣職在諫院已言封王師之不可未蒙俞允又從而行之則是欺殿下也王強之再三固辭不就平章事林槩卒槩清直有大臣風平章事崔𢎞嗣等奏太史言自御松都今二百餘年欲延基業宜卜西京龍偃舊墟别創新闕移御受朝吳延寵言其三不可一文宗作西京卒無應二近者創南京無吉應三今新搆闕毁撤屋廬騷動人民王從𢎞嗣議以思肅王后李氏配宣宗廟初宣宗為國原公納李預女為妃未幾而卒是為貞信賢妃又納李碩女生獻宗封王后及獻宗即位尊為太后薨諡思肅至是議宣廟之配王欲以貞信配諫官奏云貞信為國原公妃年月甚淺思肅自嬪公府以至踐位內助居多及太子繼統臨朝稱制者三年獻宗遜位於肅宗退居舊宫永無失德以思肅配便制曰嫡庶之分不可不别更詳禮典以聞諫官復奏云春秋之義國君即位未逾年者不合列序昭穆國君如此况后妃乎請以思肅升配從之王欲成肅宗遺志時咸州以北屬於女真肅宗有恢復之志將伐女真發兵十七萬以尹瓘為元帥吳延寵副之瓘與中軍兵馬使金漢忠左軍兵馬使文冠右軍兵馬使金德珍各統兵由定州分道而進梁惟善鄭崇甫甄應陶等領兵船出鱗道浦會之擊破女真一百三十五村村猶屯也斬四千九百四十級虜一千三十人乃相地築英州雄州福州吉州咸州宜州及泰通平戎公嶮鎮等九城使林彥作記勒功於英州廳壁又立碑於公嶮鎮以為界以先春嶺為界凱旋王賜功臣號迎勞之是戰也柘俊京有摧陷之功庾翼宋忠朴懷節皆死之四年還女真九城初朴景緯及金漢忠皆以更深入敵境多置城鎮為難守禦尹瓘不聽卒如其言出師亦未免敗軍之責時羣臣議多不同王猶豫未決諫議金緣曰人主之取土地本欲育民也今爭城而殺人莫如還其地而息民王然之盡以九城還之女貞來謝獻馬及金史臣曰自顯德靖文以來升平日久女真最號雄強而亦自歸附何負於我哉當時武臣之邀功嗜利如李日肅林彥之徒建議侵伐李永極陳不可肅宗不聽再興師旅林幹既敗於前尹瓘又敗於後卑辭請和忿猶未怠睿宗嗣位鋭意徂征命尹瓘吳延寵將兵搗巢覆穴得九城而恢拓之足以殺先朝之耻矣然搆釁益深邉患日滋尹瓘吳延寵出師無功復還九城自古人主忽近圗而勤逺略者靡有不快於始而忽於後肅睿之謂矣取大學崔敏庸等七十人武學韓子純等八人分處七齋周易曰利澤尚書曰待聘毛詩曰經德周禮曰求仁戴禮曰服膺春秋曰養正武學曰講藝六年宋靖和元年遼天慶元年以胡宗旦權知直翰林院宗旦宋福州人嘗為太學生聰敏博學能文遊兩浙仍寄商船而來王寵顧優厚驟登清要然頗進壓勝之術王不能無惑焉七年恭知政事文冠卒諡章敬冠性清直寬厚不事生産當官執節不撓嘗為西北面兵馬使與女真屢戰有功門下侍中尹瓘卒諡文肅瓘坡平縣人少登科好學手不釋卷雖在軍中常以五經自隨好賢樂善冠於一時流僧統于巨濟縣文宗子住俗離寺財纍巨萬厚施於人人多歸附或告交通外人圖不軌故及未幾死坐流者右丞金仁碩等八九人召前員外郎郭輿輿以烏巾鶴氅常侍禁中從容談論唱和時人謂之金門羽客王復微行至所居置酒論文史臣曰輿盜竊官妓詐稱仙去則姦盜之雄也以婢為伉儷不娶無後則亦不孝之大者也九年參知政事庾祿崇卒祿崇以儒術進性正直在官以公忠自許未嘗屈已從人雖為宰相衣服第宅如布衣時王詣國學爵獻先聖先師命翰林學士朴升中講書説命百官及生員七百餘人立庭聽講各進歌頌王製詩宣示左右令和進十年生女真完顔阿固達稱皇帝國號金紀元收國其俗如丐奴無城郭無文字能控弦其地西直契丹南直我境故嘗服事契丹及我朝其先平州人今俊或曰平州人今幸之子克守入女真娶其女生太師彀英彀英生太師和鑾和鑾多子長曰和哩布季曰英格英格死和哩布長子烏雅舒嗣位烏雅舒卒弟阿固達立中書令崔思諏卒思諏沖之孫力學擢科所至有聲績為相論議務存大體不敢輕改舊章門人子弟有來謁者常訓以事君之道言不及私雖謝事家居憂國之心終始不替左遷知制誥崔瀹為春州府使王幸西京置酒大同江與侍臣唱和瀹上書諫曰昔唐文宗欲置詩學士宰相奏曰詩人多輕薄恐撓聖聰文宗乃止帝王當好經術安事雕蟲有一詞臣乘隙訴之曰瀹短於詩故有此言王怒黜之平章事吳延寵卒諡文襄延寵海州人家世寒素少貧賤力學善屬文早擢科第飭躬勤行恂恂然以忠儉自許當官持論務袪時弊未嘗以私害公十一年作清宴閣於禁中選置學士直學士直閣金緣作記洪灌書之朝夕講論經籍後以清宴閣在禁中學士直宿出入為難又置寶文閣移清宴閣學士充之加置待制王命金緣朴景仁舊名景緯及寶文閣學士注解貞觀政要以進十二年改抱州為義州防禦使以鴨緑江為界置關防金兵攻遼耶律寧興常孝孫等移牒我寧德城以來逺抱州二城歸之遂泛海而遁我兵入其城收兵仗錢穀甚多簽書樞密院使金黃元卒黃元自幼好學登科文詞推為海東第一性清徑不附勢與李載同在翰林齊名時契丹使至黃元伴內宴口號有鳳含綸綍從天降鰲駕蓬萊渡海來之句使驚嘆然二人皆學古文不隨時態宰相李子成惡之謂必詿誤後生斥為京山府使有吏捕殺人強盜以至熟視之以為非賊趣令放之僚佐力爭不聽後獲他盜果向之殺人者也嘗奉使于遼道見北鄙人大飢人相食請發粟廪賑之及還百姓見之曰此活我相公也後女真侵遼來逺抱二州城食盡以財減價貿穀于我邉吏禁民貿易黃元上疏曰幸災不仁怒鄰不義請糶二城兼許貿易不報及卒金富軾請諡當途有不悅者沮之李資諒使宋至汴京帝親賜宴內殿製詩示之命和進資諒即應制帝大加稱賞及還密諭曰聞汝國與女真接壤後嵗來朝招引數人來資諒奏曰女真外域中最為強徑不可通有幸臣聞之言于帝曰女真珍竒雜出髙麗交通貿易不欲分利他國故沮之遂遣使交通致靖康之禍入宋進士權適趙奭金端中親試隨李資諒還帝賜御製手札褒送其同時赴學康就正甄惟底死于宋召清平居士李資玄赴行在時王幸南京資玄中書令子淵孫容貌魁偉性聰敏登第忽棄官入春州清平山葺文殊院居之嗜禪悅道逍遙自樂王纍徵堅不就其上表有以鳥養鳥庶無鐘鼓之憂觀魚知魚俾遂江湖之性之辭王知不可致特幸南京遣其弟資德往諭乃赴召仍命留三角山及再見王問養生之要對曰莫善於寡欲王待遇特厚固請還山賜茶香法服以寵之十三年宋重和元年金天輔二年以李資謙判吏部事王妃李氏薨資謙女諡順德王后王屢舉哭臨及葬親祖送于神鳳門之外十四年始於國學立養賢庫以養士國初肇立文宣廟於國子監建官置師至宣宗時將欲教育而未遑王鋭意儒術廣設學舍置儒學六十人武學十七人選名儒為學官博士講論經義以教導之文風稍振增築長城三尺金邉吏發兵止之不從金主敕邉吏毋得侵軼生事十五年王命黜赴制科國生髙孝沖下獄時妓玲瓘遏雲等以善歌屢承恩賚孝沖作感二女詩以諷之舍人鄭克永言於王王不悅故黜之下獄胡宗旦上書營救乃釋之迎入佛骨于禁中初王字之使宋還帝以金函盛佛牙頭骨以賜恭知政事林景仁卒景仁三為諫官言論鯁直無所依違十七年宋宣和四年遼保大二年御紗樓召文臣等刻燭賦牡丹詩安寶麟為第一時康日用以能詩名王佇觀其作才得一聨曰頭白老翁看殿後眼眀儒者倚闌邊袖藁伏御溝中王取見之曰所謂白頭花鈿滿面不如西施半粧門下侍郎平章事崔𢎞嗣卒𢎞嗣起自寒微以文行聞性貞介寡欲朝無黨與居家不言公事妻子未嘗見其戲笑人有餽遺雖蔬果不受然務苛察見人小過輒不忘十七年王薨太子幼李資謙順德王后父奉太子即位史臣曰睿宗志存拓境僥幸邊功歆慕華風信用胡宗旦頗惑其言然知用兵之難棄怨修好使鄰境感慕來服恤鰥寡養耆老開設學校教養生員置清宴寶文兩閣日與文臣講論六經偃武修文欲以禮樂成俗云仁宗恭孝王諱楷字仁表睿宗子母順德王后李氏元年金太宗天會元年詔曰李資謙於朕為外祖其班次禮數不可與百官同令大臣侍從會議學士鄭克永等議當上書表不稱臣及大宴會不與庭賀徑詣幕次拜上答拜而後坐殿衆議雷同獨金富軾上議非之王遣近臣康侯顯問資謙資謙奏曰臣雖無識今觀富軾之議實天下之公論也微斯人羣公幾陷老臣於不義願從之詔可富軾議略曰漢髙祖初定天下五日一朝太公家令説太公曰皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣髙祖善家令言上尊太公曰太上皇以此論之雖天子之父若無尊號不可令人主拜故後漢獻帝皇后父不其侯伏完鄭玄議曰在京師禮事出入宜從臣禮若后息離宫及歸寧父母則從子禮故伏完朝賀公庭如衆臣及皇后在宫后拜如子又東晉穆帝母禇太后見父之禮博士徐禪依鄭玄議曰王庭正君臣之禮私覿全父子之親是大順之道也又魏帝父燕王宇上表稱臣雖父子至親禮數尚如此况外祖乎云云以金緣判祕書省事監修國史緣有文名清節睿宗深器之擢置宰輔恩禮優重及王幼沖嗣位外戚用事緣恐及害懇辭乞退不許至是將赴衙聞街上童謡因墜馬歸卧求免愈篤故有是命漢陽公李資謙殺中書侍郎韓安仁流甘勿島殺之安仁力學善屬文以侍學舊恩密近用事遽乘勢謀軋資謙以至於敗流御史臺事李永于珍島永安城郡吏仲宣子幼勤學登第歷臺諫史館以安仁妹壻被流聞其母將沒為婢嘆曰吾內省不疚故忍死待時老母以豫故沒為賤𨽻吾何茍生乃飲酒一斗憤悶死資謙遣衛士瘞道傍牛馬不敢踐或病瘧者就禱則愈後資謙敗其子請改葬掘之尸不變贈簽書樞密院事永天資方直不為權貴所撓以崔𢎞宰為門下侍郎平章事拓俊京為吏部尚書𠫭知政事二年李資謙母金氏死金氏以女故封三韓國太夫性貪沓抑買市人財物或全不與直又縱奴橫暴及死市人相賀李資謙流崔𢎞宰于升州褥地島𢎞宰善射御資謙畏圗已流之李資謙釋喪服上官坐中書省宰樞文武諸僚綴行陳賀天乃大雨雷電市道水深一丈震迎恩館資謙以母喪去位王遣使册功進爵朝鮮國公仍加諸子之美之彥之甫之允之元及僧義莊爵追封祖考朴升中媚資謙議曰告墳日當賜樂金富軾以為丘墟之地素服從事豈可用樂升中又欲號資謙生日為仁夀節富軾以為生日稱節自古所無唐玄宗始稱節千秋未聞人臣有節稱者李資謙納第三女于王天乃驟雨大風拔木三年李資謙又納第四女于王天乃大風雨史臣曰資謙去年納第三女今年納第四女昔魏公操窺伺漢鼎納三女于帝為貴人宫中動靜無不先知今資謙之計即操之計資謙曽信圗讖李氏得國之語蓄無君之心非一朝夕清平山人李資玄卒資玄生長富貴夤緣戚里乃厭紛華愛間適棄官入山以終其身然性慳多蓄財貨舉物積榖頗為一方農民所苦四年內侍祗候金粲録事安甫鱗等與同知樞密院事智祿延蔡文曽孫謀誅李資謙拓俊京資謙子之元妻父與其弟俊臣用事率軍入宫先誅拓俊臣等資謙俊京聞變舉兵犯闕朴升中子深造自宫溷中出徑至資謙第告宫中事狀焚燒宫禁殺甫鱗祿延及僕射洪灌樞密院事金縝赴火死侍御臣僚皆被殺流粲于逺地遷王於重興宅西院史臣曰資謙之惡極矣其亡可立而待祿延等欲除君側之惡而智小謀淺卒至殺身亂國昔唐李訓鄭注欲鋤剪宦官而不能克禍及國家其事略同李資謙謀反王崔思全拓俊京討之流資謙及妻子支黨朴升中朴彪為之冠于外資謙欲圖不軌進毒餅中妃密白王王以餅投烏烏斃又送毒藥妃奉碗陽蹶而覆之妃即資謙第四女也俊京與資謙搆隙思全又乘間説之俊京乃決策王手書小紙密遣宦者趙毅以示之俊京即以示尚書金珦珦泣曰有旨如此義當死事俊京與珦率將挍僚吏僕𨽻入宫奉王以出御軍器監嚴兵衛召資謙流之斬其將軍康好高珍守皆資謙所指使者也分遣人逮捕支黨子姪流之召還金粲後改名安為殿中內給事賜洪灌金縝智祿延子壻爵一級王廢二妃李氏納任元凱女為妃妃誕夕其外舅李瑋夢黃大旗竪於其第旗尾飄縈於宣慶殿鴟尾及笄婚夕妃暴疾謝遣其人卜者占病曰必為國母李資謙惡之斥元凱為開城府使其倅夢府使廳棟梁折作大竇黃龍從竇而出又王夢得荏子五升黃葵三升拓俊京解之曰荏者納任姓后妃之兆也其數五者誕五子之瑞也黃者皇也葵者揆也皇王執道揆御邦家之瑞也其數三者五子之中三子御國之兆也果驗五年宋建炎元年拓俊京恃功跋扈王忌之左正言鄭知常上疏略曰五月之事一時之功也二月之事萬世之罪也於是流俊京于嵒墮島文公美韓安中文公裕皆召還復職資謙所流者也門下侍中金仁存卒諡文成初名緣上琦之子性明鋭少登科老不釋卷一時詞命多出其手有文名清節六年宋髙宗遣刑部尚書楊應誠等來諭假道仰問二帝于五國城王答應誠書曰若使節假道入境金必猜疑生事不敢奉命且附表以謝應誠等不受而去王幸西京時妖僧妙清日者白夀翰以不經之説眩惑衆人鄭知常深信之以為上京基業已衰宜移御西京金安洪彛敘李仲孚文公仁林景清從而和之移林原驛作新宫妙清言林原乃大花勢若立宫闕御之可并天下故有是役迎佛骨置仁德宫忠州人劉挺弒其父中書門下奏請降州為郡王問左右對曰禮云邾婁定公時有弒父者殺其人毁其室汙其宫而止耳降州為郡非古法也允之八年左遷侍御史髙唐愈為工部貟外郎初資謙之亂朝臣皆脅從失節其支黨夤緣茍免至宰輔者多唐愈屢上書斥之曰雖聖王寬大掩其疵疾何面目立朝廷見日月乎王雖是其言不忍盡棄大臣左遷奪臺職唐愈改名兆基禁諸生治莊老十年宋紹興二年守太尉金富佾卒其先新羅公族富佾入侍寶文閣討論經史雄辨折衷人莫之敵文亦華瞻睿宗以富佾富軾富轍皆為文翰侍從封其母太夫人嵗賜廪粟母以為既得諸子祿養何敢加辱厚賜遂不受富佾為人寬厚儉約不事産業任元凱上書請誅妙清等以絶禍萌不報初王之幸西京也妙清等密作大餅空其中穿一孔盛熱油沉于大洞江油浮出水面望若五色妙清等以為神龍吐涎時有業油韂者告曰熟油泛水則有異色於是使泅者索得乃知其詐左遷平章事崔𢎞宰為守司空右僕射𢎞宰納貨賣官諫官崔惟清等上疏斥之十二年六月震西京大花闕乾龍殿史臣曰仁宗身經李拓之亂而復為妙清嬰弄何哉天之警告未嘗不惓惓懇至十三年妙清栁旵丑減切與西京分司侍郎趙匡等矯制囚留守員僚凡上京人在西都者無貴賤皆拘之遣兵斷岊嶺道劫發諸城兵反國號大為改元天開自號天遣忠義軍王命平章事金富軾等討之富軾臨發議于諸將曰鄭知常金安白夀翰實與謀不去是人西都不可得平使勇士曵出三人於宫門外斬之乃奏人言富軾素與知常齊名於文字間積不平至是託以內應殺之至金郊驛諸將佐皆欲倍道疾馳掩賊不備富軾以為賊矯制徵兵列城狐疑莫辨真偽不若引軍間道繞出賊背告諭順逆徐以大兵臨之萬全計也遂引中軍由平州趣管山驛左右軍皆相次而行於是逆賊趙匡斬妙清栁旵以降使分司官尹贍等請罪兩府及臺諫俱請梟三人首于市下贍等獄匡等聞之復反富軾欲起土山以臨賊城而攻之將佐尹彥頥曰曠日持久事變難料不如潛師突擊可以成功於是富軾勑諸軍踰城進攻賊兵大潰趙匡自焚死誅賊魁崔永及其黨分司官不附賊者並原之西京平平章事金珦卒珦起自胥吏雖無學識清慎有幹能其女嫁李資謙子之甫不以姻婭附資謙及與拓俊京謀執資謙而不伐其功詔曰廄焚孔子曰傷人乎不問馬此聖人貴人賤畜之義也今法官論殺牛準殺人之罪鈒面配島此非律文本意自今以本罪罪之貶尹彥頥為梁州防禦使彥頥父瓘奉詔撰大覺國師碑文不工王令富軾改撰時瓘在相府富軾不讓遂撰彥頥心嗛之後王幸國子監命富軾講易令彥頥問難彥頥精于易問難縱橫富軾難于應答汗流被面至是彥頥為幕下富軾奏貶之知樞密院使金富儀卒即富轍也以文學特被眷倚擢授翰林學士王嘗問以邊事富儀引文彥博之言曰須先自治不可略近勤逺妙清請營新宫又上疏極言其不可性坦蕩未嘗干勢利詩文豪逸以金若溫為侍中若溫性恭儉亷正力學歷任中外人皆便之與李資謙為表兄弟亦不相比位雖華顯未嘗以富貴驕人樞密院知奏事鄭沆卒沆性頴悟好學中第久為內侍掌奏出納惟允且不附李資謙嘗勸王讀書及卒家無甔石之儲諡文安十七年金天眷二年門下侍郎崔思全卒思全初以醫術進諭拓俊京去李資謙以功驟登宰司思全有二子曰辨曰烈思全賜金罍各一及沒妾竊其一辨怒欲鞭之烈曰此先君所愛當傾家産而恤之况此物乎遂以所得罍遺辨王聞而嘉之御書賜名曰仁孝二十二年金皇統四年賜金敦中等二十六人及第敦中富軾之子初擬第二王欲慰其父升為第一敦中年少氣鋭後因宫庭除夕儺禮以燭燃牽龍鄭仲夫髯仲夫手搏辱之富軾怒白王將縳栲仲夫逃免遂嗛敦中史臣曰敦中燭仲夫髯以啓武臣叛亂之心韓賴批紹膺頰促成武夫篡弒之禍小人之能亡國敗家如是何可不逺慮哉二十三年政堂文學李之氐卒諡文正之氐公夀之子擢第拜正言持論公正與李資謙為族亦不相比風標英雅秉心寬厚文章政事為一時之傑然吝嗇財賄父沒不分弟妹家奴肆橫不能禁制二十四年王疾大漸傳位于太子晛薨太子即位史臣曰仁宗幼沖即位使姦凶跋扈毒流三韓又深信浮屠貽害生民惑於妙清等隂陽之説卒致西都之反逆蓋以天性一於慈愛優遊不斷故耳然其不喜逰宴減省宦竪恭儉以飭身誠信以交鄰雖古帝王何以加焉朝鮮史略卷六
